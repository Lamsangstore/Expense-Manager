<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Manager - High Speed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
    <script src="https://unpkg.com/lucide@latest" crossorigin></script>
    
    <!-- Firebase SDK Modules -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Kanit:wght@300;400;600&display=swap');
        body { font-family: 'Kanit', 'Inter', sans-serif; background-color: #F2F2F7; margin: 0; padding: 0; }
        .glass { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.4); }
        .dark-glass { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- CONFIGURATION ---
        // ใช้ค่าเดิมจาก Firebase Console ของคุณ
        const firebaseConfig = {
            apiKey: "AIzaSyCwnWHqG__ty3OvDok2o6orgreXOu5LSXk",
            authDomain: "expense-manager-14564.firebaseapp.com",
            projectId: "expense-manager-14564",
            storageBucket: "expense-manager-14564.firebasestorage.app",
            messagingSenderId: "259280883710",
            appId: "1:259280883710:web:67d7ce7b1f8e5e196a7aaf",
            measurementId: "G-68BWRR5K8N"
        };
        
        const appId = "expense-manager-pro-v1";

        // Initialize Firebase Safely
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('list');
            const [groups, setGroups] = useState([]);
            const [activeGroup, setActiveGroup] = useState(null);
            const [loading, setLoading] = useState(true);
            const [showAddGroupModal, setShowAddGroupModal] = useState(false);
            const [newGroupName, setNewGroupName] = useState('');

            // (1) Auth Effect
            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    if (!u) setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            // (2) Fetch Groups Effect (Real-time with Firestore)
            useEffect(() => {
                if (!user) return;
                setLoading(true);

                // Path: /artifacts/{appId}/public/data/groups
                const groupsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups');
                
                // กรองเฉพาะกลุ่มที่ User เป็นเจ้าของ (Simple query)
                const q = groupsRef.where("ownerId", "==", user.uid);

                const unsubscribe = q.onSnapshot((snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setGroups(data);
                    setLoading(false);
                    if (window.lucide) setTimeout(() => window.lucide.createIcons(), 100);
                }, (err) => {
                    console.error("Firestore error:", err);
                    setLoading(false);
                });

                return () => unsubscribe();
            }, [user]);

            // Icons initialization
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            });

            const handleGoogleLogin = async () => {
                const provider = new firebase.auth.GoogleAuthProvider();
                try { await auth.signInWithPopup(provider); } catch (err) { alert(err.message); }
            };

            const handleLogout = () => auth.signOut();

            const createGroup = async () => {
                if (!newGroupName.trim() || !user) return;
                setLoading(true);
                try {
                    const groupsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups');
                    await groupsRef.add({
                        name: newGroupName.trim(),
                        ownerId: user.uid,
                        ownerEmail: user.email,
                        createdAt: Date.now(),
                        members: [user.displayName || 'Me'],
                        icon: '📊'
                    });
                    setNewGroupName('');
                    setShowAddGroupModal(false);
                } catch (err) {
                    alert("ไม่สามารถสร้างกลุ่มได้: " + err.message);
                } finally {
                    setLoading(false);
                }
            };

            const deleteGroup = async (e, id) => {
                e.stopPropagation();
                if (!confirm("ลบกลุ่มนี้ใช่หรือไม่?")) return;
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(id).delete();
                } catch (err) {
                    alert("ลบไม่สำเร็จ");
                }
            };

            if (loading && !user) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-[#F2F2F7]">
                        <div className="w-12 h-12 border-4 border-blue-500/20 border-t-blue-600 rounded-full animate-spin"></div>
                    </div>
                );
            }

            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 relative overflow-hidden bg-[#F2F2F7]">
                        <div className="absolute top-[-10%] left-[-10%] w-[60%] h-[60%] bg-blue-400/10 blur-[120px] rounded-full"></div>
                        <div className="max-w-md w-full relative z-10 animate-in">
                            <div className="glass rounded-[3rem] p-10 shadow-2xl text-center border border-white/50">
                                <div className="w-20 h-20 bg-gradient-to-tr from-blue-600 to-indigo-400 rounded-3xl flex items-center justify-center mx-auto mb-8 shadow-xl shadow-blue-200">
                                    <i data-lucide="zap" className="text-white w-10 h-10"></i>
                                </div>
                                <h1 className="text-3xl font-black text-slate-900 mb-2">High-Speed Expense</h1>
                                <p className="text-slate-500 mb-10 font-medium leading-relaxed">ระบบจัดการค่าใช้จ่ายเวอร์ชันอัปเกรด <br/>ทำงานเร็วแบบ Real-time</p>
                                <button 
                                    onClick={handleGoogleLogin}
                                    className="w-full flex items-center justify-center gap-4 bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-black transition-all shadow-xl active:scale-95"
                                >
                                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-5 h-5 bg-white rounded-full p-1" alt="google" />
                                    เข้าสู่ระบบด้วย Google
                                </button>
                                <p className="mt-6 text-[10px] text-slate-400 font-bold uppercase tracking-widest">Powered by Firebase Firestore</p>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen text-slate-900 pb-24">
                    <header className="sticky top-0 z-50 px-4 pt-6">
                        <div className="max-w-4xl mx-auto">
                            <div className="glass rounded-3xl px-6 py-4 flex items-center justify-between shadow-sm border border-white/60">
                                <div className="flex flex-col">
                                    <h1 className="text-lg font-black tracking-tight">{view === 'list' ? 'Dashboard' : activeGroup?.name}</h1>
                                    <div className="flex items-center gap-1.5">
                                        <div className="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></div>
                                        <span className="text-[10px] text-slate-500 font-bold uppercase tracking-tight">System Online</span>
                                    </div>
                                </div>
                                <div className="flex items-center gap-3">
                                    <div className="text-right hidden sm:block">
                                        <p className="text-[10px] font-black text-slate-400 uppercase leading-none mb-1">User Profile</p>
                                        <p className="text-xs font-bold leading-none">{user.displayName}</p>
                                    </div>
                                    <button onClick={handleLogout} className="w-10 h-10 rounded-xl overflow-hidden border-2 border-white shadow-md active:scale-90 transition-transform">
                                        <img src={user.photoURL} alt="profile" />
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto p-4 space-y-6 mt-4">
                        {view === 'list' ? (
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 animate-in">
                                {groups.map(group => (
                                    <div 
                                        key={group.id} 
                                        onClick={() => { setActiveGroup(group); setView('detail'); }}
                                        className="bg-white/70 border border-white/60 p-8 rounded-[2.5rem] shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all cursor-pointer relative group"
                                    >
                                        <button 
                                            onClick={(e) => deleteGroup(e, group.id)}
                                            className="absolute top-6 right-6 p-2 text-slate-300 hover:text-red-500 transition-colors opacity-0 group-hover:opacity-100"
                                        >
                                            <i data-lucide="trash-2" className="w-4 h-4"></i>
                                        </button>
                                        <div className="w-16 h-16 bg-white rounded-2xl flex items-center justify-center text-3xl mb-4 shadow-sm border border-slate-50 group-hover:scale-110 transition-transform">
                                            {group.icon || '📊'}
                                        </div>
                                        <h3 className="text-xl font-black text-slate-800 leading-tight">{group.name}</h3>
                                        <p className="text-xs font-bold text-slate-400 mt-1 uppercase tracking-wider flex items-center gap-2">
                                            <i data-lucide="users" className="w-3 h-3"></i> {group.members?.length || 0} Members
                                        </p>
                                    </div>
                                ))}
                                <div 
                                    onClick={() => setShowAddGroupModal(true)}
                                    className="border-2 border-dashed border-slate-300 rounded-[2.5rem] p-8 flex flex-col items-center justify-center text-slate-400 hover:text-blue-500 hover:border-blue-500 hover:bg-white transition-all cursor-pointer"
                                >
                                    <div className="w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center mb-3 group-hover:bg-blue-100">
                                        <i data-lucide="plus" className="w-6 h-6"></i>
                                    </div>
                                    <span className="font-bold">สร้างกลุ่มใหม่</span>
                                </div>
                            </div>
                        ) : (
                            <div className="text-center py-20 animate-in">
                                <div className="w-24 h-24 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-6">
                                    <i data-lucide="pie-chart" className="w-12 h-12 text-blue-500"></i>
                                </div>
                                <h2 className="text-2xl font-black">{activeGroup?.name}</h2>
                                <p className="text-slate-500 mt-2 font-medium">ฟังก์ชันจดบิลใน Firestore ทำงานเร็วและ Real-time <br/>คุณสามารถเพิ่มรายการได้ทันที</p>
                                <button onClick={() => setView('list')} className="mt-8 bg-white px-6 py-2 rounded-xl border border-slate-200 font-bold shadow-sm hover:bg-slate-50 transition-colors inline-flex items-center gap-2">
                                    <i data-lucide="chevron-left" className="w-4 h-4"></i> กลับหน้าหลัก
                                </button>
                            </div>
                        )}
                    </main>

                    {/* Bottom Nav */}
                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm z-50">
                        <div className="dark-glass rounded-[2rem] px-8 py-4 flex items-center justify-between shadow-2xl shadow-blue-900/20">
                            <div className={`p-2 cursor-pointer transition-colors ${view === 'list' ? 'text-white' : 'text-slate-500'}`} onClick={() => setView('list')}>
                                <i data-lucide="layout-grid" className="w-6 h-6"></i>
                            </div>
                            <div 
                                onClick={() => setShowAddGroupModal(true)}
                                className="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center shadow-lg -mt-12 border-4 border-[#F2F2F7] cursor-pointer hover:bg-blue-500 active:scale-90 transition-all"
                            >
                                <i data-lucide="plus" className="w-6 h-6 text-white"></i>
                            </div>
                            <div className="p-2 cursor-pointer text-slate-500 hover:text-white transition-colors">
                                <i data-lucide="settings" className="w-6 h-6"></i>
                            </div>
                        </div>
                    </nav>

                    {/* Modal */}
                    {showAddGroupModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/40 backdrop-blur-md animate-in">
                            <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-10 shadow-2xl border border-white">
                                <div className="w-16 h-16 bg-blue-50 rounded-2xl flex items-center justify-center mb-6 mx-auto">
                                    <i data-lucide="users" className="w-8 h-8 text-blue-600"></i>
                                </div>
                                <h3 className="text-2xl font-black mb-2 text-center">ชื่อกลุ่มใหม่</h3>
                                <p className="text-center text-slate-400 text-sm mb-6">ระบุชื่อทริปหรือกลุ่มเพื่อนที่คุณต้องการ</p>
                                <input 
                                    autoFocus
                                    value={newGroupName}
                                    onChange={(e) => setNewGroupName(e.target.value)}
                                    placeholder="เช่น ทริปเที่ยวทะเล, ค่าบ้าน..."
                                    className="w-full bg-slate-50 border border-slate-200 px-6 py-4 rounded-2xl outline-none focus:ring-4 ring-blue-500/10 font-bold mb-6 text-lg"
                                />
                                <div className="flex flex-col gap-2">
                                    <button 
                                        onClick={createGroup}
                                        disabled={loading || !newGroupName.trim()}
                                        className="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-xl active:scale-95 disabled:opacity-50 transition-all"
                                    >
                                        {loading ? 'กำลังบันทึก...' : 'สร้างกลุ่มทันที'}
                                    </button>
                                    <button onClick={() => setShowAddGroupModal(false)} className="w-full py-2 text-slate-400 font-bold hover:text-slate-600">ยกเลิก</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
