<!DOCTYPE html>
<html lang="th">
<head>

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23FFB6C1'/%3E%3Ctext y='78' x='50' text-anchor='middle' font-size='62'%3E🧸%3C/text%3E%3C/svg%3E">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Mitr:wght@400;500;600&family=Sarabun:wght@300;400;500;600&display=swap');

        :root {
            --font-display: 'Mitr', sans-serif;
            --font-body: 'Sarabun', sans-serif;
            --clr-ink: #2B3A4A;
            --radius-card: 20px;
        }

        * { -webkit-tap-highlight-color: transparent; }

        body {
            font-family: var(--font-body);
            color: var(--clr-ink);
            margin: 0;
            overflow-x: hidden;
            background: linear-gradient(135deg, #FFE4E1 0%, #FFF0F5 30%, #E6E6FA 60%, #E0F7FA 100%);
            background-attachment: fixed;
            min-height: 100vh;
            font-size: 14px;
        }

        h1, h2, h3, h4 { font-family: var(--font-display); }

        .glass-card {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: var(--radius-card);
            box-shadow: 0 8px 30px -6px rgba(255, 182, 193, 0.25);
        }

        .btn-primary {
            background: linear-gradient(135deg, #FFB6C1, #FFC0CB);
            color: #2B3A4A;
            border-bottom: 4px solid #FF9EAE;
            border-radius: 18px;
            transition: all 0.1s;
        }
        .btn-primary:active { transform: translateY(2px); border-bottom-width: 2px; }

        .btn-secondary {
            background: linear-gradient(135deg, #B0E0E6, #ADD8E6);
            color: #2B3A4A;
            border-bottom: 4px solid #90C8D6;
            border-radius: 18px;
            transition: all 0.1s;
        }
        .btn-secondary:active { transform: translateY(2px); border-bottom-width: 2px; }

        /* ── Avatar shape variants ─────────────────────────────── */
        /* default = rounded square (squircle) */
        .shape-rounded  { border-radius: 30%; }
        .shape-circle   { border-radius: 50%; }
        .shape-squircle { border-radius: 22%; }
        .shape-diamond  {
            border-radius: 0;
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
        }
        .shape-hexagon  {
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
        }
        .shape-star {
            clip-path: polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
        }
        .shape-flower {
            -webkit-mask-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M50 0 A 15 15 0 0 1 65 15 A 15 15 0 0 1 85 15 A 15 15 0 0 1 85 35 A 15 15 0 0 1 100 50 A 15 15 0 0 1 85 65 A 15 15 0 0 1 85 85 A 15 15 0 0 1 65 85 A 15 15 0 0 1 50 100 A 15 15 0 0 1 35 85 A 15 15 0 0 1 15 85 A 15 15 0 0 1 15 65 A 15 15 0 0 1 0 50 A 15 15 0 0 1 15 35 A 15 15 0 0 1 15 15 A 15 15 0 0 1 35 15 A 15 15 0 0 1 50 0 Z'/%3E%3C/svg%3E");
            -webkit-mask-size: 100% 100%;
            mask-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M50 0 A 15 15 0 0 1 65 15 A 15 15 0 0 1 85 15 A 15 15 0 0 1 85 35 A 15 15 0 0 1 100 50 A 15 15 0 0 1 85 65 A 15 15 0 0 1 85 85 A 15 15 0 0 1 65 85 A 15 15 0 0 1 50 100 A 15 15 0 0 1 35 85 A 15 15 0 0 1 15 85 A 15 15 0 0 1 15 65 A 15 15 0 0 1 0 50 A 15 15 0 0 1 15 35 A 15 15 0 0 1 15 15 A 15 15 0 0 1 35 15 A 15 15 0 0 1 50 0 Z'/%3E%3C/svg%3E");
            mask-size: 100% 100%;
        }
        .shape-heart {
            clip-path: path('M50 80 C20 60 0 40 0 25 A25 25 0 0 1 50 15 A25 25 0 0 1 100 25 C100 40 80 60 50 80Z');
        }

        .shape-picker-btn { cursor:pointer; padding:4px; border-radius:8px; border:2px solid transparent; transition:all 0.15s; background:rgba(255,255,255,0.5); display:flex; align-items:center; justify-content:center; }
        .shape-picker-btn:hover { background:white; }
        .shape-picker-btn.selected { border-color:#2B3A4A; background:white; box-shadow:0 2px 8px rgba(0,0,0,0.12); }

        .animate-pop { animation: popIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }
        @keyframes popIn { from { opacity: 0; transform: scale(0.94) translateY(8px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        .loader {
            width: 28px; height: 28px;
            border: 3px solid rgba(255, 255, 255, 0.5); border-top-color: #FFB6C1;
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #export-area { 
            position: absolute; 
            left: -9999px; 
            top: 0; 
            width: 1200px;
            height: auto; 
            z-index: -9999;
        }

        /* Section color themes */
        .section-pink { background: linear-gradient(135deg, rgba(255,182,193,0.25), rgba(255,192,203,0.15)); border-color: rgba(255,182,193,0.4); }
        .section-blue { background: linear-gradient(135deg, rgba(176,224,230,0.25), rgba(173,216,230,0.15)); border-color: rgba(173,216,230,0.4); }
        .section-purple { background: linear-gradient(135deg, rgba(189,178,255,0.25), rgba(216,191,255,0.15)); border-color: rgba(189,178,255,0.4); }
        .section-mint { background: linear-gradient(135deg, rgba(181,234,215,0.25), rgba(196,247,227,0.15)); border-color: rgba(181,234,215,0.4); }
        .section-peach { background: linear-gradient(135deg, rgba(255,218,185,0.3), rgba(255,200,150,0.15)); border-color: rgba(255,218,185,0.4); }

        .emoji-picker-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
        .emoji-option { font-size: 22px; cursor: pointer; padding: 6px; border-radius: 10px; text-align: center; transition: all 0.15s; background: rgba(255,255,255,0.5); }
        .emoji-option:hover, .emoji-option.selected { background: white; transform: scale(1.2); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        
        .color-swatch { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: all 0.15s; flex-shrink: 0; }
        .color-swatch.selected { border-color: #2B3A4A; transform: scale(1.2); }

        /* Compact for mobile */
        @media (max-width: 640px) {
            body { font-size: 13px; }
            .glass-card { border-radius: 16px; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react,env">
        const { useState, useEffect, useMemo, useRef, useCallback } = React;
        const ReactDOMClient = window.ReactDOM;

        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : {
                apiKey: "AIzaSyCwnWHqG__ty3OvDok2o6orgreXOu5LSXk",
                authDomain: "expense-manager-14564.firebaseapp.com",
                projectId: "expense-manager-14564",
                storageBucket: "expense-manager-14564.firebasestorage.app",
                messagingSenderId: "259280883710",
                appId: "1:259280883710:web:67d7ce7b1f8e5e196a7aaf"
            };

        const appId = (typeof __app_id !== 'undefined' && __app_id) ? __app_id : 'default-trip-app';

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ─── Persistent Login via localStorage ─────────────────────────────────────
        const REMEMBER_KEY = 'expense_pro_remember_login';

        const handlePermissionError = (e, ctx) => {
            console.error(`${ctx}:`, e);
            if (e.message && (e.message.includes('permission') || e.message.includes('insufficient'))) {
                alert(`⚠️ ${ctx}\nFirestore Permission Denied — ตรวจสอบ Rules ใน Firebase Console`);
            } else {
                alert(`${ctx}: ${e.message}`);
            }
        };

        const LucideIcon = ({ name, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (!ref.current) return;
                // Lucide UMD exposes either window.lucide or window.lucide.icons
                const lucide = window.lucide;
                if (!lucide) return;
                // Convert kebab-case to PascalCase for component lookup
                const pascalName = name.replace(/(^|-)([a-z])/g, (_, __, c) => c.toUpperCase());
                const IconComp = lucide[pascalName] || lucide.icons?.[pascalName];
                if (!IconComp) {
                    // fallback: use createIcons
                    ref.current.innerHTML = `<i data-lucide="${name}" class="${className}"></i>`;
                    try { lucide.createIcons({ nodes: [ref.current.querySelector('i')] }); } catch(e) {}
                    return;
                }
                // IconComp is [tag, attrs, children] tuple from lucide
                const [tag, attrs, kids] = IconComp;
                const svgNS = 'http://www.w3.org/2000/svg';
                const svg = document.createElementNS(svgNS, 'svg');
                const mergedAttrs = { ...attrs, class: className };
                Object.entries(mergedAttrs).forEach(([k, v]) => svg.setAttribute(k, v));
                (kids||[]).forEach(([childTag, childAttrs]) => {
                    const el = document.createElementNS(svgNS, childTag);
                    Object.entries(childAttrs||{}).forEach(([k,v]) => el.setAttribute(k, v));
                    svg.appendChild(el);
                });
                ref.current.innerHTML = '';
                ref.current.appendChild(svg);
            }, [name, className]);
            return <span ref={ref} style={{ display: 'contents' }} />;
        };

        // ─── Constants ──────────────────────────────────────────────────────────────
        const TRAVEL_EMOJIS = ['✈️','🏝️','🏕️','🏔️','🏰','🗽','🌸','🌈','🎨','🎈','🎠','🏖️','🗼','⛩️','🚤','🍩','📸','🧸','🌺','🦋','🌊','🎡','🏄','🎭','🍜','🍣','🥂','🎪','🚂','🛸','🌙','🌴','🦜','🐚','💎','🎯','🏋️','🛺','🤿','🧋'];
        const MEMBER_EMOJIS = ['😊','😎','🥳','🐱','🐶','🦊','🐼','🐨','🦁','🐯','🐸','🐥','🦄','🐉','🌸','⭐','🌙','💫','🍀','🌵'];
        const PASTEL_COLORS = ['#FFD1DC','#F8E2E9','#FADADD','#E6E6FA','#E0F7FA','#D0E8F2','#B0E0E6','#FFB6C1','#FFDAC1','#FFB7B2','#FF9AA2','#E2F0CB','#B5EAD7','#C7CEEA','#F1CBFF','#D4F0F0','#FDFD96','#FFDFD3','#FEC8D8','#D291BC'];
        const VIBRANT_COLORS = ['#FF595E','#FFCA3A','#8AC926','#1982C4','#6A4C93','#F15BB5','#00BBF9','#00F5D4','#F28F3B','#C8E9A0','#FF9AA2','#B5EAD7','#C7CEEA','#E2F0CB','#FFB7B2','#E6A8D7','#97C1A9','#8FCACA','#F6A6FF','#B28DFF'];
        const MEMBER_BG_COLORS = ['#FF9AA2','#FFB7B2','#FFDAC1','#E2F0CB','#B5EAD7','#C7CEEA','#FF9AA2','#FFDAC1','#B5EAD7','#C7CEEA','#F6A6FF','#B28DFF','#8FCACA','#E6A8D7','#97C1A9','#FFCA3A','#8AC926','#1982C4','#F15BB5','#00BBF9'];

        // shape definitions — id, css class, display preview
        const AVATAR_SHAPES = [
            { id: 'rounded',  cls: 'shape-rounded',  preview: '⬛' },
            { id: 'squircle', cls: 'shape-squircle', preview: '🔲' },
            { id: 'circle',   cls: 'shape-circle',   preview: '⚫' },
            { id: 'hexagon',  cls: 'shape-hexagon',  preview: '⬡' },
            { id: 'diamond',  cls: 'shape-diamond',  preview: '◆' },
            { id: 'star',     cls: 'shape-star',     preview: '★' },
            { id: 'flower',   cls: 'shape-flower',   preview: '✿' },
        ];
        const DEFAULT_AVATAR_SHAPE = 'rounded';

        function App() {
            const urlParams = new URLSearchParams(window.location.search);
            const dashIdFromUrl = urlParams.get('dashboard');

            const [user, setUser] = useState(null);
            const [view, setView] = useState(dashIdFromUrl ? 'dashboard' : 'list');
            const [groups, setGroups] = useState([]);
            const [activeGroup, setActiveGroup] = useState(null);
            const [expenses, setExpenses] = useState([]);
            const [loading, setLoading] = useState(true);
            const [exporting, setExporting] = useState(false);
            const [dashError, setDashError] = useState('');

            // Modals
            const [showAddGroup, setShowAddGroup] = useState(false);
            const [showJoinGroup, setShowJoinGroup] = useState(false);
            const [showExpenseModal, setShowExpenseModal] = useState(false);
            const [showEditGroup, setShowEditGroup] = useState(false);
            const [showGroupIconPicker, setShowGroupIconPicker] = useState(false);
            const [showMemberEditor, setShowMemberEditor] = useState(false); // {name, index}
            const [editingMemberData, setEditingMemberData] = useState(null);
            // "เลือกว่าคุณเป็นสมาชิกคนไหน" modal
            const [showClaimMember, setShowClaimMember] = useState(false);
            const [claimGroupData, setClaimGroupData] = useState(null); // {ref, groupDoc}
            const [claimSelectedMember, setClaimSelectedMember] = useState(null); // existing member name or '__new__'
            const [claimNewName, setClaimNewName] = useState('');

            // Form states
            const [editingExpense, setEditingExpense] = useState(null);
            const [newGroupName, setNewGroupName] = useState('');
            const [newGroupEmoji, setNewGroupEmoji] = useState('✈️');
            const [newGroupColor, setNewGroupColor] = useState('#FFD1DC');
            const [editGroupName, setEditGroupName] = useState('');
            const [editGroupEmoji, setEditGroupEmoji] = useState('');
            const [editGroupColor, setEditGroupColor] = useState('');
            const [joinId, setJoinId] = useState('');
            const [newMemberName, setNewMemberName] = useState('');
            const [expDesc, setExpDesc] = useState('');
            const [expAmount, setExpAmount] = useState('');
            const [expPayer, setExpPayer] = useState('');
            const [expParticipants, setExpParticipants] = useState([]);

            // Member icon editing
            const [memberNewName, setMemberNewName] = useState('');
            const [memberNewEmoji, setMemberNewEmoji] = useState('');
            const [memberNewColor, setMemberNewColor] = useState('');
            const [memberNewShape, setMemberNewShape] = useState(DEFAULT_AVATAR_SHAPE);

            // ── Auth (with remember login) ────────────────────────────────────────
            useEffect(() => {
                let isMounted = true;
                const init = async () => {
                    // Check if user was previously logged in
                    const remembered = localStorage.getItem(REMEMBER_KEY);
                    
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            try { await auth.signInWithCustomToken(__initial_auth_token); }
                            catch { await auth.signInAnonymously(); }
                        } else if (!remembered) {
                            await auth.signInAnonymously();
                        }
                        // If remembered, Firebase will auto-restore session via persistence
                    } catch (err) { console.error("Auth Error:", err); }
                };
                
                // Set Firebase auth persistence to LOCAL so login is remembered
                auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).then(init).catch(init);
                
                const unsub = auth.onAuthStateChanged(u => {
                    if (isMounted) {
                        setUser(u);
                        setLoading(false);
                        // Save remember flag if logged in with Google
                        if (u && !u.isAnonymous) {
                            localStorage.setItem(REMEMBER_KEY, '1');
                        }
                    }
                });
                return () => { isMounted = false; unsub(); };
            }, []);

            // ── Load Dashboard ─────────────────────────────────────────────────────
            useEffect(() => {
                if (!user) return;
                const params = new URLSearchParams(window.location.search);
                const dashId = params.get('dashboard');
                if (!dashId) return;
                const ref = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(dashId);
                const unsub = ref.onSnapshot(doc => {
                    if (doc.exists) { setActiveGroup({ id: doc.id, ...doc.data() }); setView('dashboard'); setDashError(''); }
                    else { setDashError("ลิงก์แดชบอร์ดไม่ถูกต้อง หรือกลุ่มนี้ถูกลบไปแล้วครับ"); }
                }, err => {
                    if (err.message?.includes('permission')) setDashError("Permission Denied 🔒 โปรดล็อกอินเพื่อดูข้อมูล");
                    else setDashError("เกิดข้อผิดพลาดในการโหลดข้อมูลทริป ❌");
                });
                return () => unsub();
            }, [user]);

            // ── Auto-Join ──────────────────────────────────────────────────────────
            useEffect(() => {
                const process = async () => {
                    if (!user || user.isAnonymous) return;
                    const params = new URLSearchParams(window.location.search);
                    const inviteId = params.get('join');
                    if (!inviteId) return;
                    window.history.replaceState({}, document.title, window.location.pathname);
                    try {
                        const ref = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(inviteId.trim());
                        const doc = await ref.get();
                        if (doc.exists) {
                            const data = doc.data();
                            const myName = user.displayName?.split(' ')[0] || 'ฉัน';
                            // ถ้าชื่อ Google ตรงกับสมาชิกในกลุ่มแล้ว → เข้าตรงเลย ไม่ต้องถาม
                            if ((data.members||[]).includes(myName)) {
                                setActiveGroup({ id: doc.id, ...data });
                                setView('detail');
                            } else {
                                // แสดง modal ให้เลือกว่าเป็นสมาชิกคนไหน
                                setClaimGroupData({ ref, groupDoc: { id: doc.id, ...data } });
                                setClaimSelectedMember(null);
                                setClaimNewName(myName);
                                setShowClaimMember(true);
                            }
                        } else alert("ลิงก์เชิญไม่ถูกต้อง");
                    } catch (e) { handlePermissionError(e, "เข้าร่วมอัตโนมัติไม่สำเร็จ"); }
                };
                process();
            }, [user]);

            // ── Load Groups ────────────────────────────────────────────────────────
            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                if (!user || user.isAnonymous || params.get('dashboard')) return;
                const myName = user.displayName?.split(' ')[0] || 'ฉัน';
                const ref = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups');
                const unsub = ref.onSnapshot(snap => {
                    const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    const mine = data.filter(g => g.ownerId === user.uid || (g.members||[]).includes(myName))
                                     .sort((a,b) => (b.createdAt||0) - (a.createdAt||0));
                    setGroups(mine);
                    if (activeGroup && view === 'detail') {
                        const upd = mine.find(g => g.id === activeGroup.id);
                        if (upd) setActiveGroup(upd);
                    }
                }, err => { if (!err.message?.includes('permission')) handlePermissionError(err, "ดึงรายชื่อกลุ่มไม่สำเร็จ"); });
                return () => unsub();
            }, [user, activeGroup?.id, view]);

            // ── Load Expenses ──────────────────────────────────────────────────────
            useEffect(() => {
                if (!user || !activeGroup) return;
                const ref = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).collection('expenses');
                const unsub = ref.onSnapshot(snap => {
                    setExpenses(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => b.date - a.date));
                }, err => { if (!err.message?.includes('permission')) handlePermissionError(err, "ดึงรายการบิลไม่สำเร็จ"); });
                return () => unsub();
            }, [user, activeGroup?.id]);

            // ── Helpers ────────────────────────────────────────────────────────────
            const getGroupStyle = (g) => {
                if (g && typeof g === 'object') {
                    return {
                        color: g.iconColor || PASTEL_COLORS[Math.abs(hashStr(g.id||'')) % PASTEL_COLORS.length],
                        emoji: g.iconEmoji || TRAVEL_EMOJIS[Math.abs(hashStr(g.id||'')) % TRAVEL_EMOJIS.length]
                    };
                }
                // fallback for id string
                const id = g || 'default';
                let hash = hashStr(id);
                return { color: PASTEL_COLORS[Math.abs(hash) % PASTEL_COLORS.length], emoji: TRAVEL_EMOJIS[Math.abs(hash) % TRAVEL_EMOJIS.length] };
            };

            const hashStr = (s) => {
                let h = 0;
                for (let i = 0; i < s.length; i++) h = s.charCodeAt(i) + ((h << 5) - h);
                return h;
            };

            const getMemberData = (g, name) => {
                // Returns {emoji, color, shape} for a member
                const custom = (g?.memberIcons||{})[name];
                if (custom) return { ...custom, shape: custom.shape || DEFAULT_AVATAR_SHAPE };
                let hash = Math.abs(hashStr(name));
                return { color: VIBRANT_COLORS[hash % VIBRANT_COLORS.length], emoji: null, shape: DEFAULT_AVATAR_SHAPE };
            };

            const formatMoney = (v) => Number(v||0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            const formatDate = (ts) => ts ? new Date(ts).toLocaleString('th-TH', { day:'numeric', month:'short', year:'2-digit', hour:'2-digit', minute:'2-digit' }) : '';
            const evaluateMath = (str) => {
                try {
                    const s = str.toString().replace(/[^-+*/().0-9]/g, '');
                    if (!s) return 0;
                    return new Function(`return ${s}`)() || 0;
                } catch { return 0; }
            };

            // ── Actions ────────────────────────────────────────────────────────────
            const handleLogin = async () => {
                try {
                    const provider = new firebase.auth.GoogleAuthProvider();
                    await auth.signInWithPopup(provider);
                } catch (e) { console.error("Login Failed:", e); }
            };

            const handleLogout = async () => {
                localStorage.removeItem(REMEMBER_KEY);
                await auth.signOut();
            };

            const createGroup = async () => {
                if (!newGroupName.trim() || !user || user.isAnonymous) return;
                const myName = user.displayName?.split(' ')[0] || 'ฉัน';
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').add({
                        name: newGroupName.trim(),
                        iconEmoji: newGroupEmoji,
                        iconColor: newGroupColor,
                        ownerId: user.uid, ownerName: myName,
                        members: [myName], memberIcons: {},
                        createdAt: Date.now()
                    });
                    setNewGroupName(''); setNewGroupEmoji('✈️'); setNewGroupColor('#FFD1DC');
                    setShowAddGroup(false);
                } catch (e) { handlePermissionError(e, "สร้างกลุ่มไม่สำเร็จ"); }
            };

            const updateGroupIcon = async () => {
                if (!activeGroup || !user || user.isAnonymous) return;
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).update({
                        iconEmoji: editGroupEmoji, iconColor: editGroupColor, name: editGroupName
                    });
                    setShowGroupIconPicker(false);
                } catch (e) { handlePermissionError(e, "อัปเดตไอคอนไม่สำเร็จ"); }
            };

            const joinGroup = async () => {
                if (!joinId.trim() || !user || user.isAnonymous) return;
                try {
                    const myName = user.displayName?.split(' ')[0] || 'ฉัน';
                    const ref = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(joinId.trim());
                    const doc = await ref.get();
                    if (!doc.exists) { alert("ไม่พบกลุ่มนี้"); return; }
                    const data = doc.data();
                    setJoinId(''); setShowJoinGroup(false);
                    // ถ้าชื่อตรงอยู่แล้ว → เข้าตรงเลย
                    if ((data.members||[]).includes(myName)) {
                        setActiveGroup({ id: doc.id, ...data });
                        setView('detail');
                    } else {
                        // แสดง modal ให้เลือกสมาชิก
                        setClaimGroupData({ ref, groupDoc: { id: doc.id, ...data } });
                        setClaimSelectedMember(null);
                        setClaimNewName(myName);
                        setShowClaimMember(true);
                    }
                } catch (e) { handlePermissionError(e, "เข้าร่วมไม่สำเร็จ"); }
            };

            // ยืนยันการเข้ากลุ่ม: เลือกเป็นสมาชิกคนเดิม หรือเพิ่มชื่อใหม่
            const confirmClaim = async () => {
                if (!claimGroupData || !user) return;
                const { ref, groupDoc } = claimGroupData;
                const myDisplayName = user.displayName?.split(' ')[0] || 'ฉัน';

                try {
                    if (claimSelectedMember && claimSelectedMember !== '__new__') {
                        // เลือกเป็นสมาชิกที่มีอยู่ — ไม่ต้องเปลี่ยนชื่อ แค่เพิ่ม Google name ถ้ายังไม่อยู่
                        // (สมาชิกชื่อนั้นมีอยู่แล้ว ไม่ต้อง update members)
                        // เพิ่ม memberClaims map: googleUid → memberName เพื่อ track
                        await ref.update({
                            [`memberClaims.${user.uid}`]: claimSelectedMember
                        });
                        const updatedMembers = groupDoc.members || [];
                        setActiveGroup({ ...groupDoc, members: updatedMembers });
                    } else {
                        // สร้างชื่อใหม่
                        const nameToAdd = (claimNewName || '').trim() || myDisplayName;
                        if (!(groupDoc.members||[]).includes(nameToAdd)) {
                            await ref.update({
                                members: firebase.firestore.FieldValue.arrayUnion(nameToAdd),
                                [`memberClaims.${user.uid}`]: nameToAdd
                            });
                        } else {
                            await ref.update({ [`memberClaims.${user.uid}`]: nameToAdd });
                        }
                        setActiveGroup({ ...groupDoc, members: [...(groupDoc.members||[]), nameToAdd] });
                    }

                    setShowClaimMember(false);
                    setClaimGroupData(null);
                    setView('detail');
                } catch (e) { handlePermissionError(e, "ยืนยันการเข้าร่วมไม่สำเร็จ"); }
            };

            const deleteGroup = async (id, e) => {
                e.stopPropagation();
                if (!user || user.isAnonymous) return;
                if (confirm("ต้องการลบกลุ่มและข้อมูลทั้งหมดถาวรหรือไม่?")) {
                    try { await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(id).delete(); }
                    catch (e) { handlePermissionError(e, "ลบกลุ่มไม่สำเร็จ"); }
                }
            };

            const addMember = async () => {
                if (!user || user.isAnonymous || !activeGroup || !newMemberName.trim() || (activeGroup.members||[]).includes(newMemberName.trim())) return;
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).update({
                        members: firebase.firestore.FieldValue.arrayUnion(newMemberName.trim())
                    });
                    setNewMemberName('');
                } catch (e) { handlePermissionError(e, "เพิ่มสมาชิกไม่สำเร็จ"); }
            };

            const removeMember = async (name) => {
                if (!user || user.isAnonymous || !activeGroup) return;
                if (confirm(`ลบ ${name} ออกจากกลุ่ม?`)) {
                    try {
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).update({
                            members: firebase.firestore.FieldValue.arrayRemove(name)
                        });
                    } catch (e) { handlePermissionError(e, "ลบสมาชิกไม่สำเร็จ"); }
                }
            };

            // Edit member: rename + custom icon
            const openMemberEditor = (name) => {
                const custom = getMemberData(activeGroup, name);
                setEditingMemberData({ oldName: name });
                setMemberNewName(name);
                setMemberNewEmoji(custom.emoji || '');
                setMemberNewColor(custom.color || VIBRANT_COLORS[Math.abs(hashStr(name)) % VIBRANT_COLORS.length]);
                setMemberNewShape(custom.shape || DEFAULT_AVATAR_SHAPE);
                setShowMemberEditor(true);
            };

            const saveMemberEdit = async () => {
                if (!activeGroup || !user || user.isAnonymous || !editingMemberData) return;
                const { oldName } = editingMemberData;
                const newName = memberNewName.trim();
                if (!newName) return;

                const groupRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id);
                const expRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).collection('expenses');

                try {
                    // Build updated members array
                    const newMembers = (activeGroup.members||[]).map(m => m === oldName ? newName : m);
                    
                    // Update member icons
                    const memberIcons = { ...(activeGroup.memberIcons||{}) };
                    if (oldName !== newName) {
                        if (memberIcons[oldName]) { memberIcons[newName] = memberIcons[oldName]; delete memberIcons[oldName]; }
                    }
                    memberIcons[newName] = { emoji: memberNewEmoji || null, color: memberNewColor, shape: memberNewShape };

                    await groupRef.update({ members: newMembers, memberIcons });

                    // If renamed, update all expenses
                    if (oldName !== newName) {
                        const snap = await expRef.get();
                        const batch = db.batch();
                        snap.docs.forEach(doc => {
                            const d = doc.data();
                            let changed = false;
                            const update = {};
                            if (d.payer === oldName) { update.payer = newName; changed = true; }
                            if ((d.participants||[]).includes(oldName)) {
                                update.participants = d.participants.map(p => p === oldName ? newName : p);
                                changed = true;
                            }
                            if (changed) batch.update(doc.ref, update);
                        });
                        await batch.commit();
                    }
                    setShowMemberEditor(false);
                    setEditingMemberData(null);
                } catch (e) { handlePermissionError(e, "แก้ไขสมาชิกไม่สำเร็จ"); }
            };

            const saveExpense = async () => {
                if (!user || user.isAnonymous || !activeGroup) return;
                const amount = evaluateMath(expAmount);
                if (!expDesc || amount <= 0 || !expPayer) return;
                const data = { description: expDesc, amount, payer: expPayer, participants: expParticipants, date: editingExpense ? editingExpense.date : Date.now() };
                try {
                    const ref = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).collection('expenses');
                    if (editingExpense) await ref.doc(editingExpense.id).update(data);
                    else await ref.add(data);
                    setShowExpenseModal(false); setEditingExpense(null);
                } catch (e) { handlePermissionError(e, "บันทึกบิลไม่สำเร็จ"); }
            };

            const deleteExpense = async (id) => {
                if (!user || user.isAnonymous || !activeGroup) return;
                if (confirm("ลบรายการนี้ใช่หรือไม่?")) {
                    try { await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).collection('expenses').doc(id).delete(); }
                    catch (e) { handlePermissionError(e, "ลบบิลไม่สำเร็จ"); }
                }
            };

            const shareLink = () => {
                if (!activeGroup) return;
                const base = window.location.href.split('?')[0];
                const url = `${base}?join=${activeGroup.id}`;
                navigator.clipboard?.writeText(url) || fallbackCopy(url);
                if (base.startsWith('blob:')) alert("⚠️ Preview mode — upload to web hosting first");
                else alert("คัดลอกลิงก์เชิญแล้ว! 🔗✨");
            };

            const copyDashboardLink = () => {
                if (!activeGroup) return;
                const base = window.location.href.split('?')[0];
                const url = `${base}?dashboard=${activeGroup.id}`;
                navigator.clipboard?.writeText(url) || fallbackCopy(url);
                if (base.startsWith('blob:')) alert("⚠️ Preview mode");
                else alert("คัดลอกลิงก์ Dashboard แล้ว! 📊✨");
            };

            const fallbackCopy = (text) => {
                const el = document.createElement('textarea');
                el.value = text; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
            };

            const exportImage = async () => {
                setExporting(true);
                const el = document.getElementById('export-area');
                el.style.cssText = "position:fixed;left:0;top:0;z-index:-9999;";
                try {
                    const canvas = await html2canvas(el, { scale:2, backgroundColor:'#FFE4E1', useCORS:true, width:1200, height:el.scrollHeight, windowWidth:1200 });
                    const link = document.createElement('a');
                    link.download = `สรุปยอด_${activeGroup.name}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                } catch (e) { console.error(e); }
                el.style.cssText = "position:absolute;left:-9999px;top:0;width:1200px;height:auto;z-index:-9999;";
                setExporting(false);
            };

            const exportExcel = () => {
                const data = [
                    ["กลุ่ม:", activeGroup.name], ["ยอดรวม:", totalSpent], [],
                    ["รายละเอียด","จำนวนเงิน","ผู้จ่าย","ผู้ร่วมหาร"],
                    ...expenses.map(e => [e.description, e.amount, e.payer, (e.participants||[]).join(', ')]),
                    [],["จาก","ถึง","จำนวนที่ต้องโอน"],
                    ...settlements.map(s => [s.from, s.to, s.amount]),
                    [],["ชื่อสมาชิก","ออกไปแล้ว","ยอดรับผิดชอบ","สรุป"],
                    ...individualShares.map(i => [i.name, i.paid, i.share, i.balance > 0 ? `ได้คืน ${i.balance.toFixed(2)}` : i.balance < 0 ? `จ่ายเพิ่ม ${Math.abs(i.balance).toFixed(2)}` : "พอดี"])
                ];
                const ws = XLSX.utils.aoa_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "สรุปบิลทริป");
                XLSX.writeFile(wb, `Expenses_${activeGroup.name}.xlsx`);
            };

            // ── Computed ───────────────────────────────────────────────────────────
            const totalSpent = useMemo(() => expenses.reduce((s, e) => s + e.amount, 0), [expenses]);

            const individualShares = useMemo(() => {
                if (!activeGroup?.members) return [];
                const stats = {};
                activeGroup.members.forEach(m => stats[m] = { paid:0, share:0, balance:0 });
                expenses.forEach(e => {
                    if (stats[e.payer]) stats[e.payer].paid += e.amount;
                    const parts = e.participants || [];
                    if (parts.length > 0) {
                        const share = e.amount / parts.length;
                        parts.forEach(p => { if (stats[p]) stats[p].share += share; });
                    }
                });
                return Object.keys(stats).map(name => ({ name, ...stats[name], balance: stats[name].paid - stats[name].share }))
                    .sort((a,b) => b.balance - a.balance);
            }, [activeGroup, expenses]);

            const settlements = useMemo(() => {
                if (!activeGroup || activeGroup.members?.length < 2) return [];
                const bal = {};
                activeGroup.members.forEach(m => bal[m] = 0);
                expenses.forEach(e => {
                    const share = e.amount / (e.participants||[]).length;
                    bal[e.payer] += e.amount;
                    (e.participants||[]).forEach(p => { if (bal.hasOwnProperty(p)) bal[p] -= share; });
                });
                const creds = [], debts = [];
                Object.keys(bal).forEach(n => {
                    if (bal[n] > 0.01) creds.push({name:n, amt:bal[n]});
                    else if (bal[n] < -0.01) debts.push({name:n, amt:Math.abs(bal[n])});
                });
                const res = []; let i=0, j=0;
                while (i < debts.length && j < creds.length) {
                    const pay = Math.min(debts[i].amt, creds[j].amt);
                    res.push({from:debts[i].name, to:creds[j].name, amount:pay});
                    debts[i].amt -= pay; creds[j].amt -= pay;
                    if (debts[i].amt < 0.01) i++;
                    if (creds[j].amt < 0.01) j++;
                }
                return res;
            }, [activeGroup, expenses]);

            // ── Sub-components ─────────────────────────────────────────────────────
            const GroupIcon = ({ group, size = "md" }) => {
                const style = getGroupStyle(group);
                let cls = "";
                if (size === "xl") cls = "w-20 h-20 text-[42px] rounded-[24px] border-[5px]";
                else if (size === "lg") cls = "w-16 h-16 text-[32px] rounded-[20px] border-4";
                else if (size === "sm") cls = "w-10 h-10 text-[20px] rounded-[14px] border-2";
                else cls = "w-12 h-12 text-[24px] rounded-[18px] border-4";
                return (
                    <div style={{ backgroundColor: style.color }} className={`${cls} flex items-center justify-center border-white shadow-md shrink-0`}>
                        {style.emoji}
                    </div>
                );
            };

            const Avatar = ({ name, group, size = "sm" }) => {
                const data = group ? getMemberData(group, name) : { color: VIBRANT_COLORS[Math.abs(hashStr(name||'')) % VIBRANT_COLORS.length], emoji: null, shape: DEFAULT_AVATAR_SHAPE };
                const shapeObj = AVATAR_SHAPES.find(s => s.id === (data.shape || DEFAULT_AVATAR_SHAPE)) || AVATAR_SHAPES[0];
                let szClass = "", fontClass = "";
                if (size === "xs") { szClass = "w-7 h-7"; fontClass = "text-[14px]"; }
                else if (size === "sm") { szClass = "w-8 h-8"; fontClass = "text-[16px]"; }
                else if (size === "md") { szClass = "w-10 h-10"; fontClass = "text-[20px]"; }
                else { szClass = "w-14 h-14"; fontClass = "text-[28px]"; }
                return (
                    <div className="shrink-0 filter drop-shadow-sm">
                        <div style={{ backgroundColor: data.color }} className={`${szClass} ${shapeObj.cls} flex items-center justify-center ${data.emoji ? '' : 'font-black text-white'}`}>
                            <span className={`${fontClass} leading-none mt-0.5 drop-shadow-sm`}>
                                {data.emoji || (name ? name[0].toUpperCase() : '')}
                            </span>
                        </div>
                    </div>
                );
            };

            // ── Loading Screen ─────────────────────────────────────────────────────
            if (loading) return <div className="h-screen flex items-center justify-center"><div className="loader"></div></div>;

            // ── Login Screen ───────────────────────────────────────────────────────
            if (!user || (user.isAnonymous && !dashIdFromUrl && view !== 'dashboard')) {
                return (
                    <div className="h-screen flex items-center justify-center p-4 animate-pop">
                        <div className="glass-card p-8 text-center max-w-xs w-full shadow-2xl">
                            <div className="w-20 h-20 bg-gradient-to-br from-[#FFB6C1] to-[#FFC0CB] rounded-[24px] flex items-center justify-center mx-auto mb-5 shadow-lg text-5xl border-4 border-white">🧸</div>
                            <h1 className="text-2xl font-bold mb-1 text-[#2B3A4A]">Expense Pro</h1>
                            <p className="text-xs text-slate-500 mb-6 leading-relaxed font-medium">แอปจัดการบิลกลุ่มและทริปเพื่อน<br/>เข้าสู่ระบบเพื่อดูทริปของคุณ ✨</p>
                            <button onClick={handleLogin} className="btn-primary w-full py-3 px-5 flex items-center justify-center gap-2 font-bold shadow-lg text-sm">
                                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-5 h-5 bg-white rounded-full p-0.5" />
                                เข้าสู่ระบบด้วย Google
                            </button>
                            <p className="text-[10px] text-slate-400 mt-3">ระบบจะจดจำการเข้าสู่ระบบของคุณอัตโนมัติ 🔑</p>
                        </div>
                    </div>
                );
            }

            // ── Main Render ────────────────────────────────────────────────────────
            return (
                <div className="min-h-screen pb-16">
                    {/* Header */}
                    <header className="p-3 sticky top-0 z-50">
                        <div className="max-w-2xl mx-auto glass-card px-4 py-2.5 flex items-center justify-between shadow-md">
                            <div className="flex items-center gap-2">
                                {view === 'detail' && <button onClick={() => setView('list')} className="p-1.5 hover:bg-white/50 rounded-xl transition-all"><LucideIcon name="arrow-left" className="w-5 h-5" /></button>}
                                {view === 'dashboard' && <button onClick={() => { window.location.href = window.location.href.split('?')[0]; }} className="p-1.5 hover:bg-white/50 rounded-xl transition-all"><LucideIcon name="home" className="w-5 h-5" /></button>}
                                <div className="flex items-center gap-1.5">
                                    {view === 'detail' && activeGroup && <GroupIcon group={activeGroup} size="sm" />}
                                    <h2 className="text-base font-bold truncate max-w-[140px] sm:max-w-none text-[#2B3A4A]">
                                        {view === 'list' ? '🧸 ทริปของฉัน' : view === 'dashboard' ? '📊 แดชบอร์ด' : activeGroup?.name}
                                    </h2>
                                    {view === 'detail' && (
                                        <button onClick={() => { setEditGroupName(activeGroup.name); setEditGroupEmoji(getGroupStyle(activeGroup).emoji); setEditGroupColor(getGroupStyle(activeGroup).color); setShowGroupIconPicker(true); }} className="text-slate-400 hover:text-blue-500 p-1">
                                            <LucideIcon name="edit-2" className="w-3.5 h-3.5" />
                                        </button>
                                    )}
                                </div>
                            </div>
                            <div className="flex items-center gap-2">
                                {(!user || user.isAnonymous) ? (
                                    <button onClick={handleLogin} className="text-xs font-bold bg-white px-3 py-1.5 rounded-xl shadow-sm">เข้าสู่ระบบ</button>
                                ) : (
                                    <div className="relative group flex items-center gap-2">
                                        <div className="hidden sm:block text-right">
                                            <p className="text-[9px] text-slate-400 font-bold uppercase">โปรไฟล์</p>
                                            <p className="text-xs font-bold">{user.displayName?.split(' ')[0]}</p>
                                        </div>
                                        <div className="relative">
                                            <img src={user.photoURL || ''} className="w-9 h-9 rounded-[16px] border-2 border-white shadow-md object-cover" />
                                            <button onClick={handleLogout} className="absolute -top-1 -right-1 bg-white p-1 rounded-full shadow-sm border border-[#FFD1DC] text-red-400 opacity-0 group-hover:opacity-100 transition-opacity">
                                                <LucideIcon name="log-out" className="w-2.5 h-2.5" />
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-2xl mx-auto px-3 mt-4 animate-pop">

                    {/* ─── LIST VIEW ─────────────────────────────────────────────────── */}
                    {view === 'list' && (
                        <div className="space-y-4">
                            <div className="flex gap-3">
                                <button onClick={() => setShowAddGroup(true)} className="btn-primary flex-1 py-6 shadow-md flex flex-col items-center justify-center gap-2 text-sm font-bold">
                                    <div className="bg-white/40 p-2 rounded-xl"><LucideIcon name="plus-circle" className="w-6 h-6" /></div>
                                    สร้างทริปใหม่
                                </button>
                                <button onClick={() => setShowJoinGroup(true)} className="btn-secondary flex-1 py-6 shadow-md flex flex-col items-center justify-center gap-2 text-sm font-bold">
                                    <div className="bg-white/40 p-2 rounded-xl"><LucideIcon name="users" className="w-6 h-6" /></div>
                                    เข้าทริปเพื่อน
                                </button>
                            </div>
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                {groups.map(g => (
                                    <div key={g.id} onClick={() => { setActiveGroup(g); setView('detail'); }} className="glass-card p-4 cursor-pointer relative group/card hover:shadow-xl hover:-translate-y-0.5 transition-all bg-white/40">
                                        <button onClick={(e) => deleteGroup(g.id, e)} className="absolute top-3 right-3 text-slate-300 hover:text-red-400 opacity-0 group-hover/card:opacity-100 transition-opacity p-1.5 bg-white/60 rounded-full z-10">
                                            <LucideIcon name="trash-2" className="w-4 h-4" />
                                        </button>

                                            <div style={{display:'flex', justifyContent:'space-between'}}>
                                                <div><p style={{fontSize:'11px', color:'#94a3b8', margin:'0 0 4px'}}>ออกไปแล้ว</p><p style={{fontSize:'24px', fontWeight:'900', color:'#89CFF0', margin:0}}>฿{formatMoney(item.paid)}</p></div>
                                                <div style={{textAlign:'right'}}><p style={{fontSize:'11px', color:'#94a3b8', margin:'0 0 4px'}}>รับผิดชอบ</p><p style={{fontSize:'24px', fontWeight:'900', color:'#FF9EAE', margin:0}}>฿{formatMoney(item.share)}</p></div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div style={{background:'rgba(181,234,215,0.2)', border:'4px solid rgba(181,234,215,0.4)', borderRadius:'32px', padding:'32px'}}>
                                <h3 style={{fontSize:'28px', fontWeight:'bold', borderLeft:'8px solid #B5EAD7', paddingLeft:'16px', margin:'0 0 24px 0', fontFamily:'Mitr, sans-serif'}}>สรุปการเคลียร์เงิน</h3>
                                {settlements.map((s, idx) => (
                                    <div key={idx} style={{display:'flex', alignItems:'center', justifyContent:'space-between', background:'rgba(255,255,255,0.9)', padding:'20px 24px', borderRadius:'20px', marginBottom:'12px', border:'3px solid white'}}>
                                        <div style={{display:'flex', alignItems:'center', gap:'16px', flex:1}}>
                                            <ExportAvatarSm name={s.from} />
                                            <span style={{fontWeight:'bold', fontSize:'20px'}}>{s.from}</span>
                                            <div style={{background:'#E0F7FA', color:'#55ABC8', padding:'4px 16px', borderRadius:'999px', fontSize:'14px', fontWeight:'bold'}}>จ่ายให้ ➔</div>
                                            <ExportAvatarSm name={s.to} />
                                            <span style={{fontWeight:'bold', fontSize:'20px'}}>{s.to}</span>
                                        </div>
                                        <div style={{paddingLeft:'24px', borderLeft:'3px solid #f1f5f9', textAlign:'right'}}>
                                            <p style={{fontSize:'11px', color:'#94a3b8', margin:'0 0 2px', fontWeight:'bold', textTransform:'uppercase'}}>ต้องโอน</p>
                                            <p style={{fontSize:'32px', fontWeight:'900', color:'#89CFF0', margin:0}}>฿{formatMoney(s.amount)}</p>
                                        </div>
                                    </div>
                                ))}
                                {settlements.length === 0 && <div style={{textAlign:'center', opacity:0.4, fontSize:'24px', fontWeight:'bold', padding:'40px'}}>ไม่มีการโอนค้างชำระ ✨</div>}
                            </div>
                            <div style={{textAlign:'center', marginTop:'20px', opacity:0.5}}>
                                <p style={{fontWeight:'bold', textTransform:'uppercase', letterSpacing:'10px', fontSize:'13px', fontFamily:'Mitr, sans-serif'}}>Generated by Expense Pro 🧸</p>
                            </div>
                        </div>
                            );
                        })()}
                    </div>
                </div>
            );
        }

        const root = ReactDOMClient.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
