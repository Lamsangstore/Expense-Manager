<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Pro - หารทริปกับเพื่อน</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✈️</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- External Libraries for Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Mitr:wght@400;500;600&family=Sarabun:wght@300;400;500;600&display=swap');

        :root {
            --font-display: 'Mitr', sans-serif;
            --font-body: 'Sarabun', sans-serif;
            --clr-ink: #2B3A4A;
            --radius-card: 28px;
        }

        body {
            font-family: var(--font-body);
            color: var(--clr-ink);
            margin: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            /* ธีมไล่สีพาสเทล ฟ้า-ชมพู */
            background: linear-gradient(135deg, #FFE4E1 0%, #FFF0F5 30%, #E6E6FA 60%, #E0F7FA 100%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        h1, h2, h3, h4 { font-family: var(--font-display); }

        /* การไล่สีพื้นหลังของกล่อง Glassmorphism */
        .glass-card {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: var(--radius-card);
            box-shadow: 0 12px 40px -8px rgba(255, 182, 193, 0.25);
        }

        /* ปุ่มหลักโทนชมพูพาสเทล */
        .btn-primary {
            background: linear-gradient(135deg, #FFB6C1, #FFC0CB);
            color: #2B3A4A;
            border-bottom: 5px solid #FF9EAE;
            border-radius: 24px;
            transition: all 0.1s;
        }
        .btn-primary:active { transform: translateY(3px); border-bottom-width: 2px; }

        /* ปุ่มรองโทนฟ้าพาสเทล */
        .btn-secondary {
            background: linear-gradient(135deg, #B0E0E6, #ADD8E6);
            color: #2B3A4A;
            border-bottom: 5px solid #90C8D6;
            border-radius: 24px;
            transition: all 0.1s;
        }
        .btn-secondary:active { transform: translateY(3px); border-bottom-width: 2px; }

        /* คลาสหน้าตารูปดอกไม้ (Flower Shape) ด้วย mask-image */
        .shape-flower {
            -webkit-mask-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M50 0 A 15 15 0 0 1 65 15 A 15 15 0 0 1 85 15 A 15 15 0 0 1 85 35 A 15 15 0 0 1 100 50 A 15 15 0 0 1 85 65 A 15 15 0 0 1 85 85 A 15 15 0 0 1 65 85 A 15 15 0 0 1 50 100 A 15 15 0 0 1 35 85 A 15 15 0 0 1 15 85 A 15 15 0 0 1 15 65 A 15 15 0 0 1 0 50 A 15 15 0 0 1 15 35 A 15 15 0 0 1 15 15 A 15 15 0 0 1 35 15 A 15 15 0 0 1 50 0 Z'/%3E%3C/svg%3E");
            -webkit-mask-size: 100% 100%;
            mask-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M50 0 A 15 15 0 0 1 65 15 A 15 15 0 0 1 85 15 A 15 15 0 0 1 85 35 A 15 15 0 0 1 100 50 A 15 15 0 0 1 85 65 A 15 15 0 0 1 85 85 A 15 15 0 0 1 65 85 A 15 15 0 0 1 50 100 A 15 15 0 0 1 35 85 A 15 15 0 0 1 15 85 A 15 15 0 0 1 15 65 A 15 15 0 0 1 0 50 A 15 15 0 0 1 15 35 A 15 15 0 0 1 15 15 A 15 15 0 0 1 35 15 A 15 15 0 0 1 50 0 Z'/%3E%3C/svg%3E");
            mask-size: 100% 100%;
        }

        .animate-pop { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }
        @keyframes popIn { from { opacity: 0; transform: scale(0.92) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .loader {
            width: 32px; height: 32px;
            border: 4px solid rgba(255, 255, 255, 0.5); border-top-color: #FFB6C1;
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #export-area { position: absolute; left: -9999px; top: 0; width: 400px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Firebase Initialization
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : {
                apiKey: "AIzaSyCwnWHqG__ty3OvDok2o6orgreXOu5LSXk",
                authDomain: "expense-manager-14564.firebaseapp.com",
                projectId: "expense-manager-14564",
                storageBucket: "expense-manager-14564.firebasestorage.app",
                messagingSenderId: "259280883710",
                appId: "1:259280883710:web:67d7ce7b1f8e5e196a7aaf"
            };

        const appId = (typeof __app_id !== 'undefined' && __app_id) ? __app_id : 'default-trip-app';

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ชุด Emoji สุ่มแทนไอคอนเดิม
        const TRAVEL_EMOJIS = ['✈️', '🏝️', '🏕️', '🏔️', '🏰', '🗽', '🌸', '🌈', '🎨', '🎈', '🎠', '🏖️', '🗼', '⛩️', '🚤', '🍩', '📸', '🧸'];
        
        // ชุดสีพาสเทล 20 สี เพื่อความแตกต่างของแต่ละคน
        const PASTEL_COLORS = [
            '#FFD1DC', '#F8E2E9', '#FADADD', '#E6E6FA', '#E0F7FA', 
            '#D0E8F2', '#B0E0E6', '#FFB6C1', '#FFDAC1', '#FFB7B2', 
            '#FF9AA2', '#E2F0CB', '#B5EAD7', '#C7CEEA', '#F1CBFF', 
            '#D4F0F0', '#FDFD96', '#FFDFD3', '#FEC8D8', '#D291BC'
        ];

        const handlePermissionError = (e, contextMessage) => {
            console.error(`${contextMessage} Error:`, e);
            if (e.message && (e.message.includes('permission') || e.message.includes('insufficient'))) {
                alert(`⚠️ ${contextMessage} (Permission Denied)\nกรุณาตรวจสอบกฎของ Firestore ใน Firebase Console`);
            } else {
                alert(`${contextMessage}: ${e.message}`);
            }
        };

        // Component สำหรับแสดง Icon อย่างปลอดภัย เพื่อป้องกัน React removeChild Error
        const LucideIcon = ({ name, className = "" }) => {
            const iconRef = React.useRef(null);
            React.useEffect(() => {
                if (iconRef.current && window.lucide) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}" class="${className}"></i>`;
                    window.lucide.createIcons({ root: iconRef.current });
                }
            }, [name, className]);
            return <span ref={iconRef} style={{ display: 'contents' }} />;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('list');
            const [groups, setGroups] = useState([]);
            const [activeGroup, setActiveGroup] = useState(null);
            const [expenses, setExpenses] = useState([]);
            const [loading, setLoading] = useState(true);
            const [exporting, setExporting] = useState(false);

            // Modals & Inputs
            const [showAddGroup, setShowAddGroup] = useState(false);
            const [showJoinGroup, setShowJoinGroup] = useState(false);
            const [showExpenseModal, setShowExpenseModal] = useState(false);
            const [showEditGroup, setShowEditGroup] = useState(false);
            
            const [editingExpense, setEditingExpense] = useState(null);
            const [newGroupName, setNewGroupName] = useState('');
            const [editGroupName, setEditGroupName] = useState('');
            const [joinId, setJoinId] = useState('');
            const [newMemberName, setNewMemberName] = useState('');
            const [expDesc, setExpDesc] = useState('');
            const [expAmount, setExpAmount] = useState('');
            const [expPayer, setExpPayer] = useState('');
            const [expParticipants, setExpParticipants] = useState([]);

            // Rule 3: Auth Initialization
            useEffect(() => {
                let isMounted = true;
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (err) {
                        console.error("Auth Error:", err);
                    }
                };

                initAuth();

                const unsubscribe = auth.onAuthStateChanged((u) => {
                    if (isMounted) {
                        setUser(u);
                        setLoading(false);
                    }
                });
                return () => { isMounted = false; unsubscribe(); };
            }, []);

            // ดึงข้อมูลกลุ่ม
            useEffect(() => {
                if (!user || user.isAnonymous) return;
                const myName = user.displayName?.split(' ')[0] || 'ฉัน';
                
                const groupsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups');
                
                const unsubscribe = groupsRef.onSnapshot((snap) => {
                    const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    const myGroups = data
                        .filter(g => g.ownerId === user.uid || (g.members && g.members.includes(myName)))
                        .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
                    
                    setGroups(myGroups);
                    
                    if (activeGroup) {
                        const updated = myGroups.find(g => g.id === activeGroup.id);
                        if (updated) setActiveGroup(updated);
                    }
                }, (err) => console.error("Firestore Groups Error:", err));
                
                return () => unsubscribe();
            }, [user, activeGroup?.id]);

            // ดึงข้อมูลค่าใช้จ่าย
            useEffect(() => {
                if (!user || user.isAnonymous || !activeGroup) return;
                const expRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).collection('expenses');
                
                const unsubscribe = expRef.onSnapshot((snap) => {
                    const list = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setExpenses(list.sort((a, b) => b.date - a.date));
                }, (err) => console.error("Firestore Expenses Error:", err));

                return () => unsubscribe();
            }, [user, activeGroup?.id]);

            // Helpers สำหรับสุ่ม Emoji และ สี ตามไอดีกลุ่ม/ชื่อ
            const getGroupStyle = (id = "default") => {
                let hash = 0;
                for (let i = 0; i < id.length; i++) hash = id.charCodeAt(i) + ((hash << 5) - hash);
                const color = PASTEL_COLORS[Math.abs(hash) % PASTEL_COLORS.length];
                const emoji = TRAVEL_EMOJIS[Math.abs(hash) % TRAVEL_EMOJIS.length];
                return { color, emoji };
            };

            const getMemberColor = (name) => {
                let hash = 0;
                for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
                return PASTEL_COLORS[Math.abs(hash) % PASTEL_COLORS.length];
            };

            const formatMoney = (v) => Number(v || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            
            const formatDate = (timestamp) => {
                if (!timestamp) return '';
                return new Date(timestamp).toLocaleString('th-TH', {
                    day: 'numeric', month: 'short', year: '2-digit',
                    hour: '2-digit', minute: '2-digit'
                });
            };

            const evaluateMath = (str) => {
                try {
                    const sanitized = str.toString().replace(/[^-+*/().0-9]/g, '');
                    if (!sanitized) return 0;
                    return new Function(`return ${sanitized}`)() || 0;
                } catch (e) { return 0; }
            };

            const shareLink = () => {
                if (!activeGroup) return;
                const baseUrl = window.location.href.split('?')[0];
                const url = `${baseUrl}?join=${activeGroup.id}`;
                
                const el = document.createElement('textarea');
                el.value = url;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                alert("คัดลอกลิงก์เชิญเพื่อนแล้ว! ส่งให้เพื่อนกดเข้าร่วมทริปได้เลยทันที 🔗✨");
            };

            const handleLogin = async () => {
                try {
                    const provider = new firebase.auth.GoogleAuthProvider();
                    await auth.signInWithPopup(provider);
                } catch (e) {
                    console.error("Login Failed:", e);
                }
            };

            const createGroup = async () => {
                if (!newGroupName.trim() || !user || user.isAnonymous) return;
                const myName = user.displayName?.split(' ')[0] || 'ฉัน';
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').add({
                        name: newGroupName.trim(),
                        ownerId: user.uid,
                        ownerName: myName,
                        members: [myName],
                        createdAt: Date.now()
                    });
                    setNewGroupName('');
                    setShowAddGroup(false);
                } catch (e) { handlePermissionError(e, "สร้างกลุ่มไม่สำเร็จ"); }
            };

            const updateGroupName = async () => {
                if (!editGroupName.trim() || !activeGroup || !user || user.isAnonymous) return;
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).update({
                        name: editGroupName.trim()
                    });
                    setShowEditGroup(false);
                } catch (e) { handlePermissionError(e, "เปลี่ยนชื่อกลุ่มไม่สำเร็จ"); }
            };

            const joinGroup = async () => {
                if (!joinId.trim() || !user || user.isAnonymous) return;
                try {
                    const myName = user.displayName?.split(' ')[0] || 'ฉัน';
                    const groupRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(joinId.trim());
                    const doc = await groupRef.get();
                    if (!doc.exists) { alert("ไม่พบกลุ่มนี้ กรุณาตรวจสอบ ID อีกครั้ง"); return; }
                    
                    const data = doc.data();
                    if (!(data.members || []).includes(myName)) {
                        await groupRef.update({ members: firebase.firestore.FieldValue.arrayUnion(myName) });
                        alert(`เข้าร่วมกลุ่ม "${data.name}" สำเร็จ! 🎉`);
                    } else {
                        alert("คุณอยู่ในกลุ่มนี้อยู่แล้วครับ");
                    }
                    setJoinId('');
                    setShowJoinGroup(false);
                } catch (e) { handlePermissionError(e, "เข้าร่วมไม่สำเร็จ"); }
            };

            const deleteGroup = async (id, e) => {
                e.stopPropagation();
                if (!user || user.isAnonymous) return;
                if (confirm("ต้องการลบกลุ่มและข้อมูลทั้งหมดถาวรหรือไม่?")) {
                    try {
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(id).delete();
                    } catch (e) { handlePermissionError(e, "ลบกลุ่มไม่สำเร็จ"); }
                }
            };

            const addMember = async () => {
                if (!user || user.isAnonymous || !activeGroup) return;
                if (!newMemberName.trim() || activeGroup.members.includes(newMemberName.trim())) return;
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).update({
                        members: firebase.firestore.FieldValue.arrayUnion(newMemberName.trim())
                    });
                    setNewMemberName('');
                } catch (e) { handlePermissionError(e, "เพิ่มสมาชิกไม่สำเร็จ"); }
            };

            const removeMember = async (name) => {
                if (!user || user.isAnonymous || !activeGroup) return;
                if (confirm(`ลบ ${name} ออกจากกลุ่ม?`)) {
                    try {
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).update({
                            members: firebase.firestore.FieldValue.arrayRemove(name)
                        });
                    } catch (e) { handlePermissionError(e, "ลบสมาชิกไม่สำเร็จ"); }
                }
            };

            const saveExpense = async () => {
                if (!user || user.isAnonymous || !activeGroup) return;
                const amount = evaluateMath(expAmount);
                if (!expDesc || amount <= 0 || !expPayer) return;
                
                const data = {
                    description: expDesc, amount, payer: expPayer, participants: expParticipants,
                    date: editingExpense ? editingExpense.date : Date.now()
                };
                
                try {
                    const ref = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).collection('expenses');
                    if (editingExpense) await ref.doc(editingExpense.id).update(data);
                    else await ref.add(data);

                    setShowExpenseModal(false);
                    setEditingExpense(null);
                } catch (e) { handlePermissionError(e, "บันทึกบิลไม่สำเร็จ"); }
            };

            const deleteExpense = async (id) => {
                if (!user || user.isAnonymous || !activeGroup) return;
                if (confirm("ลบรายการนี้ใช่หรือไม่?")) {
                    try {
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).collection('expenses').doc(id).delete();
                    } catch (e) { handlePermissionError(e, "ลบบิลไม่สำเร็จ"); }
                }
            };

            // ระบบ Auto-Join เมื่อเข้าผ่านลิงก์
            useEffect(() => {
                const processInviteLink = async () => {
                    if (!user || user.isAnonymous) return;
                    
                    const params = new URLSearchParams(window.location.search);
                    const inviteId = params.get('join');
                    
                    if (inviteId) {
                        try {
                            const myName = user.displayName?.split(' ')[0] || 'ฉัน';
                            const groupRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(inviteId);
                            const doc = await groupRef.get();
                            
                            if (doc.exists) {
                                const data = doc.data();
                                if (!(data.members || []).includes(myName)) {
                                    await groupRef.update({ members: firebase.firestore.FieldValue.arrayUnion(myName) });
                                    alert(`เข้าร่วมกลุ่ม "${data.name}" ผ่านลิงก์เชิญสำเร็จ! 🎉`);
                                }
                                
                                const updatedGroup = { id: doc.id, ...data, members: [...new Set([...(data.members||[]), myName])] };
                                setActiveGroup(updatedGroup);
                                setView('detail');
                            } else {
                                alert("ลิงก์เชิญไม่ถูกต้อง หรือกลุ่มนี้ถูกลบไปแล้ว");
                            }
                        } catch (e) {
                            console.error("Auto-join error:", e);
                        } finally {
                            window.history.replaceState({}, document.title, window.location.pathname);
                        }
                    }
                };
                
                processInviteLink();
            }, [user]);

            const exportImage = async () => {
                setExporting(true);
                const element = document.getElementById('export-area');
                element.style.position = "relative";
                element.style.left = "0";
                try {
                    const canvas = await html2canvas(element, { scale: 2, backgroundColor: '#FFE4E1' });
                    const link = document.createElement('a');
                    link.download = `สรุปยอด_${activeGroup.name}.png`;
                    link.href = canvas.toDataURL();
                    link.click();
                } catch (e) { console.error(e); }
                element.style.position = "absolute";
                element.style.left = "-9999px";
                setExporting(false);
            };

            // Calculations
            const totalSpent = useMemo(() => expenses.reduce((s, e) => s + e.amount, 0), [expenses]);
            
            // สรุปค่าใช้จ่ายที่แต่ละคนต้องจ่ายทั้งหมด (แบบละเอียด)
            const individualShares = useMemo(() => {
                if (!activeGroup || !activeGroup.members) return [];
                const stats = {};
                activeGroup.members.forEach(m => stats[m] = { paid: 0, share: 0, balance: 0 });
                
                expenses.forEach(e => {
                    // ออกเงินไปแล้ว
                    if (stats[e.payer]) stats[e.payer].paid += e.amount;
                    
                    // ส่วนที่ต้องรับผิดชอบ
                    const parts = e.participants || [];
                    if (parts.length > 0) {
                        const sharePerPerson = e.amount / parts.length;
                        parts.forEach(p => {
                            if (stats[p]) stats[p].share += sharePerPerson;
                        });
                    }
                });
                
                return Object.keys(stats).map(name => {
                    const s = stats[name];
                    s.balance = s.paid - s.share; // + ได้คืน, - ต้องจ่ายเพิ่ม
                    return { name, ...s };
                }).sort((a, b) => b.balance - a.balance);
            }, [activeGroup, expenses]);

            // สรุปการเคลียร์เงิน (ใครโอนให้ใคร)
            const settlements = useMemo(() => {
                if (!activeGroup || activeGroup.members.length < 2) return [];
                const balances = {};
                activeGroup.members.forEach(m => balances[m] = 0);
                expenses.forEach(e => {
                    const share = e.amount / (e.participants || []).length;
                    balances[e.payer] += e.amount;
                    (e.participants || []).forEach(p => { if (balances.hasOwnProperty(p)) balances[p] -= share; });
                });
                const creditors = [], debtors = [];
                Object.keys(balances).forEach(n => {
                    if (balances[n] > 0.01) creditors.push({ name: n, amt: balances[n] });
                    else if (balances[n] < -0.01) debtors.push({ name: n, amt: Math.abs(balances[n]) });
                });
                const res = []; let i = 0, j = 0;
                while (i < debtors.length && j < creditors.length) {
                    const pay = Math.min(debtors[i].amt, creditors[j].amt);
                    res.push({ from: debtors[i].name, to: creditors[j].name, amount: pay });

                return res;

                    {showAddGroup && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-[#2B3A4A]/20 backdrop-blur-md animate-pop">
                            <div className="glass-card p-10 w-full max-w-sm text-center shadow-2xl bg-white/90">
                                <h3 className="text-2xl font-bold mb-2 text-[#2B3A4A]">ทริปใหม่ไปไหนดี? 🏕️</h3>
                                <p className="text-xs text-slate-400 mb-8">ตั้งชื่อทริปของคุณให้จำง่าย</p>
                                <input autoFocus value={newGroupName} onChange={e => setNewGroupName(e.target.value)} onKeyDown={e => e.key === 'Enter' && createGroup()} placeholder="เช่น ทริปสเปน 2024" className="w-full bg-slate-50 border-none rounded-2xl px-5 py-4 text-center font-bold text-lg mb-8 outline-none ring-blue-100 focus:ring-4 transition-all" />
                                <div className="flex gap-3">
                                    <button onClick={() => setShowAddGroup(false)} className="flex-1 py-4 font-bold text-slate-400 hover:bg-slate-50 rounded-2xl">ยกเลิก</button>
                                    <button onClick={createGroup} className="btn-primary flex-[2] py-4 font-bold shadow-lg text-lg">สร้างทริปเลย!</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal: เข้าร่วมกลุ่ม */}
                    {showJoinGroup && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-[#2B3A4A]/20 backdrop-blur-md animate-pop">
                            <div className="glass-card p-10 w-full max-w-sm text-center shadow-2xl bg-white/90">
                                <h3 className="text-2xl font-bold mb-2 text-[#2B3A4A]">เข้าทริปเพื่อน ✈️</h3>
                                <p className="text-xs text-slate-400 mb-8">กรอกรหัส ID กลุ่มที่เพื่อนส่งให้</p>
                                <input autoFocus value={joinId} onChange={e => setJoinId(e.target.value)} onKeyDown={e => e.key === 'Enter' && joinGroup()} placeholder="วางรหัส ID ตรงนี้..." className="w-full bg-slate-50 border-none rounded-2xl px-5 py-4 text-center font-mono text-sm mb-8 outline-none ring-blue-100 focus:ring-4" />
                                <div className="flex gap-3">
                                    <button onClick={() => setShowJoinGroup(false)} className="flex-1 py-4 font-bold text-slate-400 hover:bg-slate-50 rounded-2xl">ยกเลิก</button>
                                    <button onClick={joinGroup} className="btn-secondary flex-[2] py-4 font-bold shadow-lg text-lg">เข้าร่วม</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal: เปลี่ยนชื่อกลุ่ม */}
                    {showEditGroup && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-[#2B3A4A]/20 backdrop-blur-md animate-pop">
                            <div className="glass-card p-10 w-full max-w-sm text-center shadow-2xl bg-white/90">
                                <h3 className="text-2xl font-bold mb-2 text-[#2B3A4A]">แก้ไขชื่อทริป ✏️</h3>
                                <input autoFocus value={editGroupName} onChange={e => setEditGroupName(e.target.value)} onKeyDown={e => e.key === 'Enter' && updateGroupName()} placeholder="ชื่อทริปใหม่..." className="w-full bg-slate-50 border-none rounded-2xl px-5 py-4 text-center font-bold text-lg mb-8 outline-none ring-[#FFD1DC] focus:ring-4 transition-all mt-4" />
                                <div className="flex gap-3">
                                    <button onClick={() => setShowEditGroup(false)} className="flex-1 py-4 font-bold text-slate-400 hover:bg-slate-50 rounded-2xl">ยกเลิก</button>
                                    <button onClick={updateGroupName} className="btn-primary flex-[2] py-4 font-bold shadow-lg text-lg">บันทึก</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal: เพิ่ม/แก้ไขบิล */}
                    {showExpenseModal && (
                        <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-0 sm:p-6 bg-[#2B3A4A]/40 backdrop-blur-sm animate-pop">
                            <div className="bg-white w-full max-w-xl sm:rounded-[32px] rounded-t-[32px] p-8 shadow-2xl max-h-[90vh] overflow-y-auto no-scrollbar border-t-8 border-[#FFB6C1]">
                                <div className="flex justify-between items-center mb-8">
                                    <h3 className="text-2xl font-bold text-[#2B3A4A]">{editingExpense ? 'แก้ไขบิล 📝' : 'จดบิลใหม่ 🧾'}</h3>
                                    <button onClick={() => setShowExpenseModal(false)} className="p-2.5 bg-slate-100 hover:bg-slate-200 rounded-full transition-colors"><LucideIcon name="x" className="w-5 h-5 text-slate-500" /></button>
                                </div>
                                <div className="space-y-8">
                                    {/* จ่ายค่าอะไร */}
                                    <div>
                                        <label className="text-[12px] font-bold text-slate-500 uppercase tracking-widest block mb-3">จ่ายค่าอะไร?</label>
                                        <input value={expDesc} onChange={e => setExpDesc(e.target.value)} placeholder="เช่น ค่าข้าวเที่ยง, ค่าตั๋วรถไฟ" className="w-full bg-slate-50 rounded-2xl px-5 py-4 font-bold text-lg text-[#2B3A4A] outline-none border-2 border-slate-200 focus:border-[#FFB6C1] focus:bg-white transition-all shadow-inner placeholder-slate-400" />
                                    </div>

                                    {/* จำนวนเงินแบบใหม่ (กรอกเล็ก ผลลัพธ์ใหญ่) */}
                                    <div>
                                        <label className="text-[12px] font-bold text-slate-500 uppercase tracking-widest block mb-3">จำนวนเงิน (฿)</label>
                                        <div className="bg-slate-50 rounded-3xl p-5 border-2 border-slate-200 focus-within:border-[#89CFF0] focus-within:bg-white transition-all shadow-inner">
                                            <input value={expAmount} onChange={e => setExpAmount(e.target.value)} placeholder="ใส่ตัวเลข หรือพิมพ์สูตร (เช่น 100+50*2)" className="w-full bg-transparent text-xl font-bold text-slate-600 outline-none mb-4 placeholder-slate-300" />
                                            <div className="flex justify-between items-end border-t-2 border-dashed border-slate-200 pt-4 mt-2">
                                                <span className="text-sm font-bold text-slate-400 uppercase tracking-widest mb-2">สรุปยอดสุทธิ</span>
                                                <span className="text-[48px] leading-none font-black text-[#89CFF0] drop-shadow-sm">฿{formatMoney(evaluateMath(expAmount))}</span>
                                            </div>
                                        </div>
                                    </div>

                                    {/* ใครจ่าย (ปรับให้เล็กลงและกดง่ายขึ้นเมื่อมีคนเยอะ) */}
                                    <div>
                                        <label className="text-[12px] font-bold text-slate-500 uppercase tracking-widest block mb-3">ใครเป็นคนจ่ายเงินรอบนี้?</label>
                                        <div className="flex flex-wrap gap-2.5 pb-2">
                                            {(activeGroup.members || []).map(m => (
                                                <button key={m} onClick={() => setExpPayer(m)} className={`shrink-0 flex items-center gap-2 px-3 py-2 rounded-xl border-2 transition-all ${expPayer === m ? 'border-[#FFB6C1] bg-[#FFF0F5] shadow-sm text-[#2B3A4A]' : 'border-slate-200 bg-slate-50 opacity-70 hover:opacity-100 hover:border-slate-300 text-slate-500'}`}>
                                                    <Avatar name={m} size="sm" />
                                                    <span className="text-[13px] font-bold">{m}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    {/* หารกับใครบ้าง */}
                                    <div className="bg-slate-50 p-6 rounded-3xl border-2 border-slate-100 shadow-inner">
                                        <div className="flex justify-between items-center mb-5">
                                            <label className="text-[12px] font-bold text-slate-500 uppercase tracking-widest">หารกับใครบ้าง? ({(expParticipants || []).length} คน)</label>
                                            <button onClick={() => setExpParticipants(activeGroup.members)} className="text-[12px] font-bold text-white bg-[#89CFF0] hover:bg-[#6CBCE3] px-4 py-1.5 rounded-full shadow-md transition-colors">เลือกทุกคน</button>
                                        </div>
                                        <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
                                            {(activeGroup.members || []).map(m => {
                                                const isSelected = expParticipants.includes(m);
                                                return (
                                                    <button key={m} onClick={() => isSelected ? setExpParticipants(expParticipants.filter(p => p !== m)) : setExpParticipants([...expParticipants, m])}
                                                        className={`flex items-center gap-3 p-3.5 rounded-2xl border-2 transition-all font-bold text-sm ${isSelected ? 'border-[#FFB6C1] bg-[#FFF0F5] text-[#2B3A4A] shadow-md transform scale-[1.02]' : 'border-slate-200 bg-white text-slate-400 hover:bg-slate-50 hover:border-slate-300'}`}>
                                                        <div className={`w-6 h-6 rounded-lg border-2 ${isSelected ? 'bg-[#FF9EAE] border-[#FF9EAE]' : 'border-slate-300 bg-slate-100'} flex items-center justify-center transition-all shrink-0`}>
                                                            {isSelected && <LucideIcon name="check" className="w-4 h-4 text-white font-black" />}
                                                        </div>
                                                        <span className="truncate text-[15px]">{m}</span>
                                                    </button>
                                                )
                                            })}
                                        </div>
                                    </div>
                                    
                                    <button onClick={saveExpense} className="w-full btn-primary py-5 text-xl font-bold shadow-xl mt-8 active:scale-[0.98] transition-all">บันทึกบิลเลย ✨</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Export Area (ซ่อนไว้สำหรับ Capture) */}
                    <div id="export-area" className="p-8 bg-[#FFF0F5]">
                        <div className="glass-card p-10 border-4 border-white text-center shadow-none bg-white/60">
                            <div className="text-6xl mb-4">{getGroupStyle(activeGroup?.id || '').emoji}</div>
                            <h2 className="text-3xl font-black mb-2 text-[#2B3A4A]">{activeGroup?.name}</h2>
                            <p className="text-[11px] text-slate-500 font-bold uppercase mb-10 tracking-widest bg-white inline-block px-4 py-1.5 rounded-full shadow-sm">สรุปรายการใช้จ่ายทริป</p>
                            
                            <div className="bg-gradient-to-br from-white to-white/50 p-8 rounded-[32px] mb-10 border-2 border-white shadow-sm">
                                <p className="text-sm font-bold text-slate-500 mb-2">ยอดรวมทั้งหมด</p>
                                <p className="text-5xl font-black text-[#FF9EAE]">฿{formatMoney(totalSpent)}</p>
                            </div>
                            
                            <div className="text-left space-y-4">
                                <h3 className="text-base font-bold border-l-4 border-[#89CFF0] pl-4 mb-6 text-[#2B3A4A]">สรุปยอดที่ต้องโอนให้กัน:</h3>
                                {settlements.map((s, idx) => (
                                    <div key={idx} className="flex justify-between items-center bg-white p-5 rounded-2xl border-2 border-white shadow-sm">
                                        <div className="flex items-center gap-3">
                                            <span className="font-bold text-base">{s.from}</span>
                                            <LucideIcon name="arrow-right" className="w-4 h-4 text-slate-300" />
                                            <span className="font-bold text-base">{s.to}</span>
                                        </div>
                                        <span className="font-black text-lg text-[#89CFF0]">฿{formatMoney(s.amount)}</span>
                                    </div>
                                ))}
                            </div>
                            <p className="text-[10px] text-slate-400 mt-14 font-bold uppercase tracking-[5px]">Generated by Expense Pro 🧸</p>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
