<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Pro - หารทริปกับเพื่อน</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✈️</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- External Libraries for Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Mitr:wght@400;500;600&family=Sarabun:wght@300;400;500;600&display=swap');

        :root {
            --font-display: 'Mitr', sans-serif;
            --font-body: 'Sarabun', sans-serif;
            --clr-ink: #2B3A4A;
            --radius-card: 28px;
        }

        body {
            font-family: var(--font-body);
            color: var(--clr-ink);
            margin: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            background: linear-gradient(135deg, #FFE4E1 0%, #FFF0F5 30%, #E6E6FA 60%, #E0F7FA 100%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        h1, h2, h3, h4 { font-family: var(--font-display); }

        .glass-card {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: var(--radius-card);
            box-shadow: 0 12px 40px -8px rgba(255, 182, 193, 0.25);
        }

        .btn-primary {
            background: linear-gradient(135deg, #FFB6C1, #FFC0CB);
            color: #2B3A4A;
            border-bottom: 5px solid #FF9EAE;
            border-radius: 24px;
            transition: all 0.1s;
        }
        .btn-primary:active { transform: translateY(3px); border-bottom-width: 2px; }

        .btn-secondary {
            background: linear-gradient(135deg, #B0E0E6, #ADD8E6);
            color: #2B3A4A;
            border-bottom: 5px solid #90C8D6;
            border-radius: 24px;
            transition: all 0.1s;
        }
        .btn-secondary:active { transform: translateY(3px); border-bottom-width: 2px; }

        /* ระบบ Mask ดอกไม้สุดน่ารัก */
        .shape-flower {
            -webkit-mask-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M50 0 A 15 15 0 0 1 65 15 A 15 15 0 0 1 85 15 A 15 15 0 0 1 85 35 A 15 15 0 0 1 100 50 A 15 15 0 0 1 85 65 A 15 15 0 0 1 85 85 A 15 15 0 0 1 65 85 A 15 15 0 0 1 50 100 A 15 15 0 0 1 35 85 A 15 15 0 0 1 15 85 A 15 15 0 0 1 15 65 A 15 15 0 0 1 0 50 A 15 15 0 0 1 15 35 A 15 15 0 0 1 15 15 A 15 15 0 0 1 35 15 A 15 15 0 0 1 50 0 Z'/%3E%3C/svg%3E");
            -webkit-mask-size: 100% 100%;
            mask-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M50 0 A 15 15 0 0 1 65 15 A 15 15 0 0 1 85 15 A 15 15 0 0 1 85 35 A 15 15 0 0 1 100 50 A 15 15 0 0 1 85 65 A 15 15 0 0 1 85 85 A 15 15 0 0 1 65 85 A 15 15 0 0 1 50 100 A 15 15 0 0 1 35 85 A 15 15 0 0 1 15 85 A 15 15 0 0 1 15 65 A 15 15 0 0 1 0 50 A 15 15 0 0 1 15 35 A 15 15 0 0 1 15 15 A 15 15 0 0 1 35 15 A 15 15 0 0 1 50 0 Z'/%3E%3C/svg%3E");
            mask-size: 100% 100%;
        }

        .animate-pop { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }
        @keyframes popIn { from { opacity: 0; transform: scale(0.92) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        .loader {
            width: 32px; height: 32px;
            border: 4px solid rgba(255, 255, 255, 0.5); border-top-color: #FFB6C1;
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #export-area { 
            position: absolute; 
            left: -9999px; 
            top: 0; 
            width: 1200px;
            height: auto; 
            z-index: -9999;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const ReactDOMClient = window.ReactDOM;

        // Firebase Configuration
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : {
                apiKey: "AIzaSyCwnWHqG__ty3OvDok2o6orgreXOu5LSXk",
                authDomain: "expense-manager-14564.firebaseapp.com",
                projectId: "expense-manager-14564",
                storageBucket: "expense-manager-14564.firebasestorage.app",
                messagingSenderId: "259280883710",
                appId: "1:259280883710:web:67d7ce7b1f8e5e196a7aaf"
            };

        const appId = (typeof __app_id !== 'undefined' && __app_id) ? __app_id : 'default-trip-app';

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const LucideIcon = ({ name, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}" class="${className}"></i>`;
                    window.lucide.createIcons({ root: iconRef.current });
                }
            }, [name, className]);
            return <span ref={iconRef} style={{ display: 'contents' }} />;
        };

        function App() {
            const TRAVEL_EMOJIS = ['✈️', '🏝️', '🏕️', '🏔️', '🏰', '🗽', '🌸', '🌈', '🎨', '🎈', '🎠', '🏖️', '🗼', '⛩️', '🚤', '🍩', '📸', '🧸'];
            const PASTEL_COLORS = ['#FFD1DC', '#F8E2E9', '#FADADD', '#E6E6FA', '#E0F7FA', '#D0E8F2', '#B0E0E6', '#FFB6C1', '#FFDAC1', '#FFB7B2', '#FF9AA2', '#E2F0CB', '#B5EAD7', '#C7CEEA', '#F1CBFF', '#D4F0F0', '#FDFD96', '#FFDFD3', '#FEC8D8', '#D291BC'];
            const VIBRANT_COLORS = ['#FF595E', '#FFCA3A', '#8AC926', '#1982C4', '#6A4C93', '#F15BB5', '#00BBF9', '#00F5D4', '#F28F3B', '#C8E9A0', '#FF9AA2', '#B5EAD7', '#C7CEEA', '#E2F0CB', '#FFB7B2', '#E6A8D7', '#97C1A9', '#8FCACA', '#F6A6FF', '#B28DFF'];

            const urlParams = new URLSearchParams(window.location.search);
            const dashIdFromUrl = urlParams.get('dashboard');

            const [user, setUser] = useState(null);
            const [view, setView] = useState(dashIdFromUrl ? 'dashboard' : 'list'); 
            const [groups, setGroups] = useState([]);
            const [activeGroup, setActiveGroup] = useState(null);
            const [expenses, setExpenses] = useState([]);
            const [loading, setLoading] = useState(true);
            const [exporting, setExporting] = useState(false);

            const [showAddGroup, setShowAddGroup] = useState(false);
            const [showJoinGroup, setShowJoinGroup] = useState(false);
            const [showExpenseModal, setShowExpenseModal] = useState(false);
            const [showEditGroup, setShowEditGroup] = useState(false);

            const [editingExpense, setEditingExpense] = useState(null);
            const [newGroupName, setNewGroupName] = useState('');
            const [editGroupName, setEditGroupName] = useState('');
            const [joinId, setJoinId] = useState('');
            const [newMemberName, setNewMemberName] = useState('');
            const [expDesc, setExpDesc] = useState('');
            const [expAmount, setExpAmount] = useState('');
            const [expPayer, setExpPayer] = useState('');
            const [expParticipants, setExpParticipants] = useState([]);
            const [dashError, setDashError] = useState('');

            // 1. Auth Init with PERSISTENCE (จดจำการล็อกอิน)
            useEffect(() => {
                let isMounted = true;
                const initAuth = async () => {
                    try {
                        // บังคับจำ Login ในเครื่องถาวร
                        await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
                        
                        const unsubscribe = auth.onAuthStateChanged(async (u) => {
                            if (!isMounted) return;
                            if (u) {
                                setUser(u);
                                setLoading(false);
                            } else {
                                // ถ้าไม่มี Session และไม่ใช่หน้า Dashboard สรุปผล ให้ใช้ Anon ชั่วคราวเพื่อเข้าหน้า List ได้
                                if (!dashIdFromUrl) {
                                    try {
                                        const anon = await auth.signInAnonymously();
                                        setUser(anon.user);
                                    } catch (e) { console.error("Anon Login Error:", e); }
                                }
                                setLoading(false);
                            }
                        });
                        return unsubscribe;
                    } catch (err) {
                        console.error("Persistence Setup Error:", err);
                        if (isMounted) setLoading(false);
                    }
                };
                initAuth();
                return () => { isMounted = false; };
            }, []);

            // 2. Load Dashboard (Read-only)
            useEffect(() => {
                if (!user || !dashIdFromUrl) return;
                const groupRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(dashIdFromUrl);
                const unsubscribe = groupRef.onSnapshot(doc => {
                    if (doc.exists) {
                        setActiveGroup({ id: doc.id, ...doc.data() });
                        setView('dashboard');
                    } else {
                        setDashError("ลิงก์สรุปยอดไม่ถูกต้อง หรือทริปนี้ถูกลบไปแล้วครับ 🧸");
                    }
                });
                return () => unsubscribe();
            }, [user, dashIdFromUrl]);

            // 3. Auto-Join Link: ?join=xxx
            useEffect(() => {
                const inviteId = urlParams.get('join');
                if (!user || user.isAnonymous || !inviteId) return;

                const processJoin = async () => {
                    try {
                        const myName = user.displayName?.split(' ')[0] || 'ฉัน';
                        const groupRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(inviteId);
                        const doc = await groupRef.get();
                        if (doc.exists) {
                            const data = doc.data();
                            if (!(data.members || []).includes(myName)) {
                                await groupRef.update({ members: firebase.firestore.FieldValue.arrayUnion(myName) });
                                alert(`เย้! เข้าร่วมทริป "${data.name}" เรียบร้อย 🎉`);
                            }
                            setActiveGroup({ id: doc.id, ...data });
                            setView('detail');
                        }
                    } catch (e) { console.error("Join Failed:", e); }
                    window.history.replaceState({}, document.title, window.location.pathname);
                };
                processJoin();
            }, [user]);

            // 4. Load Groups List
            useEffect(() => {
                if (!user || user.isAnonymous || dashIdFromUrl) return;
                const myName = user.displayName?.split(' ')[0] || 'ฉัน';
                const groupsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups');

                const unsubscribe = groupsRef.onSnapshot((snap) => {
                    const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    const myGroups = data
                        .filter(g => g.ownerId === user.uid || (g.members && g.members.includes(myName)))
                        .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
                    setGroups(myGroups);
                    
                    if (activeGroup && view === 'detail') {
                        const updated = myGroups.find(g => g.id === activeGroup.id);
                        if (updated) setActiveGroup(updated);
                    }
                });
                return () => unsubscribe();
            }, [user, activeGroup?.id, view]);

            // 5. Load Expenses
            useEffect(() => {
                if (!user || !activeGroup) return;
                const expRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).collection('expenses');
                const unsubscribe = expRef.onSnapshot((snap) => {
                    const list = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setExpenses(list.sort((a, b) => b.date - a.date));
                });
                return () => unsubscribe();
            }, [user, activeGroup?.id]);

            // UI Helpers
            const getGroupStyle = (id = "default") => {
                let hash = 0;
                for (let i = 0; i < id.length; i++) hash = id.charCodeAt(i) + ((hash << 5) - hash);
                return { 
                    color: PASTEL_COLORS[Math.abs(hash) % PASTEL_COLORS.length], 
                    emoji: TRAVEL_EMOJIS[Math.abs(hash) % TRAVEL_EMOJIS.length] 
                };
            };

            const getMemberColor = (name) => {
                let hash = 0;
                for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
                return VIBRANT_COLORS[Math.abs(hash) % VIBRANT_COLORS.length];
            };

            const formatMoney = (v) => Number(v || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            const formatDate = (ts) => ts ? new Date(ts).toLocaleString('th-TH', { day: 'numeric', month: 'short', year: '2-digit', hour: '2-digit', minute: '2-digit' }) : '';

            const evaluateMath = (str) => {
                try {
                    const sanitized = str.toString().replace(/[^-+*/().0-9]/g, '');
                    return sanitized ? (new Function(`return ${sanitized}`)() || 0) : 0;
                } catch (e) { return 0; }
            };

            // Actions
            const handleLogin = async () => {
                const provider = new firebase.auth.GoogleAuthProvider();
                await auth.signInWithPopup(provider);
            };

            const createGroup = async () => {
                if (!newGroupName.trim() || !user || user.isAnonymous) return;
                const myName = user.displayName?.split(' ')[0] || 'ฉัน';
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').add({
                    name: newGroupName.trim(),
                    ownerId: user.uid,
                    ownerName: myName,
                    members: [myName],
                    createdAt: Date.now()
                });
                setNewGroupName('');
                setShowAddGroup(false);
            };

            const joinGroup = async () => {
                if (!joinId.trim() || !user || user.isAnonymous) return;
                const myName = user.displayName?.split(' ')[0] || 'ฉัน';
                const ref = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(joinId.trim());
                const doc = await ref.get();
                if (!doc.exists) return alert("ไม่พบทริปนี้ครับ 🧸");
                if (!(doc.data().members || []).includes(myName)) {
                    await ref.update({ members: firebase.firestore.FieldValue.arrayUnion(myName) });
                }
                setShowJoinGroup(false); setJoinId('');
                setActiveGroup({ id: doc.id, ...doc.data() }); setView('detail');
            };

            const saveExpense = async () => {
                if (!activeGroup) return;
                const amount = evaluateMath(expAmount);
                if (!expDesc || amount <= 0 || !expPayer) return;
                const data = { description: expDesc, amount, payer: expPayer, participants: expParticipants, date: editingExpense ? editingExpense.date : Date.now() };
                const ref = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).collection('expenses');
                if (editingExpense) await ref.doc(editingExpense.id).update(data);
                else await ref.add(data);
                setShowExpenseModal(false); setEditingExpense(null);
            };

            // Calculations
            const totalSpent = useMemo(() => expenses.reduce((s, e) => s + e.amount, 0), [expenses]);

            const individualShares = useMemo(() => {
                if (!activeGroup?.members) return [];
                const stats = {};
                activeGroup.members.forEach(m => stats[m] = { paid: 0, share: 0, balance: 0 });
                expenses.forEach(e => {
                    if (stats[e.payer]) stats[e.payer].paid += e.amount;
                    const parts = e.participants || [];
                    if (parts.length > 0) {
                        const share = e.amount / parts.length;
                        parts.forEach(p => { if (stats[p]) stats[p].share += share; });
                    }
                });
                return Object.keys(stats).map(name => {
                    const s = stats[name]; s.balance = s.paid - s.share;
                    return { name, ...s };
                }).sort((a, b) => b.balance - a.balance);
            }, [activeGroup, expenses]);

            const settlements = useMemo(() => {
                if (!activeGroup || activeGroup.members.length < 2) return [];
                const balances = {};
                activeGroup.members.forEach(m => balances[m] = 0);
                expenses.forEach(e => {
                    const share = e.amount / (e.participants || []).length;
                    balances[e.payer] += e.amount;
                    (e.participants || []).forEach(p => { if (balances.hasOwnProperty(p)) balances[p] -= share; });
                });
                const creditors = [], debtors = [];
                Object.keys(balances).forEach(n => {
                    if (balances[n] > 0.01) creditors.push({ name: n, amt: balances[n] });
                    else if (balances[n] < -0.01) debtors.push({ name: n, amt: Math.abs(balances[n]) });
                });
                const res = []; let i = 0, j = 0;
                while (i < debtors.length && j < creditors.length) {
                    const pay = Math.min(debtors[i].amt, creditors[j].amt);
                    res.push({ from: debtors[i].name, to: creditors[j].name, amount: pay });
                    debtors[i].amt -= pay; creditors[j].amt -= pay;
                    if (debtors[i].amt < 0.01) i++;
                    if (creditors[j].amt < 0.01) j++;
                }
                return res;
            }, [activeGroup, expenses]);

            // Exports
            const copyDashboardLink = () => {
                const url = `${window.location.origin}${window.location.pathname}?dashboard=${activeGroup.id}`;
                navigator.clipboard.writeText(url);
                alert("คัดลอกลิงก์ Dashboard สำเร็จ! 📊");
            };

            const exportImage = async () => {
                setExporting(true);
                const el = document.getElementById('export-area');
                el.style.position = "fixed"; el.style.left = "0"; el.style.top = "0"; el.style.zIndex = "-9999";
                const canvas = await html2canvas(el, { scale: 2, useCORS: true, width: 1200, height: el.scrollHeight });
                const link = document.createElement('a');
                link.download = `Summary_${activeGroup.name}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                el.style.position = "absolute"; el.style.left = "-9999px";
                setExporting(false);
            };

            // Shared Components
            const Avatar = ({ name, size = "sm" }) => {
                let szClass = size === "sm" ? "w-9 h-9 text-lg" : size === "lg" ? "w-[60px] h-[60px] text-[32px]" : "w-12 h-12 text-2xl";
                return (
                    <div style={{ backgroundColor: getMemberColor(name) }} className={`${szClass} shape-flower flex items-center justify-center font-black text-white drop-shadow-sm shrink-0`}>
                        <span className="mt-1 leading-none">{name ? name[0].toUpperCase() : ''}</span>
                    </div>
                );
            };

            const GroupIcon = ({ id, size = "md", className = "" }) => {
                const { color, emoji } = getGroupStyle(id);
                let s = size === "xl" ? "w-28 h-28 text-6xl rounded-[32px] border-4" : "w-14 h-14 text-2xl rounded-2xl border-2";
                return <div style={{ backgroundColor: color }} className={`${s} flex items-center justify-center border-white shadow-md shrink-0 ${className}`}>{emoji}</div>;
            };

            if (loading) return <div className="h-screen flex items-center justify-center"><div className="loader"></div></div>;

            // Login Screen (If not dashboard view)
            if (!user || (user.isAnonymous && !dashIdFromUrl && view !== 'dashboard')) {
                return (
                    <div className="h-screen flex items-center justify-center p-6 animate-pop">
                        <div className="glass-card p-10 text-center max-w-sm w-full shadow-2xl">
                            <div className="w-24 h-24 bg-white/80 rounded-[28px] flex items-center justify-center mx-auto mb-6 shadow-md border-2 border-white text-5xl">🧸</div>
                            <h1 className="text-3xl font-bold mb-2">Expense Pro</h1>
                            <p className="text-sm text-slate-500 mb-8 font-medium leading-relaxed">แอปจดบิลกลุ่ม หารทริปเพื่อน<br/>เข้าสู่ระบบเพื่อจำทริปของคุณ 🏕️</p>
                            <button onClick={handleLogin} className="btn-primary w-full py-4 px-6 flex items-center justify-center gap-3 font-bold shadow-lg">
                                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-6 h-6 bg-white rounded-full p-1" />
                                ล็อกอินด้วย Google
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-20">
                    <header className="p-4 sticky top-0 z-50">
                        <div className="max-w-3xl mx-auto glass-card px-5 py-3 flex items-center justify-between shadow-lg">
                            <div className="flex items-center gap-3">
                                {view !== 'list' && (
                                    <button onClick={() => { setView('list'); window.history.replaceState({}, '', window.location.pathname); }} className="p-2 hover:bg-white/50 rounded-xl transition-colors"><LucideIcon name="arrow-left" className="w-6 h-6" /></button>
                                )}
                                <h2 className="text-xl font-bold truncate max-w-[150px]">{view === 'list' ? 'ทริปของฉัน' : view === 'dashboard' ? 'สรุปยอดทริป' : activeGroup?.name}</h2>
                            </div>
                            <div className="flex items-center gap-3">
                                <div className="hidden sm:block text-right">
                                    <p className="text-[10px] text-slate-500 font-bold uppercase tracking-wider">{user.displayName?.split(' ')[0]}</p>
                                </div>
                                <img src={user.photoURL || 'https://via.placeholder.com/150'} className="w-10 h-10 rounded-2xl border-2 border-white shadow-md cursor-pointer" onClick={() => auth.signOut().then(() => window.location.reload())} />
                            </div>
                        </div>
                    </header>

                    <main className="max-w-3xl mx-auto px-4 mt-6 animate-pop">
                        {/* 1. List View */}
                        {view === 'list' && (
                            <div className="space-y-6">
                                <div className="flex gap-4">
                                    <button onClick={() => setShowAddGroup(true)} className="btn-primary flex-1 py-8 shadow-md flex flex-col items-center justify-center gap-3 text-lg font-bold">
                                        <LucideIcon name="plus-circle" className="w-7 h-7" /> สร้างทริปใหม่
                                    </button>
                                    <button onClick={() => setShowJoinGroup(true)} className="btn-secondary flex-1 py-8 shadow-md flex flex-col items-center justify-center gap-3 text-lg font-bold">
                                        <LucideIcon name="users" className="w-7 h-7" /> เข้าทริปเพื่อน
                                    </button>
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">
                                    {groups.map(g => (
                                        <div key={g.id} onClick={() => { setActiveGroup(g); setView('detail'); }} className="glass-card p-5 cursor-pointer relative group/card hover:shadow-xl hover:-translate-y-1 transition-all bg-white/40 flex flex-col justify-between min-h-[160px]">
                                            <div className="flex items-center gap-5">
                                                <GroupIcon id={g.id} size="xl" />
                                                <div className="flex-1 min-w-0">
                                                    <h3 className="font-bold text-xl truncate mb-1">{g.name}</h3>
                                                    <span className="text-[11px] text-slate-500 font-bold uppercase tracking-widest bg-white/60 px-2 py-1 rounded-md">{(g.members || []).length} สมาชิก</span>
                                                </div>
                                            </div>
                                            <div className="mt-4 flex justify-between items-end">
                                                <div className="flex -space-x-2 pl-2">
                                                    {(g.members || []).slice(0, 5).map((m, idx) => <Avatar key={idx} name={m} size="sm" />)}
                                                </div>
                                                <button onClick={(e) => { e.stopPropagation(); if(confirm('ลบทริปนี้?')) db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(g.id).delete(); }} className="p-2 text-slate-300 hover:text-red-400 opacity-0 group-hover/card:opacity-100 transition-opacity"><LucideIcon name="trash-2" className="w-5 h-5" /></button>
                                            </div>
                                        </div>
                                    ))}
                                    {groups.length === 0 && <div className="col-span-full py-24 text-center glass-card border-dashed border-2 border-[#FFB6C1] opacity-50">เริ่มสร้างทริปแรกของคุณเลย! 🏕️</div>}
                                </div>
                            </div>
                        )}

                        {/* 2. Detail View */}
                        {view === 'detail' && activeGroup && (
                            <div className="space-y-6">
                                <div className="glass-card p-8 relative overflow-hidden bg-gradient-to-br from-white/70 to-white/40 shadow-xl border-white/80">
                                    <div className="absolute inset-0 flex items-center justify-center pointer-events-none opacity-20">
                                        <span className="text-[250px] leading-none transform rotate-12 scale-[1.2] blur-xl">{getGroupStyle(activeGroup.id).emoji}</span>
                                    </div>
                                    <div className="relative z-10">
                                        <div className="flex justify-between items-start mb-3">
                                            <p className="text-xs font-bold text-slate-500 uppercase tracking-widest bg-white/60 px-3 py-1 rounded-full shadow-sm">ยอดรวมใช้จ่ายทริป</p>
                                            <div className="flex gap-2">
                                                <button onClick={() => { setEditGroupName(activeGroup.name); setShowEditGroup(true); }} className="bg-white p-2 rounded-lg shadow-sm hover:text-blue-500"><LucideIcon name="edit-2" className="w-4 h-4" /></button>
                                                <button onClick={() => { const url = `${window.location.origin}${window.location.pathname}?join=${activeGroup.id}`; navigator.clipboard.writeText(url); alert("ลิงก์เชิญเพื่อนแล้ว! 🔗"); }} className="bg-white p-2 rounded-lg shadow-sm hover:text-emerald-500"><LucideIcon name="user-plus" className="w-4 h-4" /></button>
                                            </div>
                                        </div>
                                        <h1 className="text-5xl font-black mb-6 text-[#2B3A4A]">฿{formatMoney(totalSpent)}</h1>
                                        <div className="flex flex-wrap gap-2.5">
                                            {(activeGroup.members || []).map(m => (
                                                <div key={m} className="bg-white/80 px-3.5 py-2 rounded-xl border border-white flex items-center gap-2.5 shadow-sm text-xs font-bold">
                                                    <div style={{backgroundColor: getMemberColor(m)}} className="w-3 h-3 rounded-full border border-white"></div>
                                                    {m}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    <div className="flex justify-between items-center gap-4 px-1">
                                        <h3 className="font-bold text-xl">🧾 บิลทั้งหมด</h3>
                                        <button onClick={() => { setEditingExpense(null); setExpDesc(''); setExpAmount(''); setExpPayer(activeGroup.members[0]); setExpParticipants(activeGroup.members); setShowExpenseModal(true); }} className="btn-primary px-8 py-4 text-base font-bold shadow-lg flex items-center gap-3">
                                            <LucideIcon name="plus-circle" className="w-6 h-6" /> เพิ่มบิลใหม่
                                        </button>
                                    </div>
                                    <div className="grid gap-3">
                                        {expenses.map(e => (
                                            <div key={e.id} className="glass-card p-5 flex justify-between items-center bg-white/70 group/item">
                                                <div className="flex items-center gap-4">
                                                    <Avatar name={e.payer} size="md" />
                                                    <div>
                                                        <h4 className="font-bold text-base">{e.description}</h4>
                                                        <p className="text-[11px] text-slate-500">โดย <b>{e.payer}</b> • หาร {(e.participants || []).join(', ')}</p>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-4">
                                                    <div className="text-right">
                                                        <p className="font-bold text-lg text-[#2B3A4A]">฿{formatMoney(e.amount)}</p>
                                                        <p className="text-[10px] text-slate-400">{new Date(e.date).toLocaleDateString('th-TH')}</p>
                                                    </div>
                                                    <div className="flex flex-col gap-1 opacity-0 group-hover/item:opacity-100 transition-opacity">
                                                        <button onClick={() => { setEditingExpense(e); setExpDesc(e.description); setExpAmount(e.amount.toString()); setExpPayer(e.payer); setExpParticipants(e.participants); setShowExpenseModal(true); }} className="p-1.5 bg-blue-50 text-blue-400 rounded-lg hover:bg-blue-100"><LucideIcon name="edit-3" className="w-3.5 h-3.5" /></button>
                                                        <button onClick={() => { if(confirm('ลบบิลนี้?')) db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).collection('expenses').doc(e.id).delete(); }} className="p-1.5 bg-red-50 text-red-400 rounded-lg hover:bg-red-100"><LucideIcon name="trash-2" className="w-3.5 h-3.5" /></button>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                        {expenses.length === 0 && <div className="py-10 text-center opacity-30 font-bold">ยังไม่มีรายการบิลครับ 🧸</div>}
                                    </div>
                                </div>

                                <div className="glass-card p-7 bg-white/50">
                                    <div className="flex justify-between items-center mb-6">
                                        <h3 className="font-bold text-lg flex items-center gap-2"><span className="text-2xl">💸</span> สรุปยอดโอนให้กัน</h3>
                                        <div className="flex gap-2">
                                            <button onClick={exportImage} className="p-2.5 bg-white rounded-xl shadow-sm text-slate-400 hover:text-pink-400"><LucideIcon name="image" className="w-5 h-5" /></button>
                                            <button onClick={copyDashboardLink} className="p-2.5 bg-white rounded-xl shadow-sm text-slate-400 hover:text-emerald-500"><LucideIcon name="share-2" className="w-5 h-5" /></button>
                                        </div>
                                    </div>
                                    <div className="space-y-4">
                                        {settlements.map((s, idx) => (
                                            <div key={idx} className="flex items-center justify-between p-4 bg-white/90 rounded-[20px] border border-white shadow-sm">
                                                <div className="flex items-center gap-3 flex-1">
                                                    <Avatar name={s.from} />
                                                    <span className="font-bold text-sm">{s.from}</span>
                                                    <div className="flex-1 flex justify-center text-[10px] font-bold text-slate-300">จ่ายให้ ➔</div>
                                                    <Avatar name={s.to} />
                                                    <span className="font-bold text-sm">{s.to}</span>
                                                </div>
                                                <div className="text-right pl-4 border-l ml-4">
                                                    <p className="text-[10px] text-slate-400 font-bold uppercase">ต้องโอน</p>
                                                    <p className="text-xl font-black text-[#89CFF0]">฿{formatMoney(s.amount)}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="glass-card p-7 bg-white/40">
                                    <h4 className="text-[11px] font-bold text-slate-400 uppercase mb-4 tracking-widest">สมาชิกทริป</h4>
                                    <div className="flex flex-wrap gap-2.5 mb-5">
                                        {(activeGroup.members || []).map(m => (
                                            <div key={m} className="bg-white px-3 py-1.5 rounded-xl flex items-center gap-2.5 shadow-sm border border-white">
                                                <Avatar name={m} />
                                                <span className="text-sm font-bold">{m}</span>
                                                <button onClick={() => removeMember(m)} className="text-slate-300 hover:text-red-400"><LucideIcon name="x" className="w-3 h-3" /></button>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="flex gap-2">
                                        <input value={newMemberName} onChange={e => setNewMemberName(e.target.value)} placeholder="เพิ่มชื่อเพื่อน..." className="flex-1 bg-white rounded-xl px-4 py-3 text-sm outline-none border border-white focus:ring-2 ring-pink-100" />
                                        <button onClick={addMember} className="btn-secondary px-5 rounded-xl font-bold">เพิ่ม</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 3. Dashboard View */}
                        {view === 'dashboard' && activeGroup && (
                            <div className="space-y-6">
                                <div className="glass-card p-10 text-center bg-white/80">
                                    <div className="text-7xl mb-4">{getGroupStyle(activeGroup.id).emoji}</div>
                                    <h1 className="text-4xl font-black mb-2">{activeGroup.name}</h1>
                                    <p className="text-slate-400 font-bold uppercase tracking-[4px] text-sm mb-6">สรุปรายการใช้จ่ายทริป</p>
                                    <div className="bg-white/90 p-6 rounded-3xl border-2 border-white shadow-sm inline-block min-w-[200px]">
                                        <p className="text-[10px] font-bold text-slate-400 uppercase mb-1">ยอดรวมทั้งหมด</p>
                                        <p className="text-5xl font-black text-[#FF9EAE]">฿{formatMoney(totalSpent)}</p>
                                    </div>
                                </div>
                                <div className="glass-card p-7">
                                    <h3 className="font-bold text-xl mb-6 flex items-center gap-2">📊 สรุปยอดแต่ละคน</h3>
                                    <div className="space-y-4">
                                        {individualShares.map((item, idx) => (
                                            <div key={idx} className="p-6 bg-white/80 rounded-[24px] border border-white shadow-sm flex flex-col gap-4">
                                                <div className="flex justify-between items-center border-b pb-4">
                                                    <div className="flex items-center gap-3">
                                                        <Avatar name={item.name} size="md" />
                                                        <span className="font-bold text-lg">{item.name}</span>
                                                    </div>
                                                    <p className={`font-bold ${item.balance >= 0 ? 'text-emerald-500' : 'text-red-400'}`}>
                                                        {item.balance >= 0 ? `ได้คืน ฿${formatMoney(item.balance)}` : `ต้องจ่าย ฿${formatMoney(Math.abs(item.balance))}`}
                                                    </p>
                                                </div>
                                                <div className="grid grid-cols-2">
                                                    <div><p className="text-[10px] font-bold text-slate-400">จ่ายออกไป</p><p className="font-bold text-lg text-[#89CFF0]">฿{formatMoney(item.paid)}</p></div>
                                                    <div className="text-right"><p className="text-[10px] font-bold text-slate-400">ยอดที่ต้องหาร</p><p className="font-bold text-lg text-[#FF9EAE]">฿{formatMoney(item.share)}</p></div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Modals */}
                    {showAddGroup && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/30 backdrop-blur-sm animate-pop">
                            <div className="glass-card p-10 w-full max-w-sm text-center bg-white shadow-2xl">
                                <h3 className="text-2xl font-bold mb-8">ทริปใหม่ไปไหนดี? ⛺</h3>
                                <input autoFocus value={newGroupName} onChange={e => setNewGroupName(e.target.value)} onKeyDown={e => e.key === 'Enter' && createGroup()} placeholder="ชื่อทริป..." className="w-full bg-slate-50 rounded-2xl px-5 py-4 text-center font-bold text-xl mb-8 outline-none focus:ring-4 ring-pink-100" />
                                <div className="flex gap-3">
                                    <button onClick={() => setShowAddGroup(false)} className="flex-1 py-4 font-bold text-slate-400">ปิด</button>
                                    <button onClick={createGroup} className="btn-primary flex-[2] py-4 font-bold shadow-lg text-lg">สร้างทริป!</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showExpenseModal && (
                        <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center bg-black/40 backdrop-blur-sm animate-pop">
                            <div className="bg-white w-full max-w-xl sm:rounded-[32px] rounded-t-[32px] p-8 max-h-[90vh] overflow-y-auto no-scrollbar border-t-8 border-[#FFB6C1] shadow-2xl">
                                <h3 className="text-2xl font-bold mb-8">{editingExpense ? 'แก้ไขบิล 📝' : 'จดบิลใหม่ 🧾'}</h3>
                                <div className="space-y-8">
                                    <div>
                                        <label className="text-[11px] font-bold text-slate-400 uppercase mb-3 block">จ่ายค่าอะไร?</label>
                                        <input value={expDesc} onChange={e => setExpDesc(e.target.value)} placeholder="เช่น ค่าข้าวเที่ยง" className="w-full bg-slate-50 rounded-2xl px-5 py-4 font-bold text-lg outline-none focus:bg-white focus:ring-2 ring-pink-50" />
                                    </div>
                                    <div>
                                        <label className="text-[11px] font-bold text-slate-400 uppercase mb-3 block">จำนวนเงิน (฿)</label>
                                        <div className="bg-slate-50 rounded-3xl p-5 border-2 border-slate-100">
                                            <input value={expAmount} onChange={e => setExpAmount(e.target.value)} placeholder="0.00 หรือ 100+50" className="w-full bg-transparent text-xl font-bold outline-none mb-3" />
                                            <div className="text-right border-t-2 border-dashed pt-4"><span className="text-5xl font-black text-[#89CFF0]">฿{formatMoney(evaluateMath(expAmount))}</span></div>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="text-[11px] font-bold text-slate-400 uppercase mb-3 block">ใครจ่ายเงินรอบนี้?</label>
                                        <div className="flex flex-wrap gap-2.5">
                                            {activeGroup.members.map(m => (
                                                <button key={m} onClick={() => setExpPayer(m)} className={`flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-bold border-2 transition-all ${expPayer === m ? 'border-[#FFB6C1] bg-[#FFF0F5] shadow-md' : 'border-slate-100 bg-slate-50 opacity-60'}`}>
                                                    <Avatar name={m} size="sm" /> {m}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    <div>
                                        <div className="flex justify-between items-center mb-3">
                                            <label className="text-[11px] font-bold text-slate-400 uppercase">หารกับใครบ้าง?</label>
                                            <button onClick={() => setExpParticipants(activeGroup.members)} className="text-[10px] font-bold bg-[#89CFF0] text-white px-3 py-1 rounded-full">เลือกทุกคน</button>
                                        </div>
                                        <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
                                            {activeGroup.members.map(m => {
                                                const isSel = expParticipants.includes(m);
                                                return <button key={m} onClick={() => isSel ? setExpParticipants(expParticipants.filter(p => p !== m)) : setExpParticipants([...expParticipants, m])} className={`p-3.5 rounded-2xl border-2 font-bold text-sm transition-all ${isSel ? 'border-[#FFB6C1] bg-[#FFF0F5] shadow-md' : 'border-slate-100 opacity-50'}`}>{m}</button>
                                            })}
                                        </div>
                                    </div>
                                    <button onClick={saveExpense} className="w-full btn-primary py-5 text-xl font-bold shadow-xl mt-6">บันทึกรายการ ✨</button>
                                    <button onClick={() => setShowExpenseModal(false)} className="w-full py-2 text-slate-300 font-bold text-sm">ยกเลิก</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 4. Export Area (High-Res Infographic) */}
                    <div id="export-area" className="bg-gradient-to-br from-[#FFE4E1] via-[#FFF0F5] to-[#E0F7FA] p-[60px]" style={{ fontFamily: 'var(--font-body)' }}>
                        <div className="flex flex-col gap-[40px] w-full max-w-[1080px] mx-auto">
                            <div className="flex items-center justify-between bg-white/70 backdrop-blur-xl p-[40px] rounded-[40px] shadow-lg border-4 border-white">
                                <div className="flex items-center gap-[40px]">
                                    <GroupIcon id={activeGroup?.id} size="xl" className="w-[140px] h-[140px] text-[70px]" />
                                    <div>
                                        <h2 className="text-[64px] font-black text-[#2B3A4A] leading-none">{activeGroup?.name}</h2>
                                        <p className="text-[24px] text-slate-500 font-bold uppercase tracking-[8px] mt-[10px]">สรุปรายการใช้จ่ายทริป</p>
                                    </div>
                                </div>
                                <div className="text-right bg-white/80 p-[30px] rounded-[30px] border-4 border-white shadow-sm">
                                    <p className="text-[20px] text-slate-400 font-bold uppercase tracking-widest mb-[5px]">ยอดรวมทั้งหมด</p>
                                    <p className="text-[72px] font-black text-[#FF9EAE] leading-none">฿{formatMoney(totalSpent)}</p>
                                </div>
                            </div>
                            <div className="bg-white/60 rounded-[40px] p-[40px] border-[6px] border-white shadow-xl flex flex-col gap-[30px]">
                                <h3 className="text-[36px] font-bold border-l-[10px] border-[#FF9EAE] pl-[24px] text-[#2B3A4A] leading-none">สรุปค่าใช้จ่ายแต่ละคน</h3>
                                <div className="grid grid-cols-2 gap-[24px]">
                                    {individualShares.map((item, idx) => (
                                        <div key={idx} className="bg-white/90 p-[30px] rounded-[24px] border-4 border-white shadow-sm flex flex-col justify-between">
                                            <div className="flex items-center justify-between border-b-4 border-slate-100 pb-[20px] mb-[20px]">
                                                <div className="flex items-center gap-[20px]">
                                                    <Avatar name={item.name} size="lg" />
                                                    <span className="font-bold text-[32px] text-[#2B3A4A]">{item.name}</span>
                                                </div>
                                                <span className={`font-bold text-[20px] ${item.balance >= 0 ? 'text-emerald-500' : 'text-red-400'}`}>
                                                    {item.balance >= 0 ? `ได้คืน ฿${formatMoney(item.balance)}` : `จ่ายเพิ่ม ฿${formatMoney(Math.abs(item.balance))}`}
                                                </span>
                                            </div>
                                            <div className="flex justify-between">
                                                <div><p className="text-[16px] text-slate-400 font-bold uppercase">ออกไปแล้ว</p><p className="text-[32px] font-black text-[#89CFF0]">฿{formatMoney(item.paid)}</p></div>
                                                <div className="text-right"><p className="text-[16px] text-slate-400 font-bold uppercase">ยอดต้องหาร</p><p className="text-[32px] font-black text-[#FF9EAE]">฿{formatMoney(item.share)}</p></div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="bg-white/60 rounded-[40px] p-[40px] border-[6px] border-white shadow-xl flex flex-col gap-[30px]">
                                <h3 className="text-[36px] font-bold border-l-[10px] border-[#89CFF0] pl-[24px] text-[#2B3A4A] leading-none">รายการโอนเงินระหว่างกัน</h3>
                                <div className="space-y-[20px]">
                                    {settlements.map((s, idx) => (
                                        <div key={idx} className="flex items-center justify-between bg-white/90 p-[30px] rounded-[24px] border-4 border-white shadow-md">
                                            <div className="flex items-center gap-[24px] flex-1">
                                                <div className="flex items-center gap-[20px] w-[220px]"><Avatar name={s.from} size="lg" /><span className="font-bold text-[32px]">{s.from}</span></div>
                                                <div className="flex-1 flex justify-center text-[24px] font-bold text-slate-300">จ่ายให้ ➔</div>
                                                <div className="flex items-center gap-[20px] w-[220px] justify-end"><span className="font-bold text-[32px]">{s.to}</span><Avatar name={s.to} size="lg" /></div>
                                            </div>
                                            <div className="pl-[40px] border-l-4 border-slate-200 ml-[30px] text-right min-w-[200px]">
                                                <span className="text-[18px] text-slate-400 font-bold uppercase">ต้องโอน</span>
                                                <span className="text-[44px] font-black text-[#89CFF0] leading-none block">฿{formatMoney(s.amount)}</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="mt-[60px] text-center"><p className="text-[24px] text-slate-400 font-black uppercase tracking-[16px]">Generated by Expense Pro 🧸</p></div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOMClient.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
