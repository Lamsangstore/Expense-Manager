<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Pro - iOS 26 Edition</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧸</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
    <script src="https://unpkg.com/lucide@latest" crossorigin></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        /* iOS 26 Typography: Inter + IBM Plex Sans Thai */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap');
        
        :root {
            --ios-font: 'Inter', 'IBM Plex Sans Thai', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body { 
            font-family: var(--ios-font);
            background-color: #F2F2F7; /* Apple System Gray 6 */
            margin: 0; 
            padding: 0; 
            color: #1C1C1E;
            -webkit-font-smoothing: antialiased;
        }

        .glass-card { 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.3); 
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        .btn-ios {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-ios:active { transform: scale(0.96); opacity: 0.8; }

        .animate-pop { animation: popIn 0.5s cubic-bezier(0.17, 0.89, 0.32, 1.1); }
        @keyframes popIn { from { opacity: 0; transform: scale(0.98) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        #export-area { position: absolute; left: -9999px; top: 0; width: 400px; z-index: -100; }

        .loader-ai {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #007AFF;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .thai-header { line-height: 1.5; padding: 12px 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- CONFIGURATION ---
        const apiKey = "AIzaSyANUCE14o9FcJfE7CUS_B69mgyoT6Z6NSg"; 
        const firebaseConfig = {
            apiKey: "AIzaSyCwnWHqG__ty3OvDok2o6orgreXOu5LSXk",
            authDomain: "expense-manager-14564.firebaseapp.com",
            projectId: "expense-manager-14564",
            storageBucket: "expense-manager-14564.firebasestorage.app",
            messagingSenderId: "259280883710",
            appId: "1:259280883710:web:67d7ce7b1f8e5e196a7aaf",
            measurementId: "G-68BWRR5K8N"
        };
        
        const appId = "expense-manager-pro-v1";

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const memberColors = [
            '#FFADAD', '#FFD6A5', '#FDFFB6', '#CAFFBF', 
            '#9BF6FF', '#A0C4FF', '#BDB2FF', '#FFC6FF'
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('list');
            const [groups, setGroups] = useState([]);
            const [activeGroup, setActiveGroup] = useState(null);
            const [expenses, setExpenses] = useState([]);
            const [loading, setLoading] = useState(true);
            const [appLogo, setAppLogo] = useState(null);
            
            const [showAddGroup, setShowAddGroup] = useState(false);
            const [showEditGroup, setShowEditGroup] = useState(false);
            const [showExpenseModal, setShowExpenseModal] = useState(false);
            const [editingExpense, setEditingExpense] = useState(null);
            
            const [newGroupName, setNewGroupName] = useState('');
            const [editGroupName, setEditGroupName] = useState('');
            const [newMemberName, setNewMemberName] = useState('');
            const [expDesc, setExpDesc] = useState('');
            const [expAmount, setExpAmount] = useState('');
            const [expPayer, setExpPayer] = useState('');
            const [expParticipants, setExpParticipants] = useState([]);
            const [isGenerating, setIsGenerating] = useState(false);
            const [isGeneratingGroupImage, setIsGeneratingGroupImage] = useState(false);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(async (u) => {
                    if (u) setUser(u);
                    else {
                        // Attempt anonymous sign in if not logged in
                        try { await auth.signInAnonymously(); } catch(e) { setLoading(false); }
                    }
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const groupsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups');
                return groupsRef.where("ownerId", "==", user.uid).onSnapshot((snap) => {
                    const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setGroups(data);
                    if (activeGroup) {
                        const updated = data.find(g => g.id === activeGroup.id);
                        if (updated) setActiveGroup(updated);
                    }
                    setLoading(false);
                });
            }, [user, activeGroup?.id]);

            useEffect(() => {
                if (!user || !activeGroup) return;
                const expRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).collection('expenses');
                return expRef.orderBy("date", "desc").onSnapshot((snap) => {
                    setExpenses(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
            }, [user, activeGroup?.id]);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

            const generateAIImage = async (promptText) => {
                if (!apiKey) return null;
                const prompt = `Premium 3D clay render of: ${promptText}. soft lighting, white background, high quality, minimal`;
                
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            generationConfig: { responseModalities: ['IMAGE'] }
                        })
                    });
                    
                    if (!response.ok) return null;
                    const result = await response.json();
                    const base64 = result.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                    return base64 ? `data:image/png;base64,${base64}` : null;
                } catch (err) {
                    return null;
                }
            };

            const getMemberColor = (name) => {
                let hash = 0;
                for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
                return memberColors[Math.abs(hash) % memberColors.length];
            };

            const evaluateMath = (str) => {
                try {
                    const sanitized = str.toString().replace(/[^-+*/().0-9]/g, '');
                    if (!sanitized) return 0;
                    return new Function(`return ${sanitized}`)() || 0;
                } catch (e) { return 0; }
            };

            const formatMoney = (val) => Number(val || 0).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});

            const formatDate = (timestamp) => {
                return new Intl.DateTimeFormat('th-TH', { 
                    year: 'numeric', month: 'short', day: 'numeric',
                    hour: '2-digit', minute: '2-digit'
                }).format(new Date(timestamp));
            };

            const handleLogin = async () => {
                const provider = new firebase.auth.GoogleAuthProvider();
                await auth.signInWithPopup(provider);
            };

            const handleLogout = () => confirm("ต้องการออกจากระบบใช่ไหมครับ?") && auth.signOut();

            const createGroup = async () => {
                if (!newGroupName.trim()) return;
                setIsGenerating(true);
                let aiImageUrl = await generateAIImage(newGroupName.trim());
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').add({
                        name: newGroupName.trim(),
                        ownerId: user.uid,
                        members: [user.displayName?.split(' ')[0] || 'Me'],
                        imageUrl: aiImageUrl,
                        createdAt: Date.now()
                    });
                    setNewGroupName('');
                    setShowAddGroup(false);
                } catch (err) { alert("สร้างกลุ่มไม่สำเร็จครับ: " + err.message); }
                finally { setIsGenerating(false); }
            };

            const regenerateGroupImage = async () => {
                if (!activeGroup || !apiKey) return;
                setIsGeneratingGroupImage(true);
                const aiImageUrl = await generateAIImage(activeGroup.name);
                if (aiImageUrl) {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).update({ imageUrl: aiImageUrl });
                }
                setIsGeneratingGroupImage(false);
            };

            const deleteGroup = async (id) => {
                if (confirm("ลบตี้ทิ้งข้อมูลจะหายถาวรนะครับ ยืนยันไหม?")) {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(id).delete();
                    if (activeGroup?.id === id) setView('list');
                }
            };

            const addMember = async () => {
                if (!newMemberName.trim() || activeGroup.members.includes(newMemberName.trim())) return;
                const updatedMembers = [...activeGroup.members, newMemberName.trim()];
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).update({ members: updatedMembers });
                setNewMemberName('');
            };

            const removeMember = async (name) => {
                if (confirm(`ลบ ${name} ออกจากตี้?`)) {
                    const updatedMembers = activeGroup.members.filter(m => m !== name);
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).update({ members: updatedMembers });
                }
            };

            const saveExpense = async () => {
                const amount = evaluateMath(expAmount);
                if (!expDesc || amount <= 0 || !expPayer || expParticipants.length === 0) return;
                const expData = { description: expDesc, amount: amount, payer: expPayer, participants: expParticipants, date: editingExpense ? editingExpense.date : Date.now() };
                const ref = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).collection('expenses');
                if (editingExpense) await ref.doc(editingExpense.id).update(expData);
                else await ref.add(expData);
                setShowExpenseModal(false);
                setEditingExpense(null); setExpDesc(''); setExpAmount('');
            };

            const totalSpent = useMemo(() => expenses.reduce((sum, e) => sum + e.amount, 0), [expenses]);

            const settlements = useMemo(() => {
                if (!activeGroup || activeGroup.members.length < 2) return [];
                const balances = {};
                activeGroup.members.forEach(m => balances[m] = 0);
                expenses.forEach(e => {
                    const share = e.amount / e.participants.length;
                    balances[e.payer] += e.amount;
                    e.participants.forEach(p => { if (balances.hasOwnProperty(p)) balances[p] -= share; });
                });
                const creditors = [], debtors = [];
                Object.keys(balances).forEach(n => {
                    if (balances[n] > 0.01) creditors.push({name: n, amt: balances[n]});
                    else if (balances[n] < -0.01) debtors.push({name: n, amt: Math.abs(balances[n])});
                });
                const res = []; let i = 0, j = 0;
                while (i < debtors.length && j < creditors.length) {
                    const pay = Math.min(debtors[i].amt, creditors[j].amt);
                    res.push({ from: debtors[i].name, to: creditors[j].name, amount: pay });
                    debtors[i].amt -= pay; creditors[j].amt -= pay;
                    if (debtors[i].amt < 0.01) i++; if (creditors[j].amt < 0.01) j++;
                }
                return res;
            }, [activeGroup, expenses]);

            const Avatar = ({ name, size = "md" }) => {
                const sizeClasses = { sm: "w-8 h-8 text-[11px]", md: "w-11 h-11 text-[16px]", lg: "w-16 h-16 text-[22px]" };
                return (
                    <div style={{ backgroundColor: getMemberColor(name) }} className={`${sizeClasses[size]} rounded-2xl flex items-center justify-center font-bold text-[#1C1C1E] border-2 border-white shadow-sm shrink-0 uppercase`}>
                        {name[0]}
                    </div>
                );
            };

            if (loading && !user) return <div className="h-screen flex items-center justify-center"><div className="w-10 h-10 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div></div>;

            if (!user?.displayName) return (
                <div className="h-screen flex items-center justify-center p-6 bg-[#F2F2F7]">
                    <div className="glass-card p-10 max-w-sm w-full text-center animate-pop">
                        <div className="w-32 h-32 bg-white rounded-[2.5rem] flex items-center justify-center mx-auto mb-8 shadow-xl border-4 border-[#FDFBF9]">
                            <span className="text-6xl">🧸</span>
                        </div>
                        <h1 className="text-3xl font-extrabold mb-2 text-[#1D1D1F]">หารเงินกับเพื่อน</h1>
                        <p className="text-[#86868B] mb-10 font-medium">จัดการค่าใช้จ่ายกลุ่มสไตล์ iOS ✨</p>
                        <button onClick={handleLogin} className="w-full py-4 bg-[#007AFF] text-white rounded-2xl font-bold flex items-center justify-center gap-3 hover:opacity-90 btn-ios shadow-lg shadow-blue-200">
                            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-6 h-6 bg-white rounded-full p-1" />
                            เข้าใช้งานด้วย Google
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen pb-20">
                    <header className="p-4 sm:p-8 sticky top-0 z-40 bg-[#F2F2F7]/80 backdrop-blur-md">
                        <div className="max-w-4xl mx-auto glass-card px-6 py-4 flex items-center justify-between border border-white">
                            <div className="flex items-center gap-4">
                                {view === 'detail' && (
                                    <button onClick={() => setView('list')} className="p-2 hover:bg-slate-100 rounded-full transition-colors"><i data-lucide="chevron-left" className="w-6 h-6"></i></button>
                                )}
                                <div className="flex flex-col">
                                    <h1 className="text-xl sm:text-2xl font-bold text-[#1C1C1E] leading-tight">
                                        {view === 'list' ? 'ตี้ของฉัน' : activeGroup?.name}
                                    </h1>
                                    <div className="flex items-center gap-1.5 mt-1">
                                        <div className="w-1.5 h-1.5 bg-green-500 rounded-full"></div>
                                        <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest leading-none">Cloud Sync</span>
                                    </div>
                                </div>
                            </div>
                            <div className="flex items-center gap-4">
                                <button onClick={handleLogout} className="w-10 h-10 rounded-2xl border-2 border-white shadow-sm overflow-hidden bg-white">
                                    <img src={user.photoURL} className="w-full h-full object-cover" />
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto p-4 space-y-8 animate-pop">
                        {view === 'list' ? (
                            <div className="space-y-6">
                                <div className="flex justify-between items-center px-2">
                                    <h2 className="text-lg font-bold text-slate-500 uppercase tracking-wider">กลุ่มที่หารกัน</h2>
                                    <button onClick={() => setShowAddGroup(true)} className="bg-[#007AFF] text-white px-6 py-3 rounded-2xl font-bold shadow-md btn-ios flex items-center gap-2">
                                        <i data-lucide="plus" className="w-5 h-5"></i> เปิดตี้ใหม่
                                    </button>
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    {groups.map(g => (
                                        <div key={g.id} onClick={() => { setActiveGroup(g); setView('detail'); }} className="glass-card p-6 hover:shadow-xl transition-all cursor-pointer relative group flex flex-col items-center text-center">
                                            <button onClick={(e) => { e.stopPropagation(); deleteGroup(g.id); }} className="absolute top-4 right-4 p-1.5 text-slate-200 hover:text-red-400 opacity-0 group-hover:opacity-100"><i data-lucide="trash-2" className="w-5 h-5"></i></button>
                                            <div className="w-24 h-24 bg-slate-50 rounded-3xl flex items-center justify-center mb-4 shadow-inner overflow-hidden border-2 border-white">
                                                {g.imageUrl ? <img src={g.imageUrl} className="w-full h-full object-cover" /> : <span className="text-4xl text-slate-300">📊</span>}
                                            </div>
                                            <h3 className="text-xl font-bold text-[#1C1C1E] mb-1">{g.name}</h3>
                                            <div className="flex items-center gap-2 mt-2">
                                                <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{g.members.length} สมาชิก</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-8">
                                {/* Dashboard Card */}
                                <div 
                                    className="glass-card p-10 text-[#1C1C1E] shadow-xl relative overflow-hidden flex flex-col justify-center min-h-[250px]"
                                    style={{
                                        backgroundImage: activeGroup.imageUrl ? `linear-gradient(rgba(255,255,255,0.7), rgba(255,255,255,0.7)), url(${activeGroup.imageUrl})` : 'none',
                                        backgroundSize: 'cover', backgroundPosition: 'center'
                                    }}
                                >
                                    <div className="relative z-10">
                                        <h4 className="text-xs font-bold uppercase tracking-widest mb-2 opacity-60">ยอดเงินรวมทั้งหมด</h4>
                                        <h2 className="text-5xl font-extrabold tracking-tight">฿{formatMoney(totalSpent)}</h2>
                                        <p className="text-[10px] font-bold mt-4 text-slate-400 uppercase tracking-tighter">กลุ่มสร้างเมื่อ: {formatDate(activeGroup.createdAt)}</p>
                                        
                                        <div className="flex flex-wrap gap-2 mt-6">
                                            {activeGroup.members.map(m => (
                                                <div key={m} className="flex items-center gap-2 bg-white/60 px-3 py-1.5 rounded-full text-xs font-bold border border-white/50 shadow-sm">
                                                    <div style={{backgroundColor: getMemberColor(m)}} className="w-3 h-3 rounded-full border border-white"></div>
                                                    {m}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <button onClick={regenerateGroupImage} className="absolute top-6 right-6 p-3 bg-white/50 hover:bg-white rounded-2xl backdrop-blur-md transition-all">
                                        {isGeneratingGroupImage ? <div className="loader-ai"></div> : <i data-lucide="sparkles" className="w-5 h-5 text-[#007AFF]"></i>}
                                    </button>
                                </div>
                                
                                {/* Member Manager & Settlement */}
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="glass-card p-6 flex flex-col border border-white">
                                        <h4 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">ชาวแก๊งในตี้</h4>
                                        <div className="flex-1 space-y-3 mb-6 max-h-48 overflow-y-auto no-scrollbar">
                                            {activeGroup.members.map(m => (
                                                <div key={m} className="flex items-center justify-between bg-white/40 pl-2 pr-4 py-2 rounded-2xl border border-white shadow-sm">
                                                    <div className="flex items-center gap-3">
                                                        <Avatar name={m} size="sm" />
                                                        <span className="font-bold text-sm">{m}</span>
                                                    </div>
                                                    <button onClick={() => removeMember(m)} className="text-red-400 p-1 hover:bg-red-50 rounded-lg transition-colors"><i data-lucide="x" className="w-4 h-4"></i></button>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="flex gap-2 pt-4 border-t border-slate-100">
                                            <input value={newMemberName} onChange={e => setNewMemberName(e.target.value)} placeholder="เพิ่มเพื่อน..." className="w-full bg-slate-50 px-4 py-3 rounded-xl outline-none text-sm font-bold border border-slate-100" onKeyDown={(e) => e.key === 'Enter' && addMember()} />
                                            <button onClick={addMember} className="bg-[#007AFF] text-white px-5 rounded-xl btn-ios shadow-md"><i data-lucide="user-plus" className="w-5 h-5"></i></button>
                                        </div>
                                    </div>

                                    <div className="glass-card p-6 border border-white">
                                        <div className="flex justify-between items-center mb-6">
                                            <h4 className="text-xs font-bold text-slate-400 uppercase tracking-widest">ใครต้องโอนให้ใคร</h4>
                                            <div className="flex gap-2">
                                                <button onClick={() => alert("กำลังส่งออก...")} className="p-2 text-slate-400"><i data-lucide="share" className="w-5 h-5"></i></button>
                                            </div>
                                        </div>
                                        <div className="space-y-3 max-h-48 overflow-y-auto no-scrollbar">
                                            {settlements.map((s, i) => (
                                                <div key={i} className="flex items-center justify-between bg-white p-4 rounded-2xl border border-white shadow-sm">
                                                    <div className="flex items-center gap-3">
                                                        <span className="font-bold text-xs">{s.from}</span>
                                                        <i data-lucide="arrow-right" className="w-4 h-4 text-slate-300"></i>
                                                        <span className="font-bold text-xs">{s.to}</span>
                                                    </div>
                                                    <span className="text-sm font-bold text-[#007AFF]">฿{formatMoney(s.amount)}</span>
                                                </div>
                                            ))}
                                            {settlements.length === 0 && <p className="text-center text-slate-300 text-xs py-10">เคลียร์กันครบแล้วจ้า! ✨</p>}
                                        </div>
                                    </div>
                                </div>

                                {/* Transactions */}
                                <div className="space-y-6">
                                    <div className="flex justify-between items-center px-2">
                                        <h3 className="text-lg font-bold text-[#1C1C1E]">ประวัติการจ่าย</h3>
                                        <button onClick={() => { setEditingExpense(null); setExpDesc(''); setExpAmount(''); setExpPayer(activeGroup.members[0]); setExpParticipants(activeGroup.members); setShowExpenseModal(true); }} className="bg-[#34C759] text-white px-6 py-2.5 rounded-2xl font-bold shadow-md btn-ios flex items-center gap-2">
                                            <i data-lucide="plus" className="w-5 h-5"></i> เพิ่มรายการ
                                        </button>
                                    </div>
                                    <div className="grid gap-4 pb-10">
                                        {expenses.map(e => (
                                            <div key={e.id} className="glass-card p-5 flex items-center justify-between group border border-white shadow-sm">
                                                <div className="flex items-center gap-4">
                                                    <Avatar name={e.payer} size="md" />
                                                    <div>
                                                        <h4 className="font-bold text-base text-[#1C1C1E]">{e.description}</h4>
                                                        <p className="text-[10px] font-bold text-slate-400">หาร {e.participants.length} คน</p>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-6">
                                                    <div className="text-right">
                                                        <p className="text-lg font-bold text-[#1C1C1E]">฿{formatMoney(e.amount)}</p>
                                                    </div>
                                                    <div className="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                                        <button onClick={() => deleteExpense(e.id)} className="p-2 text-red-400"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Modals */}
                    {showAddGroup && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/20 backdrop-blur-md animate-pop">
                            <div className="bg-white w-full max-w-sm rounded-[2rem] p-10 shadow-2xl text-center">
                                {isGenerating ? <div className="flex flex-col items-center py-10"><div className="loader-ai mb-6"></div><h3 className="font-bold">กำลังวาดรูปตี้...</h3></div> : (
                                    <>
                                        <h3 className="text-2xl font-bold mb-2">เปิดตี้ใหม่</h3>
                                        <p className="text-slate-400 mb-8 text-sm">ระบุชื่อตี้เท่ๆ ของคุณ</p>
                                        <input autoFocus value={newGroupName} onChange={e => setNewGroupName(e.target.value)} placeholder="เที่ยวทิพย์, ค่าหอ..." className="w-full bg-slate-50 px-6 py-4 rounded-2xl outline-none font-bold text-lg mb-8 border border-slate-100 focus:border-[#007AFF]" />
                                        <div className="flex flex-col gap-3">
                                            <button onClick={createGroup} className="w-full bg-[#007AFF] text-white py-4 rounded-2xl font-bold btn-ios shadow-lg">ลุยเลย!</button>
                                            <button onClick={() => setShowAddGroup(false)} className="text-slate-400 font-bold text-sm py-2">ยกเลิก</button>
                                        </div>
                                    </>
                                )}
                            </div>
                        </div>
                    )}

                    {showExpenseModal && (
                        <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-0 sm:p-6 bg-black/20 backdrop-blur-md animate-pop">
                            <div className="bg-white w-full max-w-md rounded-t-[2.5rem] sm:rounded-[2.5rem] p-8 shadow-2xl max-h-[90vh] overflow-y-auto no-scrollbar">
                                <div className="flex justify-between items-center mb-8">
                                    <h3 className="text-xl font-bold">{editingExpense ? 'แก้ข้อมูลบิล' : 'จดรายการใหม่'}</h3>
                                    <button onClick={() => setShowExpenseModal(false)} className="p-2 bg-slate-50 rounded-full"><i data-lucide="x" className="w-5 h-5"></i></button>
                                </div>
                                <div className="space-y-8">
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">รายการ</label>
                                        <input value={expDesc} onChange={e => setExpDesc(e.target.value)} placeholder="เช่น ค่ากาแฟ, ค่ารถ" className="w-full bg-slate-50 px-5 py-4 rounded-2xl outline-none font-bold border border-slate-100 focus:border-[#007AFF]" />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">จำนวนเงิน (฿)</label>
                                        <div className="relative">
                                            <input value={expAmount} onChange={e => setExpAmount(e.target.value)} placeholder="0" className="w-full bg-slate-50 px-6 py-5 rounded-2xl outline-none font-extrabold text-3xl text-[#007AFF] pr-32 border border-slate-100" />
                                            <div className="absolute right-4 top-1/2 -translate-y-1/2 text-[10px] font-bold text-slate-400 bg-white px-3 py-2 rounded-xl border shadow-sm">
                                                = {formatMoney(evaluateMath(expAmount))}
                                            </div>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-3">คนเปย์</label>
                                        <div className="flex overflow-x-auto gap-3 pb-2 no-scrollbar">
                                            {activeGroup.members.map(m => (
                                                <button key={m} onClick={() => setExpPayer(m)} className={`shrink-0 flex flex-col items-center gap-2 p-3 rounded-3xl border-2 transition-all ${expPayer === m ? 'bg-blue-50 border-[#007AFF]' : 'border-transparent opacity-60'}`}>
                                                    <Avatar name={m} size="sm" />
                                                    <span className="text-[10px] font-bold">{m}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="space-y-4">
                                        <div className="flex justify-between items-center">
                                            <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">คนร่วมหาร ({expParticipants.length})</label>
                                            <button onClick={() => setExpParticipants(activeGroup.members)} className="text-[10px] font-bold text-[#007AFF]">เลือกทั้งหมด</button>
                                        </div>
                                        <div className="grid grid-cols-2 gap-3">
                                            {activeGroup.members.map(m => (
                                                <button key={m} onClick={() => expParticipants.includes(m) ? setExpParticipants(expParticipants.filter(p => p !== m)) : setExpParticipants([...expParticipants, m])} className={`flex items-center gap-3 px-4 py-4 rounded-2xl font-bold border-2 transition-all text-sm ${expParticipants.includes(m) ? 'bg-[#007AFF] border-[#007AFF] text-white' : 'bg-slate-50 border-transparent text-slate-400'}`}>
                                                    <span className="truncate leading-none uppercase">{m[0]} - {m}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    <button onClick={saveExpense} className="w-full bg-[#1C1C1E] text-white py-5 rounded-2xl font-bold text-lg shadow-xl active:scale-95 transition-all mt-4 border-b-4 border-black">บันทึกรายการ</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
