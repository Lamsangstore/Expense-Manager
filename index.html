<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Pro - หารเงินกับเพื่อน</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧸</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
    <script src="https://unpkg.com/lucide@latest" crossorigin></script>
    
    <!-- Library สำหรับ Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Mali:wght@400;600;700&display=swap');
        
        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: #FDFBF9; 
            margin: 0; 
            padding: 0; 
            color: #232946;
        }

        h1, h2, h3, h4, .cute-font { 
            font-family: 'Mali', cursive; 
        }

        .pastel-gradient {
            background: linear-gradient(135deg, #FFADAD 0%, #FFD6A5 20%, #FDFFB6 40%, #CAFFBF 60%, #9BF6FF 80%, #A0C4FF 100%);
        }

        .glass-card { 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(15px); 
            border: 2px solid #FFFFFF; 
            border-radius: 32px;
            box-shadow: 0 10px 30px -5px rgba(184, 193, 236, 0.3);
        }

        .btn-glow:active { transform: scale(0.96); }
        .btn-glow:hover { box-shadow: 0 0 20px rgba(238, 187, 195, 0.6); }

        .animate-pop { animation: popIn 0.5s cubic-bezier(0.26, 0.53, 0.74, 1.48); }
        @keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        #export-area { position: absolute; left: -9999px; top: 0; width: 400px; z-index: -100; }

        .loader-ai {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #B8C1EC;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ปรับปรุงการแสดงผลภาษาไทยในแถบ Header ให้สูงขึ้นและรองรับวรรณยุกต์ */
        .thai-header-container {
            height: 110px;
            display: flex;
            align-items: center;
        }
        @media (min-width: 640px) {
            .thai-header-container { height: 130px; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- CONFIGURATION ---
        const apiKey = ""; // คีย์จะถูกใส่ให้โดยอัตโนมัติในสภาพแวดล้อมจำลอง
        const firebaseConfig = {
            apiKey: "AIzaSyCwnWHqG__ty3OvDok2o6orgreXOu5LSXk",
            authDomain: "expense-manager-14564.firebaseapp.com",
            projectId: "expense-manager-14564",
            storageBucket: "expense-manager-14564.firebasestorage.app",
            messagingSenderId: "259280883710",
            appId: "1:259280883710:web:67d7ce7b1f8e5e196a7aaf",
            measurementId: "G-68BWRR5K8N"
        };
        
        const appId = "expense-manager-pro-v1";

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const memberColors = [
            '#FFADAD', '#FFD6A5', '#FDFFB6', '#CAFFBF', 
            '#9BF6FF', '#A0C4FF', '#BDB2FF', '#FFC6FF', 
            '#A4E4E0', '#FFCCF9', '#D4D9F5', '#F2CC8F'
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('list');
            const [groups, setGroups] = useState([]);
            const [activeGroup, setActiveGroup] = useState(null);
            const [expenses, setExpenses] = useState([]);
            const [loading, setLoading] = useState(true);
            const [exporting, setExporting] = useState(false);
            const [appLogo, setAppLogo] = useState(null);
            
            const [showAddGroup, setShowAddGroup] = useState(false);
            const [showEditGroup, setShowEditGroup] = useState(false);
            const [showExpenseModal, setShowExpenseModal] = useState(false);
            const [editingExpense, setEditingExpense] = useState(null);
            
            const [newGroupName, setNewGroupName] = useState('');
            const [editGroupName, setEditGroupName] = useState('');
            const [newMemberName, setNewMemberName] = useState('');
            const [expDesc, setExpDesc] = useState('');
            const [expAmount, setExpAmount] = useState('');
            const [expPayer, setExpPayer] = useState('');
            const [expParticipants, setExpParticipants] = useState([]);
            const [isGenerating, setIsGenerating] = useState(false);
            const [isGeneratingGroupImage, setIsGeneratingGroupImage] = useState(false);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    if (!u) setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                const loadLogo = async () => {
                    try {
                        const logo = await generateAIImage("A very cute 3D pastel pink bear holding a wallet, smiling, clay style, white background");
                        setAppLogo(logo);
                    } catch (e) { console.error("Logo load failed", e); }
                };
                if (user) loadLogo();
            }, [user]);

            useEffect(() => {
                if (!user) return;
                const groupsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups');
                return groupsRef.where("ownerId", "==", user.uid).onSnapshot((snap) => {
                    const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setGroups(data);
                    if (activeGroup) {
                        const updated = data.find(g => g.id === activeGroup.id);
                        if (updated) setActiveGroup(updated);
                    }
                    setLoading(false);
                });
            }, [user, activeGroup?.id]);

            useEffect(() => {
                if (!user || !activeGroup) return;
                const expRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).collection('expenses');
                return expRef.orderBy("date", "desc").onSnapshot((snap) => {
                    setExpenses(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
            }, [user, activeGroup?.id]);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

            const generateAIImage = async (promptText) => {
                const prompt = `Cute 3D pastel clay icon for group named: ${promptText}. soft lighting, white background, high quality`;
                let delay = 1000;
                for (let i = 0; i < 5; i++) {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                instances: [{ prompt: prompt }],
                                parameters: { sampleCount: 1 }
                            })
                        });
                        
                        if (!response.ok) {
                            const errorText = await response.text();
                            throw new Error(`HTTP ${response.status}: ${errorText}`);
                        }

                        const result = await response.json();
                        if (result.predictions && result.predictions[0]) {
                            return `data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`;
                        }
                        throw new Error("No image data");
                    } catch (err) {
                        if (i === 4) throw err;
                        await new Promise(r => setTimeout(r, delay));
                        delay *= 2;
                    }
                }
            };

            const getMemberColor = (name) => {
                let hash = 0;
                for (let i = 0; i < name.length; i++) {
                    hash = name.charCodeAt(i) + ((hash << 5) - hash);
                }
                return memberColors[Math.abs(hash) % memberColors.length];
            };

            const evaluateMath = (str) => {
                try {
                    const sanitized = str.toString().replace(/[^-+*/().0-9]/g, '');
                    if (!sanitized) return 0;
                    const res = new Function(`return ${sanitized}`)();
                    return isNaN(res) ? 0 : res;
                } catch (e) { return 0; }
            };

            const formatMoney = (val) => Number(val || 0).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});

            const formatDate = (timestamp) => {
                return new Intl.DateTimeFormat('th-TH', { 
                    year: 'numeric', month: 'short', day: 'numeric',
                    hour: '2-digit', minute: '2-digit'
                }).format(new Date(timestamp));
            };

            const handleLogin = async () => {
                const provider = new firebase.auth.GoogleAuthProvider();
                await auth.signInWithPopup(provider);
            };

            const handleLogout = () => {
                if(confirm("ต้องการออกจากระบบใช่ไหมคะ?")) auth.signOut();
            };

            const createGroup = async () => {
                if (!newGroupName.trim()) return;
                setIsGenerating(true);
                let aiImageUrl = null;
                try {
                    aiImageUrl = await generateAIImage(newGroupName.trim());
                } catch (e) { console.error("AI Generation failed", e.message); }

                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').add({
                        name: newGroupName.trim(),
                        ownerId: user.uid,
                        members: [user.displayName.split(' ')[0] || 'Me'],
                        imageUrl: aiImageUrl,
                        createdAt: Date.now()
                    });
                    setNewGroupName('');
                    setShowAddGroup(false);
                } catch (err) {
                    alert("สร้างกลุ่มไม่สำเร็จ: " + err.message);
                } finally {
                    setIsGenerating(false);
                }
            };

            const regenerateGroupImage = async () => {
                if (!activeGroup) return;
                setIsGeneratingGroupImage(true);
                try {
                    const aiImageUrl = await generateAIImage(activeGroup.name);
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).update({
                        imageUrl: aiImageUrl
                    });
                } catch (e) {
                    alert("AI วาดรูปไม่สำเร็จ: " + e.message);
                } finally {
                    setIsGeneratingGroupImage(false);
                }
            };

            const updateGroupName = async () => {
                if (!editGroupName.trim() || !activeGroup) return;
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).update({
                    name: editGroupName.trim()
                });
                setShowEditGroup(false);
            };

            const deleteGroup = async (id) => {
                if (!confirm("ลบกลุ่มนี้ข้อมูลจะหายถาวรเลยนะคะ ยืนยันไหมคะ?")) return;
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(id).delete();
                if (activeGroup?.id === id) setView('list');
            };

            const addMember = async () => {
                if (!newMemberName.trim() || activeGroup.members.includes(newMemberName.trim())) return;
                const updatedMembers = [...activeGroup.members, newMemberName.trim()];
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).update({ members: updatedMembers });
                setNewMemberName('');
            };

            const removeMember = async (name) => {
                if (!confirm(`ลบ ${name} ออกจากกลุ่ม?`)) return;
                const updatedMembers = activeGroup.members.filter(m => m !== name);
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).update({ members: updatedMembers });
            };

            const saveExpense = async () => {
                const amount = evaluateMath(expAmount);
                if (!expDesc || amount <= 0 || !expPayer || expParticipants.length === 0) return;
                const expData = {
                    description: expDesc, amount: amount, payer: expPayer, participants: expParticipants,
                    date: editingExpense ? editingExpense.date : Date.now()
                };
                const ref = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).collection('expenses');
                if (editingExpense) await ref.doc(editingExpense.id).update(expData);
                else await ref.add(expData);
                setShowExpenseModal(false);
                setEditingExpense(null);
                setExpDesc('');
                setExpAmount('');
            };

            const deleteExpense = async (id) => {
                if (!confirm("ลบรายการนี้ใช่หรือไม่?")) return;
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).collection('expenses').doc(id).delete();
            };

            const totalSpent = useMemo(() => expenses.reduce((sum, e) => sum + e.amount, 0), [expenses]);

            const settlements = useMemo(() => {
                if (!activeGroup || activeGroup.members.length < 2) return [];
                const balances = {};
                activeGroup.members.forEach(m => balances[m] = 0);
                expenses.forEach(e => {
                    const share = e.amount / e.participants.length;
                    balances[e.payer] += e.amount;
                    e.participants.forEach(p => { if (balances.hasOwnProperty(p)) balances[p] -= share; });
                });
                const creditors = [], debtors = [];
                Object.keys(balances).forEach(n => {
                    if (balances[n] > 0.01) creditors.push({name: n, amt: balances[n]});
                    else if (balances[n] < -0.01) debtors.push({name: n, amt: Math.abs(balances[n])});
                });
                const res = []; let i = 0, j = 0;
                while (i < debtors.length && j < creditors.length) {
                    const pay = Math.min(debtors[i].amt, creditors[j].amt);
                    res.push({ from: debtors[i].name, to: creditors[j].name, amount: pay });
                    debtors[i].amt -= pay;
                    creditors[j].amt -= pay;
                    if (debtors[i].amt < 0.01) i++; if (creditors[j].amt < 0.01) j++;
                }
                return res;
            }, [activeGroup, expenses]);

            const exportImage = async () => {
                setExporting(true);
                const element = document.getElementById('export-area');
                element.style.position = "static";
                element.style.left = "0";
                const canvas = await html2canvas(element, { scale: 2, backgroundColor: '#FDFBF9' });
                element.style.position = "absolute";
                element.style.left = "-9999px";
                const link = document.createElement('a');
                link.download = `สรุปบิล_${activeGroup.name}.png`;
                link.href = canvas.toDataURL();
                link.click();
                setExporting(false);
            };

            const exportExcel = () => {
                const data = [["กลุ่ม:", activeGroup.name], ["ยอดรวม:", totalSpent], [], ["รายการ", "จำนวนเงิน", "คนจ่าย", "คนร่วมหาร"], ...expenses.map(e => [e.description, e.amount, e.payer, e.participants.join(', ')]), [], ["ผู้โอน", "ผู้รับโอน", "ยอดโอน"]];
                settlements.forEach(s => data.push([s.from, s.to, s.amount]));
                const ws = XLSX.utils.aoa_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "สรุปบิล");
                XLSX.writeFile(wb, `${activeGroup.name}_Expenses.xlsx`);
            };

            const Avatar = ({ name, size = "md" }) => {
                const sizeClasses = { sm: "w-8 h-8 text-[11px]", md: "w-14 h-14 text-[20px]", lg: "w-20 h-20 text-[28px]" };
                return (
                    <div style={{ backgroundColor: getMemberColor(name) }} className={`${sizeClasses[size]} rounded-3xl flex items-center justify-center font-bold text-[#232946] border-2 border-white shadow-sm shrink-0`}>
                        {name[0].toUpperCase()}
                    </div>
                );
            };

            if (loading && !user) return <div className="h-screen flex items-center justify-center pastel-gradient"><div className="w-12 h-12 border-4 border-white border-t-transparent rounded-full animate-spin"></div></div>;

            if (!user) return (
                <div className="h-screen flex items-center justify-center p-6 pastel-gradient">
                    <div className="glass-card p-10 text-center max-w-sm w-full border-4 border-white animate-pop shadow-2xl relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-[#FFADAD] via-[#FDFFB6] to-[#9BF6FF]"></div>
                        <div className="w-40 h-40 bg-white rounded-[3rem] flex items-center justify-center mx-auto mb-8 shadow-xl overflow-hidden border-4 border-[#FDFBF9]">
                            {appLogo ? <img src={appLogo} className="w-full h-full object-cover animate-pop" alt="App Logo" /> : <span className="text-5xl animate-pulse">🧸</span>}
                        </div>
                        <h1 className="text-4xl font-bold mb-2 text-[#232946]">หารเงินกับเพื่อน</h1>
                        <p className="text-slate-500 mb-10 font-medium text-lg">จัดการค่าใช้จ่ายกลุ่มแบบ 3D พาสเทล ✨</p>
                        <button onClick={handleLogin} className="w-full py-5 bg-[#EEBBC3] text-[#232946] rounded-3xl font-bold flex items-center justify-center gap-3 hover:bg-[#e8a9b4] transition-all btn-glow shadow-lg border-b-4 border-[#d69fa8] group text-xl">
                            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-6 h-6 bg-white rounded-full p-1 group-hover:rotate-12 transition-transform" />
                            เข้าใช้งานด้วย Google
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen pb-12">
                    {/* Header */}
                    <header className="p-4 sm:p-10 sticky top-0 z-40">
                        <div className="max-w-4xl mx-auto glass-card px-8 flex items-center justify-between border-2 border-white shadow-lg thai-header-container">
                            <div className="flex items-center gap-4">
                                {view === 'detail' && (
                                    <button onClick={() => setView('list')} className="p-3 bg-[#FDFBF9] hover:bg-[#B8C1EC]/20 rounded-full transition-colors">
                                        <i data-lucide="chevron-left" className="w-8 h-8 text-[#232946]"></i>
                                    </button>
                                )}
                                <div className="flex flex-col justify-center">
                                    <h1 className="text-2xl sm:text-4xl font-bold text-[#232946] truncate max-w-[150px] sm:max-w-none leading-none mb-2">
                                        {view === 'list' ? 'กลุ่มของฉัน' : activeGroup?.name}
                                    </h1>
                                    <div className="flex items-center gap-2 mt-3">
                                        <div className="w-2.5 h-2.5 bg-green-400 rounded-full animate-pulse"></div>
                                        <span className="text-[12px] font-bold text-slate-400 uppercase tracking-widest leading-none">Real-time Cloud Sync</span>
                                    </div>
                                </div>
                                {view === 'detail' && (
                                    <button onClick={() => { setEditGroupName(activeGroup.name); setShowEditGroup(true); }} className="p-2 text-slate-300 hover:text-blue-400 transition-colors"><i data-lucide="edit-2" className="w-6 h-6"></i></button>
                                )}
                            </div>
                            <div className="flex items-center gap-6">
                                <div className="text-right hidden sm:block">
                                    <p className="text-[12px] font-bold text-slate-400 uppercase tracking-widest leading-none mb-1">สวัสดีจ้า</p>
                                    <p className="text-xl font-bold text-[#232946] leading-none">{user.displayName.split(' ')[0]}</p>
                                </div>
                                <div className="relative group">
                                    <div className="w-16 h-16 rounded-[1.5rem] border-2 border-white shadow-md overflow-hidden bg-white transition-transform group-hover:scale-105">
                                        <img src={user.photoURL} className="w-full h-full object-cover" />
                                    </div>
                                    <button onClick={handleLogout} className="absolute -top-2 -right-2 bg-red-400 text-white p-2.5 rounded-full border-2 border-white shadow-md hover:bg-red-500 transition-colors">
                                        <i data-lucide="log-out" className="w-4 h-4"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto p-4 space-y-8 animate-pop">
                        {view === 'list' ? (
                            <div className="space-y-6">
                                <div className="flex justify-between items-center px-2">
                                    <h2 className="text-3xl font-bold text-slate-500 leading-normal">เลือกกลุ่มที่ต้องการ</h2>
                                    <button onClick={() => setShowAddGroup(true)} className="bg-[#B8C1EC] text-[#232946] px-10 py-6 rounded-[2rem] font-bold shadow-lg shadow-[#B8C1EC]/30 btn-glow border-b-4 border-[#a5add4] flex items-center gap-4 text-2xl">
                                        <i data-lucide="plus-circle" className="w-8 h-8"></i> เปิดกลุ่มใหม่
                                    </button>
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-8 pt-4">
                                    {groups.map(g => (
                                        <div key={g.id} onClick={() => { setActiveGroup(g); setView('detail'); }} className="glass-card p-10 hover:shadow-2xl hover:-translate-y-2 transition-all cursor-pointer border-2 border-white relative group flex flex-col items-center text-center">
                                            <button onClick={(e) => { e.stopPropagation(); deleteGroup(g.id); }} className="absolute top-6 right-6 p-3 text-slate-200 hover:text-red-400 transition-colors opacity-0 group-hover:opacity-100">
                                                <i data-lucide="trash-2" className="w-7 h-7"></i>
                                            </button>
                                            <div className="w-48 h-48 bg-white rounded-[3rem] flex items-center justify-center mb-8 shadow-inner border-4 border-[#FDFBF9] overflow-hidden bg-slate-50">
                                                {g.imageUrl ? <img src={g.imageUrl} className="w-full h-full object-cover" alt={g.name} /> : <span className="text-8xl">📊</span>}
                                            </div>
                                            <h3 className="text-3xl font-bold text-[#232946] mb-2 leading-normal">{g.name}</h3>
                                            <p className="text-[16px] text-slate-400 font-bold uppercase tracking-widest mb-6 leading-none">เปิดเมื่อ: {formatDate(g.createdAt)}</p>
                                            <div className="flex items-center gap-3">
                                                <div className="flex -space-x-4">
                                                    {g.members.slice(0,5).map((m, i) => (
                                                        <div key={i} style={{ backgroundColor: getMemberColor(m) }} className="w-12 h-12 rounded-2xl border-2 border-white flex items-center justify-center text-[16px] font-bold shadow-sm">{m[0].toUpperCase()}</div>
                                                    ))}
                                                </div>
                                                <span className="text-base font-bold text-slate-400 uppercase tracking-widest ml-3">{g.members.length} คนในกลุ่ม</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-10">
                                {/* Stats Section with AI Image Background */}
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                    <div 
                                        className="md:col-span-2 glass-card p-14 text-[#232946] shadow-xl relative overflow-hidden flex flex-col justify-center min-h-[380px]"
                                        style={{
                                            backgroundImage: activeGroup.imageUrl ? `url(${activeGroup.imageUrl})` : 'none',
                                            backgroundSize: 'cover',
                                            backgroundPosition: 'center'
                                        }}
                                    >
                                        <div className="absolute inset-0 bg-white/70 backdrop-blur-[2px]"></div>
                                        
                                        <div className="relative z-10">
                                            <h4 className="text-2xl font-bold uppercase tracking-widest mb-4 opacity-90 leading-none">ยอดเงินรวมทั้งหมด</h4>
                                            <h2 className="text-7xl sm:text-8xl font-black leading-tight drop-shadow-sm mb-4">฿{formatMoney(totalSpent)}</h2>
                                            <p className="text-xl font-bold mt-6 opacity-90 leading-none bg-white/60 inline-block px-6 py-2.5 rounded-full border border-white">กลุ่มสร้างเมื่อ: {formatDate(activeGroup.createdAt)}</p>
                                            
                                            <div className="flex flex-wrap gap-4 mt-12">
                                                {activeGroup.members.map(m => (
                                                    <div key={m} className="flex items-center gap-3 bg-white/90 pl-3 pr-8 py-3 rounded-3xl text-xl font-bold border border-white/50 shadow-sm transition-transform hover:scale-105">
                                                        <div style={{backgroundColor: getMemberColor(m)}} className="w-8 h-8 rounded-xl border border-white shrink-0"></div>
                                                        <span className="leading-none">{m}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                        
                                        <button 
                                            onClick={regenerateGroupImage}
                                            disabled={isGeneratingGroupImage}
                                            className="absolute top-8 right-8 p-5 bg-white/70 hover:bg-white/95 rounded-3xl backdrop-blur-md border border-white/80 transition-all group/ai z-20 shadow-md"
                                            title="วาดรูปกลุ่มใหม่ด้วย AI"
                                        >
                                            {isGeneratingGroupImage ? (
                                                <div className="w-8 h-8 border-2 border-[#232946]/20 border-t-[#232946] rounded-full animate-spin"></div>
                                            ) : (
                                                <i data-lucide="sparkles" className="w-8 h-8 group-hover/ai:rotate-12 transition-transform"></i>
                                            )}
                                        </button>
                                    </div>
                                    
                                    <div className="glass-card p-12 flex flex-col border-2 border-white min-h-[500px]">
                                        <h4 className="text-xl font-bold text-slate-400 uppercase tracking-widest mb-8 leading-tight">ชาวแก๊งที่หารกัน ({activeGroup.members.length} คน)</h4>
                                        <div className="flex-1 overflow-y-auto no-scrollbar space-y-5 mb-12">
                                            {activeGroup.members.map(m => (
                                                <div key={m} className="flex items-center justify-between bg-white/80 pl-3 pr-6 py-4 rounded-3xl border border-white group/m shadow-sm">
                                                    <div className="flex items-center gap-5">
                                                        <Avatar name={m} size="md" />
                                                        <span className="font-bold text-2xl leading-none">{m}</span>
                                                    </div>
                                                    <button onClick={() => removeMember(m)} className="text-red-300 hover:text-red-500 opacity-0 group-hover/m:opacity-100 transition-opacity p-2"><i data-lucide="trash-2" className="w-7 h-7"></i></button>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="space-y-5 pt-10 border-t border-white/40">
                                            <p className="text-2xl font-bold text-blue-400 text-center uppercase tracking-widest leading-none mb-2">ดึงเพื่อนเข้าตี้เพิ่ม</p>
                                            <div className="flex gap-3">
                                                <input value={newMemberName} onChange={e => setNewMemberName(e.target.value)} placeholder="พิมพ์ชื่อเพื่อน..." className="w-full bg-[#FDFBF9] px-8 py-8 rounded-[2rem] outline-none text-2xl font-bold border-2 border-slate-50 focus:border-[#B8C1EC] transition-all shadow-inner leading-none" onKeyDown={(e) => e.key === 'Enter' && addMember()} />
                                                <button onClick={addMember} className="bg-[#EEBBC3] text-[#232946] px-10 rounded-[2rem] shadow-md active:scale-90 border-b-4 border-[#d69fa8] hover:bg-[#e8a9b4] transition-all"><i data-lucide="user-plus" className="w-10 h-10"></i></button>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Who pays whom? */}
                                <div className="glass-card p-12 border-2 border-white shadow-xl relative overflow-hidden bg-white/60">
                                    <div className="flex justify-between items-center mb-12 relative z-10">
                                        <h3 className="text-4xl font-bold flex items-center gap-5 text-[#232946] leading-relaxed"><i data-lucide="arrow-right-left" className="text-[#FFD6A5] w-10 h-10"></i> ใครต้องโอนให้ใคร</h3>
                                        <div className="flex gap-4">
                                            <button onClick={exportImage} title="บันทึกรูปภาพ" className="p-6 bg-white hover:bg-slate-50 rounded-[2rem] shadow-md transition-all text-slate-400"><i data-lucide="image" className="w-8 h-8"></i></button>
                                            <button onClick={exportExcel} title="โหลดเป็น Excel" className="p-6 bg-white hover:bg-slate-50 rounded-[2rem] shadow-md transition-all text-slate-400"><i data-lucide="file-spreadsheet" className="w-8 h-8"></i></button>
                                        </div>
                                    </div>
                                    <div className="space-y-8 relative z-10">
                                        {settlements.map((s, i) => (
                                            <div key={i} className="flex items-center justify-between bg-white p-10 rounded-[3.5rem] border-2 border-white shadow-sm animate-pop">
                                                <div className="flex items-center gap-10 flex-1">
                                                    <div className="flex flex-col items-center gap-4 shrink-0">
                                                        <Avatar name={s.from} size="lg" />
                                                        <span className="font-bold text-2xl leading-none">{s.from}</span>
                                                    </div>
                                                    <div className="flex-1 flex flex-col items-center">
                                                        <i data-lucide="arrow-right" className="text-[#EEBBC3] w-12 h-12 mb-2"></i>
                                                        <span className="text-sm font-bold text-blue-300 uppercase tracking-widest">ต้องโอนให้</span>
                                                    </div>
                                                    <div className="flex flex-col items-center gap-4 shrink-0">
                                                        <Avatar name={s.to} size="lg" />
                                                        <span className="font-bold text-2xl leading-none">{s.to}</span>
                                                    </div>
                                                </div>
                                                <div className="text-right pl-12 border-l-2 border-slate-100 ml-10">
                                                    <span className="text-5xl font-black text-[#A0C4FF] whitespace-nowrap leading-none">฿{formatMoney(s.amount)}</span>
                                                </div>
                                            </div>
                                        ))}
                                        {settlements.length === 0 && <div className="text-center py-14"><span className="text-7xl mb-6 block">✨</span><p className="text-3xl font-bold text-slate-400 italic">เคลียร์กันครบทุกคนแล้ว แฮปปี้สุดๆ!</p></div>}
                                    </div>
                                </div>

                                {/* Transaction History */}
                                <div className="space-y-10">
                                    <div className="flex flex-col sm:flex-row justify-between items-center gap-8 px-2">
                                        <h3 className="text-4xl font-bold text-[#232946] leading-relaxed">รายการที่จ่ายไปแล้ว</h3>
                                        <button 
                                            onClick={() => { setEditingExpense(null); setExpDesc(''); setExpAmount(''); setExpPayer(activeGroup.members[0]); setExpParticipants(activeGroup.members); setShowExpenseModal(true); }} 
                                            className="w-full sm:w-auto bg-[#EEBBC3] text-[#232946] px-24 py-8 rounded-[3rem] font-bold text-4xl shadow-xl shadow-[#EEBBC3]/30 btn-glow border-b-8 border-[#d69fa8] flex items-center justify-center gap-6 transition-all"
                                        >
                                            <i data-lucide="plus-circle" className="w-12 h-12"></i> เพิ่มรายการใหม่
                                        </button>
                                    </div>
                                    <div className="grid gap-8">
                                        {expenses.map(e => (
                                            <div key={e.id} className="glass-card p-12 flex items-center justify-between group hover:border-[#B8C1EC] transition-all border-2 border-white animate-pop shadow-md hover:shadow-xl">
                                                <div className="flex items-center gap-10">
                                                    <div className="relative">
                                                        <Avatar name={e.payer} size="md" />
                                                        <div className="absolute -bottom-1 -right-1 bg-white p-2.5 rounded-2xl border border-slate-100 shadow-sm text-xs">💰</div>
                                                    </div>
                                                    <div>
                                                        <h4 className="font-bold text-4xl text-[#232946] leading-normal mb-2">{e.description}</h4>
                                                        <div className="flex items-center gap-4 text-base font-bold text-slate-400">
                                                            <span className="text-[#B8C1EC] font-black text-2xl leading-none">{e.payer} จ่ายแล้ว</span> <span className="opacity-30">|</span> <span>หาร {e.participants.length} คน</span>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-12">
                                                    <div className="text-right">
                                                        <p className="text-6xl font-black text-[#232946] leading-none">฿{formatMoney(e.amount)}</p>
                                                    </div>
                                                    <div className="flex flex-col gap-5 opacity-0 group-hover:opacity-100 transition-opacity">
                                                        <button onClick={() => { setEditingExpense(e); setExpDesc(e.description); setExpAmount(e.amount.toString()); setExpPayer(e.payer); setExpParticipants(e.participants); setShowExpenseModal(true); }} className="p-4 bg-white rounded-2xl shadow-sm text-blue-400 hover:text-blue-600 transition-colors"><i data-lucide="edit-3" className="w-8 h-8"></i></button>
                                                        <button onClick={() => deleteExpense(e.id)} className="p-4 bg-white rounded-2xl shadow-sm text-red-300 hover:text-red-500 transition-colors"><i data-lucide="trash-2" className="w-8 h-8"></i></button>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Modals */}
                    {showAddGroup && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-[#232946]/40 backdrop-blur-md animate-pop">
                            <div className="bg-white w-full max-w-sm rounded-[4rem] p-16 shadow-2xl border-4 border-[#EEBBC3] text-center">
                                {isGenerating ? (
                                    <div className="flex flex-col items-center py-10">
                                        <div className="loader-ai mb-10"></div>
                                        <h3 className="text-4xl font-bold text-[#232946] leading-relaxed">กำลังวาดรูปกลุ่มให้จ้า...</h3>
                                        <p className="text-slate-400 mt-4 font-medium text-2xl">AI กำลังสร้างรูปภาพตามชื่อกลุ่มคุณ</p>
                                    </div>
                                ) : (
                                    <>
                                        <span className="text-8xl block mb-10 animate-bounce">🎈</span>
                                        <h3 className="text-4xl font-bold mb-6 text-[#232946] leading-relaxed">เปิดกลุ่มใหม่</h3>
                                        <p className="text-slate-400 mb-12 font-medium text-2xl">ชื่อกลุ่มนี้คืออะไรดีคะ?</p>
                                        <input autoFocus value={newGroupName} onChange={e => setNewGroupName(e.target.value)} placeholder="เช่น ทริปญี่ปุ่น..." className="w-full bg-[#FDFBF9] border-2 border-slate-100 px-10 py-10 rounded-[2.5rem] outline-none focus:ring-4 ring-[#EEBBC3]/20 font-bold text-3xl text-center mb-12 leading-none" onKeyDown={(e) => e.key === 'Enter' && createGroup()} />
                                        <div className="space-y-6">
                                            <button onClick={createGroup} className="w-full bg-[#EEBBC3] text-[#232946] py-8 rounded-[2.5rem] font-bold shadow-xl btn-glow transition-all border-b-4 border-[#d69fa8] text-3xl active:translate-y-1">เริ่มสร้างกลุ่มเลย!</button>
                                            <button onClick={() => setShowAddGroup(false)} className="w-full py-2 text-slate-300 font-bold hover:text-slate-500 text-2xl">ไว้ก่อนจ้า</button>
                                        </div>
                                    </>
                                )}
                            </div>
                        </div>
                    )}

                    {showEditGroup && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-[#232946]/40 backdrop-blur-md animate-pop">
                            <div className="bg-white w-full max-w-sm rounded-[4rem] p-16 shadow-2xl border-4 border-[#B8C1EC] text-center">
                                <h3 className="text-4xl font-bold mb-12 text-[#232946] leading-relaxed">เปลี่ยนชื่อกลุ่ม</h3>
                                <input autoFocus value={editGroupName} onChange={e => setEditGroupName(e.target.value)} className="w-full bg-[#FDFBF9] border-2 border-slate-100 px-10 py-8 rounded-[2.5rem] outline-none focus:ring-4 ring-[#B8C1EC]/20 font-bold text-3xl text-center shadow-inner mb-14 leading-none" onKeyDown={(e) => e.key === 'Enter' && updateGroupName()} />
                                <div className="flex gap-6">
                                    <button onClick={() => setShowEditGroup(false)} className="flex-1 py-6 text-slate-300 font-bold text-2xl hover:text-slate-500 transition-all">ยกเลิก</button>
                                    <button onClick={updateGroupName} className="flex-1 bg-[#B8C1EC] text-[#232946] py-8 rounded-[2.5rem] font-bold shadow-lg border-b-4 border-[#a5add4] text-3xl active:scale-95 transition-all">บันทึก</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showExpenseModal && (
                        <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-0 sm:p-6 bg-[#232946]/40 backdrop-blur-md animate-pop">
                            <div className="bg-white w-full max-w-md rounded-t-[4rem] sm:rounded-[5rem] p-16 shadow-2xl max-h-[95vh] overflow-y-auto no-scrollbar border-t-8 border-[#B8C1EC]">
                                <div className="flex justify-between items-center mb-14">
                                    <h3 className="text-4xl font-bold text-[#232946] leading-relaxed">{editingExpense ? 'แก้ข้อมูลบิล' : 'จ่ายค่าอะไรไปบ้าง'}</h3>
                                    <button onClick={() => setShowExpenseModal(false)} className="p-5 bg-slate-50 rounded-full hover:bg-slate-100 transition-colors"><i data-lucide="x" className="w-10 h-10"></i></button>
                                </div>
                                <div className="space-y-14 text-left">
                                    <div className="bg-[#B8C1EC]/10 p-12 rounded-[3.5rem] border-2 border-[#B8C1EC]/20 shadow-inner">
                                        <label className="text-xl font-bold text-slate-400 uppercase tracking-widest block mb-6 leading-none">จ่ายค่าอะไรคะ?</label>
                                        <input value={expDesc} onChange={e => setExpDesc(e.target.value)} placeholder="เช่น ค่าที่พัก, ค่าน้ำส้ม" className="w-full bg-white px-8 py-8 rounded-[1.5rem] outline-none font-bold text-3xl border border-white focus:ring-2 ring-blue-100 transition-all shadow-sm leading-none" />
                                    </div>
                                    <div className="bg-[#FFD6A5]/10 p-12 rounded-[3.5rem] border-2 border-[#FFD6A5]/20 shadow-inner">
                                        <label className="text-xl font-bold text-slate-400 uppercase tracking-widest block mb-6 leading-none">กี่บาทคะ? (คำนวณได้นะ)</label>
                                        <div className="relative">
                                            <input value={expAmount} onChange={e => setExpAmount(e.target.value)} placeholder="0" className="w-full bg-white px-8 py-10 rounded-[1.5rem] outline-none font-black text-7xl text-[#A0C4FF] pr-48 border border-white shadow-sm leading-none" />
                                            <div className="absolute right-6 top-1/2 -translate-y-1/2 text-base font-black text-slate-300 bg-[#FDFBF9] px-6 py-4 rounded-2xl border border-slate-100 shadow-sm leading-none">
                                                = ฿{formatMoney(evaluateMath(expAmount))}
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="space-y-8">
                                        <label className="text-xl font-bold text-slate-400 uppercase tracking-widest block mb-6 leading-none">ใครเป็นคนเปย์?</label>
                                        <div className="flex overflow-x-auto gap-6 pb-6 no-scrollbar">
                                            {activeGroup.members.map(m => (
                                                <button key={m} onClick={() => setExpPayer(m)} className={`shrink-0 flex flex-col items-center gap-5 p-6 rounded-[3.5rem] border-2 transition-all ${expPayer === m ? 'bg-white border-[#B8C1EC] shadow-md scale-110' : 'border-transparent opacity-60'}`}>
                                                    <Avatar name={m} size="md" />
                                                    <span className="text-xl font-black leading-none">{m}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="space-y-8">
                                        <div className="flex justify-between items-center">
                                            <label className="text-xl font-bold text-slate-400 uppercase tracking-widest leading-none">ใครร่วมหารบ้าง? ({expParticipants.length} คน)</label>
                                            <button onClick={() => setExpParticipants(activeGroup.members)} className="text-lg font-bold text-blue-400 border-2 border-blue-100 px-8 py-3 rounded-full hover:bg-blue-50 transition-colors shadow-sm leading-none">หารทุกคน</button>
                                        </div>
                                        <div className="grid grid-cols-2 gap-6">
                                            {activeGroup.members.map(m => (
                                                <button key={m} onClick={() => expParticipants.includes(m) ? setExpParticipants(expParticipants.filter(p => p !== m)) : setExpParticipants([...expParticipants, m])} className={`flex items-center gap-6 px-8 py-10 rounded-[2.5rem] font-bold border-2 transition-all text-3xl ${expParticipants.includes(m) ? 'bg-[#EEBBC3] border-[#EEBBC3] text-[#232946] shadow-lg scale-[1.03]' : 'bg-[#FDFBF9] border-slate-50 text-slate-400 opacity-70 leading-none'}`}>
                                                    <div style={{backgroundColor: expParticipants.includes(m) ? 'white' : getMemberColor(m)}} className="w-12 h-12 rounded-2xl shrink-0 border border-white flex items-center justify-center text-base font-black leading-none">{m[0].toUpperCase()}</div>
                                                    <span className="truncate leading-none">{m}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    <button onClick={saveExpense} className="w-full bg-[#232946] text-white py-14 rounded-[5rem] font-bold text-5xl shadow-2xl active:scale-95 transition-all mt-10 border-b-8 border-black leading-none">บันทึกรายการ!</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Export Area Container */}
                    <div id="export-area" className="p-10 bg-[#FDFBF9]">
                        <div className="glass-card p-10 border-4 border-white shadow-2xl text-center">
                            <span className="text-5xl block mb-4">🎀</span>
                            <h1 className="text-5xl font-bold mb-2 text-[#232946]">{activeGroup?.name}</h1>
                            <p className="text-[#A0C4FF] font-black text-xl mb-12 tracking-widest uppercase">ใบสรุปยอดเงินเพื่อนรัก</p>
                            <div className="text-left space-y-8">
                                <div className="bg-[#B8C1EC]/10 p-8 rounded-[3rem] border-2 border-white shadow-inner text-center">
                                    <h3 className="font-bold text-[#232946] mb-2 text-3xl">ยอดรวมทั้งหมด</h3>
                                    <p className="text-7xl font-black text-[#232946]">฿{formatMoney(totalSpent)}</p>
                                </div>
                                <div className="space-y-4">
                                    <h3 className="font-bold border-l-8 border-[#EEBBC3] pl-6 text-[#232946] ml-2 leading-relaxed text-3xl">ใครต้องโอนให้ใคร</h3>
                                    {settlements.map((s, i) => (
                                        <div key={i} className="flex justify-between bg-white/70 p-8 rounded-[2.5rem] border-2 border-white shadow-sm items-center">
                                            <span className="font-bold text-[#232946] text-2xl">{s.from} ➜ {s.to}</span>
                                            <span className="font-black text-[#A0C4FF] text-3xl">฿{formatMoney(s.amount)}</span>
                                        </div>
                                    ))}
                                </div>
                                <p className="text-[14px] text-center text-slate-300 mt-16 font-bold tracking-widest uppercase italic">สรุปโดยระบบ Expense Pro Cloud ✨</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
