<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Pro - หารทริปกับเพื่อน</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✈️</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- External Libraries for Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Mitr:wght@400;500;600&family=Sarabun:wght@300;400;500;600&display=swap');

        :root {
            --font-display: 'Mitr', sans-serif;
            --font-body: 'Sarabun', sans-serif;
            --clr-bg: #FDFBF9;
            --clr-surface: rgba(255, 255, 255, 0.85);
            --clr-pink: #EEBBC3;
            --clr-blue: #B8C1EC;
            --clr-ink: #232946;
            --radius-card: 28px;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--clr-bg);
            color: var(--clr-ink);
            margin: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        h1, h2, h3, h4 { font-family: var(--font-display); }

        .pastel-gradient {
            background: linear-gradient(135deg, #FFADAD 0%, #FFD6A5 25%, #FDFFB6 50%, #CAFFBF 75%, #9BF6FF 100%);
        }

        .glass-card {
            background: var(--clr-surface);
            backdrop-filter: blur(16px);
            border: 2px solid white;
            border-radius: var(--radius-card);
            box-shadow: 0 12px 40px -8px rgba(184, 193, 236, 0.25);
        }

        .btn-primary {
            background: var(--clr-pink);
            border-bottom: 4px solid #d8a5ae;
            border-radius: 18px;
            transition: all 0.1s;
        }
        .btn-primary:active { transform: translateY(2px); border-bottom-width: 2px; }

        .btn-secondary {
            background: var(--clr-blue);
            border-bottom: 4px solid #9faad8;
            border-radius: 18px;
            transition: all 0.1s;
        }
        .btn-secondary:active { transform: translateY(2px); border-bottom-width: 2px; }

        .animate-pop { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }
        @keyframes popIn { from { opacity: 0; transform: scale(0.92) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .loader {
            width: 32px; height: 32px;
            border: 4px solid #f3f3f3; border-top-color: var(--clr-pink);
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #export-area { position: absolute; left: -9999px; top: 0; width: 400px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Firebase Setup
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : {
                apiKey: "AIzaSyCwnWHqG__ty3OvDok2o6orgreXOu5LSXk",
                authDomain: "expense-manager-14564.firebaseapp.com",
                projectId: "expense-manager-14564",
                storageBucket: "expense-manager-14564.firebasestorage.app",
                messagingSenderId: "259280883710",
                appId: "1:259280883710:web:67d7ce7b1f8e5e196a7aaf"
            };

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'expense-manager-pro-v2';

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const TRAVEL_ICONS = ['map', 'plane', 'mountain', 'palmtree', 'utensils', 'camera', 'tent', 'shopping-bag', 'coffee', 'car', 'hotel', 'ticket', 'compass', 'sun', 'umbrella'];
        const PASTEL_COLORS = ['#FFADAD', '#FFD6A5', '#FDFFB6', '#CAFFBF', '#9BF6FF', '#A0C4FF', '#BDB2FF', '#FFC6FF'];

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('list');
            const [groups, setGroups] = useState([]);
            const [activeGroup, setActiveGroup] = useState(null);
            const [expenses, setExpenses] = useState([]);
            const [loading, setLoading] = useState(true);
            const [exporting, setExporting] = useState(false);

            // Modals & State
            const [showAddGroup, setShowAddGroup] = useState(false);
            const [showJoinGroup, setShowJoinGroup] = useState(false);
            const [showExpenseModal, setShowExpenseModal] = useState(false);
            const [editingExpense, setEditingExpense] = useState(null);
            const [newGroupName, setNewGroupName] = useState('');
            const [joinId, setJoinId] = useState('');
            const [newMemberName, setNewMemberName] = useState('');
            const [expDesc, setExpDesc] = useState('');
            const [expAmount, setExpAmount] = useState('');
            const [expPayer, setExpPayer] = useState('');
            const [expParticipants, setExpParticipants] = useState([]);

            // Rule 3: Auth FIRST and Await it
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (err) {
                        console.error("Auth Error:", err);
                    }
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            // Rule 1: Strict Paths - Always use artifacts/appId/public/data
            // Rule 2: No Complex Queries - Fetch all and filter in memory
            useEffect(() => {
                if (!user) return;
                const myName = user.displayName?.split(' ')[0] || 'ฉัน';
                const groupsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups');
                
                const unsubscribe = groupsRef.onSnapshot((snap) => {
                    const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    // Filtering and sorting in memory as per Rule 2
                    const myGroups = data
                        .filter(g => g.ownerId === user.uid || g.members.includes(myName))
                        .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
                    
                    setGroups(myGroups);
                    
                    if (activeGroup) {
                        const updated = myGroups.find(g => g.id === activeGroup.id);
                        if (updated) setActiveGroup(updated);
                    }
                }, (err) => {
                    console.error("Firestore Groups Error:", err);
                });
                
                return () => unsubscribe();
            }, [user, activeGroup?.id]);

            useEffect(() => {
                if (!user || !activeGroup) return;
                const expRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).collection('expenses');
                
                const unsubscribe = expRef.onSnapshot((snap) => {
                    const list = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    // Sorting in memory
                    setExpenses(list.sort((a, b) => b.date - a.date));
                }, (err) => {
                    console.error("Firestore Expenses Error:", err);
                });

                return () => unsubscribe();
            }, [user, activeGroup?.id]);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

            // Helpers
            const getGroupStyle = (id = "default") => {
                let hash = 0;
                for (let i = 0; i < id.length; i++) hash = id.charCodeAt(i) + ((hash << 5) - hash);
                const color = PASTEL_COLORS[Math.abs(hash) % PASTEL_COLORS.length];
                const icon = TRAVEL_ICONS[Math.abs(hash) % TRAVEL_ICONS.length];
                return { color, icon };
            };

            const formatMoney = (v) => Number(v || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });

            const evaluateMath = (str) => {
                try {
                    const sanitized = str.toString().replace(/[^-+*/().0-9]/g, '');
                    if (!sanitized) return 0;
                    return new Function(`return ${sanitized}`)() || 0;
                } catch (e) { return 0; }
            };

            const copyId = () => {
                if (!activeGroup) return;
                const el = document.createElement('textarea');
                el.value = activeGroup.id;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                alert("คัดลอก ID กลุ่มแล้ว ส่งให้เพื่อนเพื่อเข้าร่วมทริปได้เลย! ✈️");
            };

            const handleLogin = async () => {
                const provider = new firebase.auth.GoogleAuthProvider();
                await auth.signInWithPopup(provider);
            };

            const createGroup = async () => {
                if (!newGroupName.trim() || !user) return;
                const myName = user.displayName?.split(' ')[0] || 'ฉัน';
                try {
                    // Rule 1: Always guard with auth check
                    if (!auth.currentUser) return;
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').add({
                        name: newGroupName.trim(),
                        ownerId: user.uid,
                        ownerName: myName,
                        members: [myName],
                        createdAt: Date.now()
                    });
                    setNewGroupName('');
                    setShowAddGroup(false);
                } catch (e) { alert("เกิดข้อผิดพลาด: " + e.message); }
            };

            const joinGroup = async () => {
                if (!joinId.trim() || !user) return;
                try {
                    if (!auth.currentUser) return;
                    const myName = user.displayName?.split(' ')[0] || 'ฉัน';
                    const groupRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(joinId.trim());
                    const doc = await groupRef.get();
                    if (!doc.exists) { alert("ไม่พบกลุ่มนี้ กรุณาตรวจสอบ ID อีกครั้ง"); return; }
                    
                    if (!doc.data().members.includes(myName)) {
                        await groupRef.update({ members: firebase.firestore.FieldValue.arrayUnion(myName) });
                        alert(`เข้าร่วมกลุ่ม "${doc.data().name}" สำเร็จ! 🎉`);
                    } else {
                        alert("คุณอยู่ในกลุ่มนี้อยู่แล้วครับ");
                    }
                    setJoinId('');
                    setShowJoinGroup(false);
                } catch (e) { alert("เข้าร่วมไม่สำเร็จ: " + e.message); }
            };

            const deleteGroup = async (id, e) => {
                e.stopPropagation();
                if (!auth.currentUser) return;
                if (confirm("ต้องการลบกลุ่มและข้อมูลทั้งหมดถาวรหรือไม่?")) {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(id).delete();
                }
            };

            const addMember = async () => {
                if (!auth.currentUser || !activeGroup) return;
                if (!newMemberName.trim() || activeGroup.members.includes(newMemberName.trim())) return;
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).update({
                    members: firebase.firestore.FieldValue.arrayUnion(newMemberName.trim())
                });
                setNewMemberName('');
            };

            const removeMember = async (name) => {
                if (!auth.currentUser || !activeGroup) return;
                if (confirm(`ลบ ${name} ออกจากกลุ่ม?`)) {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).update({
                        members: firebase.firestore.FieldValue.arrayRemove(name)
                    });
                }
            };

            const saveExpense = async () => {
                if (!auth.currentUser || !activeGroup) return;
                const amount = evaluateMath(expAmount);
                if (!expDesc || amount <= 0 || !expPayer) return;
                
                const data = {
                    description: expDesc, amount, payer: expPayer, participants: expParticipants,
                    date: editingExpense ? editingExpense.date : Date.now()
                };
                
                const ref = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).collection('expenses');
                if (editingExpense) await ref.doc(editingExpense.id).update(data);
                else await ref.add(data);

                setShowExpenseModal(false);
                setEditingExpense(null);
            };

            const deleteExpense = async (id) => {
                if (!auth.currentUser || !activeGroup) return;
                if (confirm("ลบรายการนี้ใช่หรือไม่?")) {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).collection('expenses').doc(id).delete();
                }
            };

            const exportImage = async () => {
                setExporting(true);
                const element = document.getElementById('export-area');
                element.style.position = "relative";
                element.style.left = "0";
                try {
                    const canvas = await html2canvas(element, { scale: 2, backgroundColor: '#FDFBF9' });
                    const link = document.createElement('a');
                    link.download = `สรุปยอด_${activeGroup.name}.png`;
                    link.href = canvas.toDataURL();
                    link.click();
                } catch (e) { console.error(e); }
                element.style.position = "absolute";
                element.style.left = "-9999px";
                setExporting(false);
            };

            const exportExcel = () => {
                const data = [
                    ["กลุ่ม:", activeGroup.name], ["ยอดรวม:", totalSpent], [],
                    ["รายละเอียด", "จำนวนเงิน", "ผู้จ่าย", "ผู้ร่วมหาร"],
                    ...expenses.map(e => [e.description, e.amount, e.payer, e.participants.join(', ')]),
                    [], ["จาก", "ถึง", "จำนวนที่ต้องโอน"]
                ];
                settlements.forEach(s => data.push([s.from, s.to, s.amount]));
                const ws = XLSX.utils.aoa_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "สรุปบิลทริป");
                XLSX.writeFile(wb, `Expenses_${activeGroup.name}.xlsx`);
            };

            // Calculations
            const totalSpent = useMemo(() => expenses.reduce((s, e) => s + e.amount, 0), [expenses]);
            const settlements = useMemo(() => {
                if (!activeGroup || activeGroup.members.length < 2) return [];
                const balances = {};
                activeGroup.members.forEach(m => balances[m] = 0);
                expenses.forEach(e => {
                    const share = e.amount / e.participants.length;
                    balances[e.payer] += e.amount;
                    e.participants.forEach(p => { if (balances.hasOwnProperty(p)) balances[p] -= share; });
                });
                const creditors = [], debtors = [];
                Object.keys(balances).forEach(n => {
                    if (balances[n] > 0.01) creditors.push({ name: n, amt: balances[n] });
                    else if (balances[n] < -0.01) debtors.push({ name: n, amt: Math.abs(balances[n]) });
                });
                const res = []; let i = 0, j = 0;
                while (i < debtors.length && j < creditors.length) {
                    const pay = Math.min(debtors[i].amt, creditors[j].amt);
                    res.push({ from: debtors[i].name, to: creditors[j].name, amount: pay });
                    debtors[i].amt -= pay; creditors[j].amt -= pay;
                    if (debtors[i].amt < 0.01) i++;
                    if (creditors[j].amt < 0.01) j++;
                }
                return res;
            }, [activeGroup, expenses]);

            const GroupIcon = ({ id, size = "md" }) => {
                const { color, icon } = getGroupStyle(id);
                const s = size === "lg" ? "w-20 h-20" : "w-12 h-12";
                return (
                    <div style={{ backgroundColor: color }} className={`${s} rounded-2xl flex items-center justify-center border-2 border-white shadow-sm shrink-0`}>
                        <i data-lucide={icon} className="text-[#232946]" style={{ width: size === "lg" ? 36 : 20 }}></i>
                    </div>
                );
            };

            const Avatar = ({ name, size = "sm" }) => (
                <div style={{ backgroundColor: PASTEL_COLORS[name.length % PASTEL_COLORS.length] }} 
                     className={`${size === "sm" ? "w-7 h-7 text-[10px]" : "w-10 h-10 text-xs"} rounded-full flex items-center justify-center font-bold border-2 border-white shadow-sm text-[#232946] shrink-0`}>
                    {name[0].toUpperCase()}
                </div>
            );

            if (loading) return <div className="h-screen flex items-center justify-center pastel-gradient"><div className="loader"></div></div>;

            return (
                <div className="min-h-screen pb-20">
                    <header className="p-4 sticky top-0 z-50">
                        <div className="max-w-3xl mx-auto glass-card px-5 py-3 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                {view === 'detail' && (
                                    <button onClick={() => setView('list')} className="p-2 hover:bg-slate-50 rounded-xl transition-all"><i data-lucide="arrow-left" className="w-5 h-5"></i></button>
                                )}
                                <div>
                                    <h2 className="text-lg font-bold truncate max-w-[180px]">{view === 'list' ? 'ทริปของฉัน' : activeGroup?.name}</h2>
                                    <div className="flex items-center gap-1">
                                        <div className="w-1.5 h-1.5 bg-green-400 rounded-full"></div>
                                        <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Live Sync</span>
                                    </div>
                                </div>
                            </div>
                            <div className="flex items-center gap-3">
                                {!user || user.isAnonymous ? (
                                    <button onClick={handleLogin} className="text-xs font-bold bg-white px-4 py-2 rounded-xl shadow-sm border border-slate-100 hover:bg-slate-50">Login</button>
                                ) : (
                                    <div className="relative group">
                                        <img src={user.photoURL} className="w-10 h-10 rounded-2xl border-2 border-white shadow-sm" />
                                        <button onClick={() => auth.signOut()} className="absolute -top-1 -right-1 bg-white p-1 rounded-full shadow-sm border border-slate-100 opacity-0 group-hover:opacity-100 transition-opacity"><i data-lucide="log-out" className="w-3 h-3"></i></button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-3xl mx-auto px-4 mt-4 animate-pop">
                        {view === 'list' ? (
                            <div className="space-y-6">
                                <div className="flex gap-3">
                                    <button onClick={() => setShowAddGroup(true)} className="btn-primary flex-1 py-4 font-bold shadow-md flex items-center justify-center gap-2"><i data-lucide="plus-circle" className="w-5 h-5"></i> สร้างกลุ่มใหม่</button>
                                    <button onClick={() => setShowJoinGroup(true)} className="btn-secondary flex-1 py-4 font-bold shadow-md flex items-center justify-center gap-2"><i data-lucide="users" className="w-5 h-5"></i> เข้าทริปเพื่อน</button>
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    {groups.map(g => (
                                        <div key={g.id} onClick={() => { setActiveGroup(g); setView('detail'); }} className="glass-card p-6 cursor-pointer relative group/card hover:shadow-2xl hover:-translate-y-1 transition-all">
                                            <button onClick={(e) => deleteGroup(g.id, e)} className="absolute top-4 right-4 text-slate-200 hover:text-red-400 opacity-0 group-hover/card:opacity-100 transition-opacity"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                            <div className="flex items-center gap-4">
                                                <GroupIcon id={g.id} />
                                                <div className="flex-1 min-w-0">
                                                    <h3 className="font-bold text-lg truncate mb-1">{g.name}</h3>
                                                    <p className="text-xs text-slate-400 font-bold uppercase tracking-widest">{g.members.length} สมาชิก</p>
                                                </div>
                                            </div>
                                            <div className="mt-4 flex -space-x-2">
                                                {g.members.slice(0, 5).map((m, idx) => <Avatar key={idx} name={m} />)}
                                                {g.members.length > 5 && <div className="w-7 h-7 rounded-full bg-slate-100 border-2 border-white flex items-center justify-center text-[8px] font-bold">+{g.members.length - 5}</div>}
                                            </div>
                                        </div>
                                    ))}
                                    {groups.length === 0 && (
                                        <div className="col-span-full py-24 text-center glass-card border-dashed">
                                            <i data-lucide="compass" className="w-16 h-16 mx-auto mb-4 text-slate-200"></i>
                                            <p className="font-bold text-slate-400">ยังไม่มีทริป เริ่มสร้างหรือขอ ID เพื่อนได้เลย!</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-6">
                                {/* Dashboard with Blurred Background */}
                                <div className="glass-card p-7 relative overflow-hidden bg-white/40 border-white/60">
                                    <div className="absolute -top-12 -right-12 opacity-15 transform rotate-12 scale-[1.8] pointer-events-none">
                                        <i data-lucide={getGroupStyle(activeGroup.id).icon} style={{ width: 280, height: 280, color: getGroupStyle(activeGroup.id).color, filter: 'blur(50px)' }}></i>
                                    </div>
                                    <div className="relative z-10">
                                        <div className="flex justify-between items-start mb-2">
                                            <p className="text-xs font-bold text-slate-400 uppercase tracking-widest">ยอดรวมใช้จ่ายทริปนี้</p>
                                            <div className="flex items-center gap-2">
                                                <span className="text-[10px] font-mono bg-white/60 px-2 py-1 rounded-lg border border-white/50 shadow-sm">ID: {activeGroup.id}</span>
                                                <button onClick={copyId} className="bg-white/80 p-1.5 rounded-lg shadow-sm hover:text-blue-500 transition-colors"><i data-lucide="copy" className="w-3.5 h-3.5"></i></button>
                                            </div>
                                        </div>
                                        <h1 className="text-5xl font-bold mb-6">฿{formatMoney(totalSpent)}</h1>
                                        <div className="flex flex-wrap gap-2">
                                            {activeGroup.members.map(m => (
                                                <div key={m} className="bg-white/70 backdrop-blur-md px-3 py-1.5 rounded-full border border-white flex items-center gap-2 shadow-sm text-xs font-bold">
                                                    <div style={{backgroundColor: PASTEL_COLORS[m.length % PASTEL_COLORS.length]}} className="w-2.5 h-2.5 rounded-full"></div>
                                                    {m}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                {/* Settlement */}
                                <div className="glass-card p-6">
                                    <div className="flex items-center justify-between mb-5">
                                        <h3 className="font-bold flex items-center gap-2"><i data-lucide="arrow-right-left" className="w-4 h-4 text-orange-300"></i> สรุปการเคลียร์เงิน</h3>
                                        <div className="flex gap-2">
                                            <button onClick={exportImage} className="p-2 bg-white rounded-lg shadow-sm text-slate-400 hover:text-blue-400"><i data-lucide="image" className="w-4 h-4"></i></button>
                                            <button onClick={exportExcel} className="p-2 bg-white rounded-lg shadow-sm text-slate-400 hover:text-green-500"><i data-lucide="file-spreadsheet" className="w-4 h-4"></i></button>
                                        </div>
                                    </div>
                                    <div className="space-y-3">
                                        {settlements.map((s, idx) => (
                                            <div key={idx} className="flex items-center justify-between p-4 bg-white/80 rounded-2xl border border-white shadow-sm animate-pop" style={{animationDelay: `${idx*0.05}s`}}>
                                                <div className="flex items-center gap-4 flex-1">
                                                    <div className="flex items-center gap-2">
                                                        <Avatar name={s.from} size="md" />
                                                        <span className="font-bold text-sm">{s.from}</span>
                                                    </div>
                                                    <i data-lucide="arrow-right" className="w-4 h-4 text-slate-100 flex-1 text-center"></i>
                                                    <div className="flex items-center gap-2">
                                                        <Avatar name={s.to} size="md" />
                                                        <span className="font-bold text-sm">{s.to}</span>
                                                    </div>
                                                </div>
                                                <div className="pl-6 border-l ml-4 text-right">
                                                    <p className="text-[9px] text-slate-300 font-bold uppercase">ต้องโอน</p>
                                                    <p className="text-lg font-bold text-blue-500">฿{formatMoney(s.amount)}</p>
                                                </div>
                                            </div>
                                        ))}
                                        {settlements.length === 0 && <div className="py-8 text-center opacity-30 font-bold">ยอดเงินเคลียร์กันลงตัวแล้ว! ✨</div>}
                                    </div>
                                </div>

                                {/* Expenses List */}
                                <div className="space-y-4">
                                    <div className="flex justify-between items-center px-1">
                                        <h3 className="font-bold">บิลทั้งหมด</h3>
                                        <button onClick={() => { setEditingExpense(null); setExpDesc(''); setExpAmount(''); setExpPayer(activeGroup.members[0]); setExpParticipants(activeGroup.members); setShowExpenseModal(true); }}
                                            className="btn-primary px-5 py-2.5 text-xs font-bold shadow-md flex items-center gap-2"><i data-lucide="plus-circle" className="w-4 h-4"></i> เพิ่มบิล</button>
                                    </div>
                                    <div className="grid gap-3">
                                        {expenses.map(e => (
                                            <div key={e.id} className="glass-card p-4 flex justify-between items-center group/item bg-white/60">
                                                <div className="flex items-center gap-3">
                                                    <Avatar name={e.payer} size="md" />
                                                    <div>
                                                        <h4 className="font-bold text-sm leading-tight">{e.description}</h4>
                                                        <p className="text-[10px] text-slate-400 font-bold uppercase tracking-tighter"><b>{e.payer}</b> จ่าย • หาร {e.participants.length} คน</p>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-4">
                                                    <div className="text-right">
                                                        <p className="font-bold text-sm">฿{formatMoney(e.amount)}</p>
                                                        <p className="text-[10px] text-slate-300">{new Date(e.date).toLocaleDateString('th-TH')}</p>
                                                    </div>
                                                    <div className="flex flex-col gap-1 opacity-0 group-hover/item:opacity-100 transition-opacity">
                                                        <button onClick={() => { setEditingExpense(e); setExpDesc(e.description); setExpAmount(e.amount.toString()); setExpPayer(e.payer); setExpParticipants(e.participants); setShowExpenseModal(true); }} className="p-1 hover:text-blue-400"><i data-lucide="edit-3" className="w-3.5 h-3.5"></i></button>
                                                        <button onClick={() => deleteExpense(e.id)} className="p-1 hover:text-red-400"><i data-lucide="trash-2" className="w-3.5 h-3.5"></i></button>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* Quick Member Manager */}
                                <div className="glass-card p-6 bg-slate-50 border-none">
                                    <h4 className="text-xs font-bold text-slate-400 uppercase mb-4">จัดการสมาชิก</h4>
                                    <div className="flex flex-wrap gap-2 mb-4">
                                        {activeGroup.members.map(m => (
                                            <div key={m} className="bg-white px-3 py-1.5 rounded-xl flex items-center gap-2 border border-slate-100 shadow-sm">
                                                <Avatar name={m} />
                                                <span className="text-xs font-bold">{m}</span>
                                                <button onClick={() => removeMember(m)} className="text-slate-200 hover:text-red-300"><i data-lucide="x" className="w-3 h-3"></i></button>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="flex gap-2">
                                        <input value={newMemberName} onChange={e => setNewMemberName(e.target.value)} onKeyDown={e => e.key === 'Enter' && addMember()} placeholder="ชื่อเพื่อน..." className="flex-1 bg-white rounded-xl px-4 py-2 text-sm outline-none border border-slate-100" />
                                        <button onClick={addMember} className="bg-blue-400 text-white p-2 rounded-xl"><i data-lucide="plus" className="w-5 h-5"></i></button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Modals */}
                    {showAddGroup && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/20 backdrop-blur-sm animate-pop">
                            <div className="glass-card p-8 w-full max-w-sm text-center shadow-2xl">
                                <h3 className="text-xl font-bold mb-2">ทริปใหม่ไปไหนดี? 🏕️</h3>
                                <p className="text-xs text-slate-400 mb-6">ระบุชื่อทริปของคุณ</p>
                                <input autoFocus value={newGroupName} onChange={e => setNewGroupName(e.target.value)} onKeyDown={e => e.key === 'Enter' && createGroup()} placeholder="เช่น ทริปสเปน 2024" className="w-full bg-slate-50 border-none rounded-2xl px-5 py-4 text-center font-bold mb-6 outline-none ring-blue-100 focus:ring-4 transition-all" />
                                <div className="flex gap-3">
                                    <button onClick={() => setShowAddGroup(false)} className="flex-1 py-3 font-bold text-slate-400">ยกเลิก</button>
                                    <button onClick={createGroup} className="btn-primary flex-[2] py-3 font-bold shadow-lg">สร้างเลย!</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showJoinGroup && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/20 backdrop-blur-sm animate-pop">
                            <div className="glass-card p-8 w-full max-w-sm text-center shadow-2xl">
                                <h3 className="text-xl font-bold mb-2">เข้าทริปเพื่อน ✈️</h3>
                                <p className="text-xs text-slate-400 mb-6">กรอก ID กลุ่มที่เพื่อนส่งให้</p>
                                <input autoFocus value={joinId} onChange={e => setJoinId(e.target.value)} onKeyDown={e => e.key === 'Enter' && joinGroup()} placeholder="วาง ID ตรงนี้..." className="w-full bg-slate-50 border-none rounded-2xl px-5 py-4 text-center font-mono text-sm mb-6 outline-none ring-blue-100 focus:ring-4" />
                                <div className="flex gap-3">
                                    <button onClick={() => setShowJoinGroup(false)} className="flex-1 py-3 font-bold text-slate-400">ยกเลิก</button>
                                    <button onClick={joinGroup} className="btn-secondary flex-[2] py-3 font-bold shadow-lg">เข้าร่วม</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showExpenseModal && (
                        <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-0 sm:p-6 bg-black/20 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-xl sm:rounded-[32px] rounded-t-[32px] p-8 shadow-2xl max-h-[90vh] overflow-y-auto no-scrollbar border-t-8 border-[#EEBBC3] animate-pop">
                                <div className="flex justify-between items-center mb-8">
                                    <h3 className="text-xl font-bold">{editingExpense ? 'แก้ไขบิล' : 'จดบิลใหม่'}</h3>
                                    <button onClick={() => setShowExpenseModal(false)} className="p-2 hover:bg-slate-100 rounded-full"><i data-lucide="x" className="w-6 h-6"></i></button>
                                </div>
                                <div className="space-y-6">
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">จ่ายค่าอะไร?</label>
                                        <input value={expDesc} onChange={e => setExpDesc(e.target.value)} placeholder="เช่น ค่าข้าวเที่ยง, ค่าตั๋วรถไฟ" className="w-full bg-slate-50 rounded-2xl px-4 py-4 font-bold outline-none border-2 border-transparent focus:border-blue-100" />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">จำนวนเงิน (฿)</label>
                                        <div className="relative">
                                            <input value={expAmount} onChange={e => setExpAmount(e.target.value)} placeholder="0.00" className="w-full bg-slate-50 rounded-2xl px-4 py-5 text-4xl font-bold text-blue-500 outline-none pr-36" />
                                            <div className="absolute right-4 top-1/2 -translate-y-1/2 text-right">
                                                <span className="text-[10px] font-bold text-slate-300 block">ยอดรวม</span>
                                                <span className="text-sm font-bold text-slate-500">฿{formatMoney(evaluateMath(expAmount))}</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-3">ใครจ่าย?</label>
                                        <div className="flex overflow-x-auto gap-4 pb-2 no-scrollbar">
                                            {activeGroup.members.map(m => (
                                                <button key={m} onClick={() => setExpPayer(m)} className={`shrink-0 flex flex-col items-center gap-2 p-3 rounded-2xl border-2 transition-all ${expPayer === m ? 'border-pink-300 bg-pink-50 shadow-sm' : 'border-transparent opacity-40'}`}>
                                                    <Avatar name={m} size="md" />
                                                    <span className="text-[10px] font-bold">{m}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    <div>
                                        <div className="flex justify-between items-center mb-3">
                                            <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">หารกับใคร? ({expParticipants.length} คน)</label>
                                            <button onClick={() => setExpParticipants(activeGroup.members)} className="text-[10px] font-bold text-blue-500 underline">หารทุกคน</button>
                                        </div>
                                        <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
                                            {activeGroup.members.map(m => (
                                                <button key={m} onClick={() => expParticipants.includes(m) ? setExpParticipants(expParticipants.filter(p => p !== m)) : setExpParticipants([...expParticipants, m])}
                                                    className={`flex items-center gap-3 p-3 rounded-2xl border-2 transition-all font-bold text-sm ${expParticipants.includes(m) ? 'border-[#EEBBC3] bg-[#EEBBC3]/10' : 'border-slate-50 bg-slate-50 text-slate-300'}`}>
                                                    <div className={`w-4 h-4 rounded-md border-2 ${expParticipants.includes(m) ? 'bg-[#EEBBC3] border-[#EEBBC3]' : 'border-slate-200'} flex items-center justify-center`}>
                                                        {expParticipants.includes(m) && <i data-lucide="check" className="w-3 h-3 text-white"></i>}
                                                    </div>
                                                    <span className="truncate">{m}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    <button onClick={saveExpense} className="w-full btn-primary py-5 text-lg font-bold shadow-xl mt-4">บันทึกบิล ✨</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Export Area (Hidden Container) */}
                    <div id="export-area" className="p-8 bg-[#FDFBF9]">
                        <div className="glass-card p-8 border-2 border-white text-center">
                            <h2 className="text-2xl font-bold mb-1">{activeGroup?.name}</h2>
                            <p className="text-[10px] text-slate-400 font-bold uppercase mb-8">สรุปรายการใช้จ่ายทริป</p>
                            <div className="bg-[#B8C1EC]/10 p-6 rounded-[28px] mb-8">
                                <p className="text-xs font-bold text-slate-400 mb-1">ยอดรวมทั้งหมด</p>
                                <p className="text-4xl font-bold">฿{formatMoney(totalSpent)}</p>
                            </div>
                            <div className="text-left space-y-3">
                                <h3 className="text-sm font-bold border-l-4 border-[#EEBBC3] pl-3 mb-4">ต้องโอนให้กันดังนี้:</h3>
                                {settlements.map((s, idx) => (
                                    <div key={idx} className="flex justify-between bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                                        <span className="font-bold text-sm">{s.from} ➜ {s.to}</span>
                                        <span className="font-bold text-blue-500">฿{formatMoney(s.amount)}</span>
                                    </div>
                                ))}
                            </div>
                            <p className="text-[10px] text-slate-300 mt-12 font-bold uppercase tracking-[4px]">Powered by Expense Pro</p>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
