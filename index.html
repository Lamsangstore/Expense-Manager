<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Pro - Pastel Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
    <script src="https://unpkg.com/lucide@latest" crossorigin></script>
    
    <!-- External Libraries for Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <!-- Firebase SDK Modules -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Mali:wght@400;600;700&display=swap');
        
        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: #FDFBF9; 
            margin: 0; 
            padding: 0; 
            color: #232946;
        }

        h1, h2, h3, .cute-font { 
            font-family: 'Mali', cursive; 
        }

        .pastel-gradient {
            background: linear-gradient(135deg, #FFADAD 0%, #FFD6A5 20%, #FDFFB6 40%, #CAFFBF 60%, #9BF6FF 80%, #A0C4FF 100%);
        }

        .glass-card { 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(15px); 
            border: 2px solid #FFFFFF; 
            border-radius: 32px;
            box-shadow: 0 10px 30px -5px rgba(184, 193, 236, 0.3);
        }

        .pastel-pink { background-color: #EEBBC3; }
        .pastel-blue { background-color: #B8C1EC; }
        .pastel-cream { background-color: #FFFFFE; }

        .btn-glow:active { transform: scale(0.96); }
        .btn-glow:hover { box-shadow: 0 0 20px rgba(238, 187, 195, 0.6); }

        .animate-pop { animation: popIn 0.5s cubic-bezier(0.26, 0.53, 0.74, 1.48); }
        @keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        #export-area { position: absolute; left: -9999px; top: 0; width: 400px; z-index: -100; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyCwnWHqG__ty3OvDok2o6orgreXOu5LSXk",
            authDomain: "expense-manager-14564.firebaseapp.com",
            projectId: "expense-manager-14564",
            storageBucket: "expense-manager-14564.firebasestorage.app",
            messagingSenderId: "259280883710",
            appId: "1:259280883710:web:67d7ce7b1f8e5e196a7aaf",
            measurementId: "G-68BWRR5K8N"
        };
        
        const appId = "expense-manager-pro-v1";

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const partyEmojis = ['🍕', '🍣', '🍻', '✈️', '🍲', '☕', '🎳', '🛍️', '🎤', '🏖️', '⛰️', '🍱', '🍖', '🎮', '🚗', '🚢', '🥘', '🍿', '🎡', '🎀', '🧸'];

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('list');
            const [groups, setGroups] = useState([]);
            const [activeGroup, setActiveGroup] = useState(null);
            const [expenses, setExpenses] = useState([]);
            const [loading, setLoading] = useState(true);
            const [exporting, setExporting] = useState(false);
            
            const [showAddGroup, setShowAddGroup] = useState(false);
            const [showExpenseModal, setShowExpenseModal] = useState(false);
            const [editingExpense, setEditingExpense] = useState(null);
            
            const [newGroupName, setNewGroupName] = useState('');
            const [newMemberName, setNewMemberName] = useState('');
            const [expDesc, setExpDesc] = useState('');
            const [expAmount, setExpAmount] = useState('');
            const [expPayer, setExpPayer] = useState('');
            const [expParticipants, setExpParticipants] = useState([]);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    if (!u) setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const groupsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups');
                return groupsRef.where("ownerId", "==", user.uid).onSnapshot((snap) => {
                    setGroups(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    setLoading(false);
                });
            }, [user]);

            useEffect(() => {
                if (!user || !activeGroup) return;
                const expRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).collection('expenses');
                return expRef.orderBy("date", "desc").onSnapshot((snap) => {
                    setExpenses(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
            }, [user, activeGroup]);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

            const evaluateMath = (str) => {
                try {
                    const sanitized = str.toString().replace(/[^-+*/().0-9]/g, '');
                    if (!sanitized) return 0;
                    const res = new Function(`return ${sanitized}`)();
                    return isNaN(res) ? 0 : res;
                } catch (e) { return 0; }
            };

            const formatMoney = (val) => Number(val || 0).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});

            const handleLogin = async () => {
                const provider = new firebase.auth.GoogleAuthProvider();
                await auth.signInWithPopup(provider);
            };

            const handleLogout = () => {
                if(confirm("ต้องการออกจากระบบใช่ไหมคะ?")) auth.signOut();
            };

            const createGroup = async () => {
                if (!newGroupName.trim()) return;
                const randomIcon = partyEmojis[Math.floor(Math.random() * partyEmojis.length)];
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').add({
                    name: newGroupName.trim(),
                    ownerId: user.uid,
                    members: [user.displayName.split(' ')[0] || 'Me'],
                    icon: randomIcon,
                    createdAt: Date.now()
                });
                setNewGroupName('');
                setShowAddGroup(false);
            };

            const addMember = async () => {
                if (!newMemberName.trim() || activeGroup.members.includes(newMemberName.trim())) return;
                const updatedMembers = [...activeGroup.members, newMemberName.trim()];
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).update({ members: updatedMembers });
                setActiveGroup({...activeGroup, members: updatedMembers});
                setNewMemberName('');
            };

            const removeMember = async (name) => {
                if (!confirm(`ลบ ${name} ออกจากกลุ่ม?`)) return;
                const updatedMembers = activeGroup.members.filter(m => m !== name);
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).update({ members: updatedMembers });
                setActiveGroup({...activeGroup, members: updatedMembers});
            };

            const saveExpense = async () => {
                const amount = evaluateMath(expAmount);
                if (!expDesc || amount <= 0 || !expPayer || expParticipants.length === 0) return;
                const expData = {
                    description: expDesc,
                    amount: amount,
                    payer: expPayer,
                    participants: expParticipants,
                    date: editingExpense ? editingExpense.date : Date.now()
                };
                const ref = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).collection('expenses');
                if (editingExpense) await ref.doc(editingExpense.id).update(expData);
                else await ref.add(expData);
                setShowExpenseModal(false);
                setEditingExpense(null);
                setExpDesc('');
                setExpAmount('');
            };

            const deleteExpense = async (id) => {
                if (!confirm("ลบรายการนี้ใช่หรือไม่?")) return;
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).collection('expenses').doc(id).delete();
            };

            const totalSpent = useMemo(() => expenses.reduce((sum, e) => sum + e.amount, 0), [expenses]);

            const settlements = useMemo(() => {
                if (!activeGroup || activeGroup.members.length < 2) return [];
                const balances = {};
                activeGroup.members.forEach(m => balances[m] = 0);
                expenses.forEach(e => {
                    const share = e.amount / e.participants.length;
                    balances[e.payer] += e.amount;
                    e.participants.forEach(p => { if (balances.hasOwnProperty(p)) balances[p] -= share; });
                });
                const creditors = [], debtors = [];
                Object.keys(balances).forEach(n => {
                    if (balances[n] > 0.01) creditors.push({name: n, amt: balances[n]});
                    else if (balances[n] < -0.01) debtors.push({name: n, amt: Math.abs(balances[n])});
                });
                const res = []; let i = 0, j = 0;
                while (i < debtors.length && j < creditors.length) {
                    const pay = Math.min(debtors[i].amt, creditors[j].amt);
                    res.push({ from: debtors[i].name, to: creditors[j].name, amount: pay });
                    debtors[i].amt -= pay; creditors[j].amt -= pay;
                    if (debtors[i].amt < 0.01) i++; if (creditors[j].amt < 0.01) j++;
                }
                return res;
            }, [activeGroup, expenses]);

            const exportImage = async () => {
                setExporting(true);
                const element = document.getElementById('export-area');
                element.style.position = "static";
                element.style.left = "0";
                const canvas = await html2canvas(element, { scale: 2, backgroundColor: '#FDFBF9' });
                element.style.position = "absolute";
                element.style.left = "-9999px";
                const link = document.createElement('a');
                link.download = `BillSummary_${activeGroup.name}.png`;
                link.href = canvas.toDataURL();
                link.click();
                setExporting(false);
            };

            const exportExcel = () => {
                const data = [["กลุ่ม:", activeGroup.name], ["ยอดรวม:", totalSpent], [], ["รายการ", "เงิน", "คนจ่าย", "คนหาร"], ...expenses.map(e => [e.description, e.amount, e.payer, e.participants.join(', ')]), [], ["จาก", "ไปหา", "ยอด"]];
                settlements.forEach(s => data.push([s.from, s.to, s.amount]));
                const ws = XLSX.utils.aoa_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Summary");
                XLSX.writeFile(wb, `${activeGroup.name}_Bill.xlsx`);
            };

            if (loading && !user) return <div className="h-screen flex items-center justify-center pastel-gradient"><div className="w-12 h-12 border-4 border-white border-t-transparent rounded-full animate-spin"></div></div>;

            if (!user) return (
                <div className="h-screen flex items-center justify-center p-6 pastel-gradient">
                    <div className="glass-card p-10 text-center max-w-sm w-full border-4 border-white animate-pop shadow-2xl">
                        <div className="w-24 h-24 bg-white rounded-[2rem] flex items-center justify-center mx-auto mb-8 shadow-xl">
                            <span className="text-5xl">🧸</span>
                        </div>
                        <h1 className="text-4xl font-bold mb-2 text-[#232946]">Bill with Friends</h1>
                        <p className="text-slate-500 mb-10 font-medium">มาจดบิลกับเพื่อนแบบนุ่มฟูกันเถอะ!</p>
                        <button onClick={handleLogin} className="w-full py-5 bg-[#EEBBC3] text-[#232946] rounded-3xl font-bold flex items-center justify-center gap-3 hover:bg-[#e8a9b4] transition-all btn-glow shadow-lg border-b-4 border-[#d69fa8]">
                            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-6 h-6 bg-white rounded-full p-1" />
                            Log in with Google
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen pb-12">
                    {/* Header */}
                    <header className="p-4 sm:p-6 sticky top-0 z-40">
                        <div className="max-w-4xl mx-auto glass-card px-6 py-4 flex items-center justify-between border-2 border-white shadow-lg">
                            <div className="flex items-center gap-3">
                                {view === 'detail' && (
                                    <button onClick={() => setView('list')} className="p-2 bg-[#FDFBF9] hover:bg-[#B8C1EC]/20 rounded-full transition-colors">
                                        <i data-lucide="chevron-left" className="w-5 h-5 text-[#232946]"></i>
                                    </button>
                                )}
                                <h1 className="text-2xl font-bold text-[#232946]">{view === 'list' ? 'ตี้ทั้งหมด' : activeGroup?.name}</h1>
                            </div>
                            <div className="flex items-center gap-4">
                                <div className="text-right hidden sm:block">
                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest leading-none mb-1">สวัสดีจ้า</p>
                                    <p className="text-sm font-bold text-[#232946]">{user.displayName.split(' ')[0]}</p>
                                </div>
                                <div className="relative group">
                                    <img src={user.photoURL} className="w-11 h-11 rounded-2xl border-2 border-white shadow-md" />
                                    <button 
                                        onClick={handleLogout}
                                        className="absolute -top-2 -right-2 bg-red-400 text-white p-1.5 rounded-full border-2 border-white shadow-md hover:bg-red-500 transition-colors"
                                        title="Log out"
                                    >
                                        <i data-lucide="log-out" className="w-3 h-3"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto p-4 space-y-8 animate-pop">
                        {view === 'list' ? (
                            <div className="space-y-6">
                                <div className="flex justify-between items-center px-2">
                                    <h2 className="text-xl font-bold text-slate-500">เลือกตี้ที่ต้องการ</h2>
                                    <button 
                                        onClick={() => setShowAddGroup(true)} 
                                        className="bg-[#B8C1EC] text-[#232946] px-6 py-3 rounded-3xl font-bold shadow-lg shadow-[#B8C1EC]/30 btn-glow border-b-4 border-[#a5add4]"
                                    >
                                        + เปิดตี้ใหม่
                                    </button>
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">
                                    {groups.map(g => (
                                        <div key={g.id} onClick={() => { setActiveGroup(g); setView('detail'); }} className="glass-card p-8 hover:shadow-2xl hover:-translate-y-2 transition-all cursor-pointer border-2 border-white relative group">
                                            <div className="w-16 h-16 bg-white rounded-3xl flex items-center justify-center text-4xl mb-4 shadow-inner border border-slate-50">{g.icon || '📊'}</div>
                                            <h3 className="text-2xl font-bold text-[#232946]">{g.name}</h3>
                                            <div className="flex items-center gap-2 mt-2">
                                                <div className="flex -space-x-2">
                                                    {g.members.slice(0,3).map((m, i) => (
                                                        <div key={i} className="w-6 h-6 rounded-full bg-slate-100 border-2 border-white flex items-center justify-center text-[8px] font-bold shadow-sm">{m[0]}</div>
                                                    ))}
                                                </div>
                                                <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{g.members.length} Members</span>
                                            </div>
                                        </div>
                                    ))}
                                    {groups.length === 0 && (
                                        <div className="col-span-full py-20 text-center glass-card border-dashed border-4 border-white opacity-60">
                                            <p className="text-xl font-bold text-slate-400">ยังไม่มีตี้เลย มาเริ่มกันเถอะ! ✨</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-8">
                                {/* Stats */}
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <div className="md:col-span-2 glass-card p-10 bg-gradient-to-br from-[#B8C1EC] to-[#A0C4FF] text-[#232946] shadow-xl relative overflow-hidden">
                                        <div className="relative z-10">
                                            <h4 className="text-xs font-bold uppercase tracking-widest mb-2 opacity-70">ยอดรวมค่าเสียหาย</h4>
                                            <h2 className="text-5xl font-black">฿{formatMoney(totalSpent)}</h2>
                                            <div className="flex flex-wrap gap-2 mt-8">
                                                {activeGroup.members.map(m => (
                                                    <div key={m} className="bg-white/40 px-4 py-1.5 rounded-full text-xs font-bold backdrop-blur-md border border-white/50">{m}</div>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="absolute -bottom-10 -right-10 opacity-10 rotate-12"><i data-lucide="wallet" className="w-64 h-64"></i></div>
                                    </div>
                                    <div className="glass-card p-8 flex flex-col justify-between border-2 border-white">
                                        <div>
                                            <h4 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">ชาวแก๊ง ({activeGroup.members.length})</h4>
                                            <div className="flex flex-wrap gap-2 mb-6 max-h-32 overflow-y-auto no-scrollbar">
                                                {activeGroup.members.map(m => (
                                                    <div key={m} className="flex items-center gap-2 bg-[#FDFBF9] pl-3 pr-2 py-1.5 rounded-2xl border border-slate-100 group/m">
                                                        <span className="font-bold text-xs">{m}</span>
                                                        <button onClick={() => removeMember(m)} className="text-red-300 hover:text-red-500 opacity-0 group-hover/m:opacity-100 transition-opacity"><i data-lucide="x" className="w-3 h-3"></i></button>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="flex gap-2">
                                            <input value={newMemberName} onChange={e => setNewMemberName(e.target.value)} placeholder="เพิ่มเพื่อน..." className="w-full bg-[#FDFBF9] px-4 py-3 rounded-2xl outline-none text-xs font-bold border border-slate-100 focus:ring-2 ring-[#B8C1EC]/50 transition-all" />
                                            <button onClick={addMember} className="bg-[#EEBBC3] text-[#232946] p-3 rounded-2xl shadow-md active:scale-90 transition-all"><i data-lucide="plus" className="w-5 h-5"></i></button>
                                        </div>
                                    </div>
                                </div>

                                {/* Debt Settlement */}
                                <div className="glass-card p-10 border-2 border-white shadow-xl relative overflow-hidden">
                                    <div className="flex justify-between items-center mb-8 relative z-10">
                                        <h3 className="text-2xl font-bold flex items-center gap-3 text-[#232946]"><i data-lucide="zap" className="text-[#FFD6A5] fill-[#FFD6A5] w-6 h-6"></i> สรุปดีลหนี้เพื่อนรัก</h3>
                                        <div className="flex gap-3">
                                            <button onClick={exportImage} className="p-3 bg-white hover:bg-slate-50 rounded-2xl shadow-md transition-all text-slate-400 hover:text-[#B8C1EC]"><i data-lucide="image" className="w-5 h-5"></i></button>
                                            <button onClick={exportExcel} className="p-3 bg-white hover:bg-slate-50 rounded-2xl shadow-md transition-all text-slate-400 hover:text-[#CAFFBF]"><i data-lucide="file-spreadsheet" className="w-5 h-5"></i></button>
                                        </div>
                                    </div>
                                    <div className="space-y-4 relative z-10">
                                        {settlements.map((s, i) => (
                                            <div key={i} className="flex items-center justify-between bg-white/60 p-5 rounded-[2rem] border border-white shadow-sm animate-pop">
                                                <div className="flex items-center gap-4">
                                                    <span className="font-bold text-lg px-4 py-2 bg-[#FDFBF9] rounded-2xl shadow-inner">{s.from}</span>
                                                    <i data-lucide="arrow-right" className="text-slate-300 w-5 h-5"></i>
                                                    <span className="font-bold text-lg px-4 py-2 bg-[#FDFBF9] rounded-2xl shadow-inner">{s.to}</span>
                                                </div>
                                                <span className="text-2xl font-black text-[#A0C4FF]">฿{formatMoney(s.amount)}</span>
                                            </div>
                                        ))}
                                        {settlements.length === 0 && (
                                            <div className="text-center py-10">
                                                <span className="text-4xl mb-4 block">✨</span>
                                                <p className="text-slate-400 font-bold italic">ทุกคนแฮปปี้ ไม่มีหนี้ค้างจ้า!</p>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* Expenses Section */}
                                <div className="space-y-6">
                                    <div className="flex justify-between items-center px-2">
                                        <h3 className="text-2xl font-bold text-[#232946]">ประวัติสายเปย์</h3>
                                        <button 
                                            onClick={() => { setEditingExpense(null); setExpDesc(''); setExpAmount(''); setExpPayer(activeGroup.members[0]); setExpParticipants(activeGroup.members); setShowExpenseModal(true); }} 
                                            className="bg-[#EEBBC3] text-[#232946] px-8 py-4 rounded-3xl font-bold shadow-xl shadow-[#EEBBC3]/30 btn-glow border-b-4 border-[#d69fa8]"
                                        >
                                            + จัดไป! เพิ่มบิล
                                        </button>
                                    </div>
                                    <div className="grid gap-4">
                                        {expenses.map(e => (
                                            <div key={e.id} className="glass-card p-6 flex items-center justify-between group hover:border-[#B8C1EC] transition-all border-2 border-white animate-pop shadow-md hover:shadow-xl">
                                                <div className="flex items-center gap-5">
                                                    <div className="w-14 h-14 bg-white rounded-3xl flex items-center justify-center text-2xl shadow-inner border border-slate-50">
                                                        {partyEmojis[Math.floor(Math.random() * partyEmojis.length)]}
                                                    </div>
                                                    <div>
                                                        <h4 className="font-bold text-xl text-[#232946]">{e.description}</h4>
                                                        <div className="flex items-center gap-2 mt-1">
                                                            <span className="text-[10px] font-bold text-slate-300 uppercase tracking-widest leading-none">Paid by</span>
                                                            <span className="text-xs font-bold text-[#B8C1EC] leading-none">{e.payer}</span>
                                                            <span className="text-slate-200">|</span>
                                                            <span className="text-[10px] font-bold text-slate-300 uppercase leading-none">{e.participants.length} People</span>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-6">
                                                    <div className="text-right">
                                                        <p className="text-2xl font-black text-[#232946]">฿{formatMoney(e.amount)}</p>
                                                        <p className="text-[10px] font-bold text-slate-300 italic">หารคนละ ฿{formatMoney(e.amount / e.participants.length)}</p>
                                                    </div>
                                                    <div className="flex flex-col gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                                        <button onClick={() => { setEditingExpense(e); setExpDesc(e.description); setExpAmount(e.amount.toString()); setExpPayer(e.payer); setExpParticipants(e.participants); setShowExpenseModal(true); }} className="p-2 bg-white rounded-xl shadow-sm text-blue-300 hover:text-blue-500 transition-colors"><i data-lucide="edit-3" className="w-4 h-4"></i></button>
                                                        <button onClick={() => deleteExpense(e.id)} className="p-2 bg-white rounded-xl shadow-sm text-red-200 hover:text-red-400 transition-colors"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Add Group Modal */}
                    {showAddGroup && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-[#232946]/40 backdrop-blur-md animate-pop">
                            <div className="bg-white w-full max-w-sm rounded-[3rem] p-12 shadow-2xl border-4 border-[#EEBBC3] text-center">
                                <span className="text-5xl block mb-6 animate-bounce">🎈</span>
                                <h3 className="text-3xl font-bold mb-2 text-[#232946]">เปิดตี้ใหม่</h3>
                                <p className="text-slate-400 mb-8 font-medium">ทริปนี้หรือวันนี้จะใช้ชื่อว่าอะไรดีคะ?</p>
                                <input autoFocus value={newGroupName} onChange={e => setNewGroupName(e.target.value)} placeholder="เช่น ทริปญี่ปุ่น 2025" className="w-full bg-[#FDFBF9] border-2 border-slate-100 px-6 py-5 rounded-3xl outline-none focus:ring-4 ring-[#EEBBC3]/20 font-bold mb-8 text-lg text-center" />
                                <div className="space-y-3">
                                    <button onClick={createGroup} className="w-full bg-[#EEBBC3] text-[#232946] py-5 rounded-3xl font-bold shadow-xl btn-glow transition-all border-b-4 border-[#d69fa8]">เริ่มสร้างตี้กันเลย!</button>
                                    <button onClick={() => setShowAddGroup(false)} className="w-full py-2 text-slate-300 font-bold hover:text-slate-500">ไว้ก่อนนะ</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Expense Modal */}
                    {showExpenseModal && (
                        <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-0 sm:p-6 bg-[#232946]/40 backdrop-blur-md animate-pop">
                            <div className="bg-white w-full max-w-md rounded-t-[3rem] sm:rounded-[4rem] p-10 shadow-2xl max-h-[90vh] overflow-y-auto no-scrollbar border-t-8 border-[#B8C1EC]">
                                <div className="flex justify-between items-center mb-8">
                                    <h3 className="text-3xl font-bold text-[#232946]">{editingExpense ? 'แก้ไขบิล' : 'เพิ่มรายการใหม่'}</h3>
                                    <button onClick={() => setShowExpenseModal(false)} className="p-3 bg-slate-50 rounded-full hover:bg-slate-100"><i data-lucide="x" className="w-6 h-6"></i></button>
                                </div>
                                <div className="space-y-8">
                                    <div className="bg-[#B8C1EC]/10 p-6 rounded-[2.5rem] border-2 border-[#B8C1EC]/20 shadow-inner">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">จ่ายค่าอะไรไปคะ?</label>
                                        <input value={expDesc} onChange={e => setExpDesc(e.target.value)} placeholder="เช่น ค่าที่พัก, ค่าน้ำส้ม" className="w-full bg-white px-4 py-3 rounded-2xl outline-none font-bold text-lg border border-white" />
                                    </div>
                                    <div className="bg-[#FFD6A5]/10 p-6 rounded-[2.5rem] border-2 border-[#FFD6A5]/20 shadow-inner">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">กี่บาทคะ? (คำนวณได้นะ)</label>
                                        <div className="relative">
                                            <input value={expAmount} onChange={e => setExpAmount(e.target.value)} placeholder="0" className="w-full bg-white px-6 py-5 rounded-2xl outline-none font-black text-3xl text-[#A0C4FF] pr-32 border border-white" />
                                            <div className="absolute right-4 top-1/2 -translate-y-1/2 text-[10px] font-black text-slate-300 bg-[#FDFBF9] px-3 py-1.5 rounded-xl border border-slate-100 shadow-sm">
                                                = ฿{formatMoney(evaluateMath(expAmount))}
                                            </div>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">ใครสายเปย์?</label>
                                            <select value={expPayer} onChange={e => setExpPayer(e.target.value)} className="w-full bg-[#FDFBF9] px-4 py-4 rounded-2xl outline-none font-bold text-sm border-2 border-slate-50">
                                                {activeGroup.members.map(m => <option key={m} value={m}>{m}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">ปุ่มลัด</label>
                                            <button onClick={() => setExpParticipants(activeGroup.members)} className="w-full bg-[#A0C4FF]/10 text-[#A0C4FF] py-4 rounded-2xl border-2 border-[#A0C4FF]/20 font-bold text-[10px] uppercase tracking-wider">หารทุกคน</button>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-4">หารกับใครบ้าง? ({expParticipants.length} คน)</label>
                                        <div className="grid grid-cols-2 gap-3">
                                            {activeGroup.members.map(m => (
                                                <button key={m} onClick={() => expParticipants.includes(m) ? setExpParticipants(expParticipants.filter(p => p !== m)) : setExpParticipants([...expParticipants, m])} className={`px-4 py-4 rounded-2xl font-bold border-2 transition-all text-sm ${expParticipants.includes(m) ? 'bg-[#EEBBC3] border-[#EEBBC3] text-[#232946] shadow-lg shadow-[#EEBBC3]/20' : 'bg-[#FDFBF9] border-slate-50 text-slate-400'}`}>{m}</button>
                                            ))}
                                        </div>
                                    </div>
                                    <button onClick={saveExpense} className="w-full bg-[#232946] text-white py-6 rounded-[2.5rem] font-bold text-xl shadow-2xl active:scale-95 transition-all mt-4 border-b-8 border-black">บันทึกรายการเลย!</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Export Area Container */}
                    <div id="export-area" className="p-10 bg-[#FDFBF9]">
                        <div className="glass-card p-10 border-4 border-white shadow-2xl text-center">
                            <span className="text-4xl block mb-2">🎀</span>
                            <h1 className="text-4xl font-bold mb-1 text-[#232946]">{activeGroup?.name}</h1>
                            <p className="text-[#A0C4FF] font-black text-lg mb-10 tracking-widest uppercase">Summary Report</p>
                            <div className="text-left space-y-6">
                                <div className="bg-[#B8C1EC]/10 p-6 rounded-[2rem] border-2 border-white shadow-inner">
                                    <h3 className="font-bold text-[#232946] mb-1">ค่าใช้จ่ายรวมทั้งหมด</h3>
                                    <p className="text-4xl font-black text-[#232946]">฿{formatMoney(totalSpent)}</p>
                                </div>
                                <div className="space-y-3">
                                    <h3 className="font-bold border-l-8 border-[#EEBBC3] pl-4 text-[#232946] ml-2">ดีลหนี้เพื่อนรัก</h3>
                                    {settlements.map((s, i) => (
                                        <div key={i} className="flex justify-between bg-white/70 p-5 rounded-2xl border-2 border-white shadow-sm">
                                            <span className="font-bold text-[#232946]">{s.from} ➜ {s.to}</span>
                                            <span className="font-black text-[#A0C4FF]">฿{formatMoney(s.amount)}</span>
                                        </div>
                                    ))}
                                </div>
                                <p className="text-[10px] text-center text-slate-300 mt-12 font-bold tracking-widest uppercase italic">Generated by Expense Pro Cloud ✨</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
