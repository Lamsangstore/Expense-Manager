<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Pro - หารทริปกับเพื่อน</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✈️</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- External Libraries for Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <!-- Firebase SDKs (Compat Version for ease of use in single script) -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Mitr:wght@400;500;600&family=Sarabun:wght@300;400;500;600&display=swap');

        :root {
            --font-display: 'Mitr', sans-serif;
            --font-body: 'Sarabun', sans-serif;
            --clr-ink: #2B3A4A;
            --radius-card: 28px;
        }

        body {
            font-family: var(--font-body);
            color: var(--clr-ink);
            margin: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            background: linear-gradient(135deg, #FFE4E1 0%, #FFF0F5 30%, #E6E6FA 60%, #E0F7FA 100%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        h1, h2, h3, h4 { font-family: var(--font-display); }

        .glass-card {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: var(--radius-card);
            box-shadow: 0 12px 40px -8px rgba(255, 182, 193, 0.25);
        }

        .btn-primary {
            background: linear-gradient(135deg, #FFB6C1, #FFC0CB);
            color: #2B3A4A;
            border-bottom: 5px solid #FF9EAE;
            border-radius: 24px;
            transition: all 0.1s;
        }
        .btn-primary:active { transform: translateY(3px); border-bottom-width: 2px; }

        .btn-secondary {
            background: linear-gradient(135deg, #B0E0E6, #ADD8E6);
            color: #2B3A4A;
            border-bottom: 5px solid #90C8D6;
            border-radius: 24px;
            transition: all 0.1s;
        }
        .btn-secondary:active { transform: translateY(3px); border-bottom-width: 2px; }

        .shape-flower {
            -webkit-mask-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M50 0 A 15 15 0 0 1 65 15 A 15 15 0 0 1 85 15 A 15 15 0 0 1 85 35 A 15 15 0 0 1 100 50 A 15 15 0 0 1 85 65 A 15 15 0 0 1 85 85 A 15 15 0 0 1 65 85 A 15 15 0 0 1 50 100 A 15 15 0 0 1 35 85 A 15 15 0 0 1 15 85 A 15 15 0 0 1 15 65 A 15 15 0 0 1 0 50 A 15 15 0 0 1 15 35 A 15 15 0 0 1 15 15 A 15 15 0 0 1 35 15 A 15 15 0 0 1 50 0 Z'/%3E%3C/svg%3E");
            -webkit-mask-size: 100% 100%;
            mask-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M50 0 A 15 15 0 0 1 65 15 A 15 15 0 0 1 85 15 A 15 15 0 0 1 85 35 A 15 15 0 0 1 100 50 A 15 15 0 0 1 85 65 A 15 15 0 0 1 85 85 A 15 15 0 0 1 65 85 A 15 15 0 0 1 50 100 A 15 15 0 0 1 35 85 A 15 15 0 0 1 15 85 A 15 15 0 0 1 15 65 A 15 15 0 0 1 0 50 A 15 15 0 0 1 15 35 A 15 15 0 0 1 15 15 A 15 15 0 0 1 35 15 A 15 15 0 0 1 50 0 Z'/%3E%3C/svg%3E");
            mask-size: 100% 100%;
        }

        .animate-pop { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }
        @keyframes popIn { from { opacity: 0; transform: scale(0.92) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        .loader {
            width: 32px; height: 32px;
            border: 4px solid rgba(255, 255, 255, 0.5); border-top-color: #FFB6C1;
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #export-area { 
            position: absolute; 
            left: -9999px; 
            top: 0; 
            width: 1200px;
            height: auto; 
            z-index: -9999;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const ReactDOMClient = window.ReactDOM;

        // Firebase Configuration (Using provided or default fallback)
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : {
                apiKey: "AIzaSyCwnWHqG__ty3OvDok2o6orgreXOu5LSXk",
                authDomain: "expense-manager-14564.firebaseapp.com",
                projectId: "expense-manager-14564",
                storageBucket: "expense-manager-14564.firebasestorage.app",
                messagingSenderId: "259280883710",
                appId: "1:259280883710:web:67d7ce7b1f8e5e196a7aaf"
            };

        const appId = (typeof __app_id !== 'undefined' && __app_id) ? __app_id : 'default-trip-app';

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const LucideIcon = ({ name, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}" class="${className}"></i>`;
                    window.lucide.createIcons({ root: iconRef.current });
                }
            }, [name, className]);
            return <span ref={iconRef} style={{ display: 'contents' }} />;
        };

        function App() {
            const TRAVEL_EMOJIS = ['✈️', '🏝️', '🏕️', '🏔️', '🏰', '🗽', '🌸', '🌈', '🎨', '🎈', '🎠', '🏖️', '🗼', '⛩️', '🚤', '🍩', '📸', '🧸'];
            const PASTEL_COLORS = ['#FFD1DC', '#F8E2E9', '#FADADD', '#E6E6FA', '#E0F7FA', '#D0E8F2', '#B0E0E6', '#FFB6C1', '#FFDAC1', '#FFB7B2', '#FF9AA2', '#E2F0CB', '#B5EAD7', '#C7CEEA', '#F1CBFF', '#D4F0F0', '#FDFD96', '#FFDFD3', '#FEC8D8', '#D291BC'];
            const VIBRANT_COLORS = ['#FF595E', '#FFCA3A', '#8AC926', '#1982C4', '#6A4C93', '#F15BB5', '#00BBF9', '#00F5D4', '#F28F3B', '#C8E9A0', '#FF9AA2', '#B5EAD7', '#C7CEEA', '#E2F0CB', '#FFB7B2', '#E6A8D7', '#97C1A9', '#8FCACA', '#F6A6FF', '#B28DFF'];

            const urlParams = new URLSearchParams(window.location.search);
            const dashIdFromUrl = urlParams.get('dashboard');

            const [user, setUser] = useState(null);
            const [view, setView] = useState(dashIdFromUrl ? 'dashboard' : 'list'); 
            const [groups, setGroups] = useState([]);
            const [activeGroup, setActiveGroup] = useState(null);
            const [expenses, setExpenses] = useState([]);
            const [loading, setLoading] = useState(true);
            const [exporting, setExporting] = useState(false);

            const [showAddGroup, setShowAddGroup] = useState(false);
            const [showJoinGroup, setShowJoinGroup] = useState(false);
            const [showExpenseModal, setShowExpenseModal] = useState(false);
            const [showEditGroup, setShowEditGroup] = useState(false);

            const [editingExpense, setEditingExpense] = useState(null);
            const [newGroupName, setNewGroupName] = useState('');
            const [editGroupName, setEditGroupName] = useState('');
            const [joinId, setJoinId] = useState('');
            const [newMemberName, setNewMemberName] = useState('');
            const [expDesc, setExpDesc] = useState('');
            const [expAmount, setExpAmount] = useState('');
            const [expPayer, setExpPayer] = useState('');
            const [expParticipants, setExpParticipants] = useState([]);
            const [dashError, setDashError] = useState('');

            // --- 1. การตั้งค่าการจดจำการเข้าสู่ระบบ (Persistence) และ Auth Logic ---
            useEffect(() => {
                let isMounted = true;

                const setupAuth = async () => {
                    try {
                        // บังคับให้จดจำ Session ในเครื่อง (Local)
                        await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
                        
                        // ตรวจสอบการกู้คืน Session หรือเตรียม Anonymous Auth
                        auth.onAuthStateChanged(async (u) => {
                            if (!isMounted) return;
                            
                            if (u) {
                                // มี User เดิม หรือ Login สำเร็จ
                                setUser(u);
                                setLoading(false);
                            } else {
                                // ไม่มี User และไม่ได้ติดค้างหน้า Dashboard ให้ลอง Login Anonymous เพื่อเป็น Default State
                                if (!dashIdFromUrl) {
                                    try {
                                        const anonUser = await auth.signInAnonymously();
                                        setUser(anonUser.user);
                                    } catch (e) {
                                        console.error("Anonymous Sign-in failed", e);
                                    }
                                }
                                setLoading(false);
                            }
                        });
                    } catch (err) {
                        console.error("Auth Setup Error:", err);
                        if (isMounted) setLoading(false);
                    }
                };

                setupAuth();
                return () => { isMounted = false; };
            }, []);

            // 2. Load Dashboard (ถ้าเข้าผ่าน Link)
            useEffect(() => {
                if (!user || !dashIdFromUrl) return;

                const groupRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(dashIdFromUrl);
                const unsubscribe = groupRef.onSnapshot(doc => {
                    if (doc.exists) {
                        setActiveGroup({ id: doc.id, ...doc.data() });
                        setView('dashboard');
                        setDashError('');
                    } else {
                        setDashError("ลิงก์แดชบอร์ดไม่ถูกต้อง หรือกลุ่มนี้ถูกลบไปแล้วครับ");
                    }
                }, (err) => {
                    console.error("Dashboard Fetch Error:", err);
                    setDashError("เกิดข้อผิดพลาดในการโหลดข้อมูลทริป หรือคุณไม่มีสิทธิ์เข้าถึงครับ");
                });

                return () => unsubscribe();
            }, [user, dashIdFromUrl]);

            // 3. Auto-Join Logic
            useEffect(() => {
                const inviteId = urlParams.get('join');
                if (!user || user.isAnonymous || !inviteId) return;

                const processJoin = async () => {
                    try {
                        const myName = user.displayName?.split(' ')[0] || 'ฉัน';
                        const groupRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(inviteId);
                        const doc = await groupRef.get();

                        if (doc.exists) {
                            const data = doc.data();
                            if (!(data.members || []).includes(myName)) {
                                await groupRef.update({ members: firebase.firestore.FieldValue.arrayUnion(myName) });
                                alert(`ยินดีต้อนรับ! เข้าร่วมกลุ่ม "${data.name}" เรียบร้อย 🎉`);
                            }
                            setActiveGroup({ id: doc.id, ...data });
                            setView('detail');
                        }
                    } catch (e) { console.error("Auto-join error:", e); }
                    window.history.replaceState({}, document.title, window.location.pathname);
                };
                processJoin();
            }, [user]);

            // 4. Load Groups List
            useEffect(() => {
                if (!user || user.isAnonymous || dashIdFromUrl) return;

                const myName = user.displayName?.split(' ')[0] || 'ฉัน';
                const groupsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups');

                const unsubscribe = groupsRef.onSnapshot((snap) => {
                    const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    const myGroups = data
                        .filter(g => g.ownerId === user.uid || (g.members && g.members.includes(myName)))
                        .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

                    setGroups(myGroups);
                    if (activeGroup && view === 'detail') {
                        const updated = myGroups.find(g => g.id === activeGroup.id);
                        if (updated) setActiveGroup(updated);
                    }
                });
                return () => unsubscribe();
            }, [user, activeGroup?.id, view]);

            // 5. Load Expenses
            useEffect(() => {
                if (!user || !activeGroup) return;
                const expRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).collection('expenses');

                const unsubscribe = expRef.onSnapshot((snap) => {
                    const list = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setExpenses(list.sort((a, b) => b.date - a.date));
                });
                return () => unsubscribe();
            }, [user, activeGroup?.id]);

            // Helper Functions
            const handleLogin = async () => {
                try {
                    const provider = new firebase.auth.GoogleAuthProvider();
                    // Firebase จะจำ User นี้ไว้ใน Local Storage โดยอัตโนมัติจากการตั้ง Persistence
                    await auth.signInWithPopup(provider);
                } catch (e) {
                    console.error("Login Failed:", e);
                }
            };

            const handleLogout = async () => {
                if (confirm("ต้องการออกจากระบบใช่หรือไม่?")) {
                    await auth.signOut();
                    window.location.reload(); // เคลียร์ State ทั้งหมด
                }
            };

            const getGroupStyle = (id = "default") => {
                let hash = 0;
                for (let i = 0; i < id.length; i++) hash = id.charCodeAt(i) + ((hash << 5) - hash);
                return { 
                    color: PASTEL_COLORS[Math.abs(hash) % PASTEL_COLORS.length], 
                    emoji: TRAVEL_EMOJIS[Math.abs(hash) % TRAVEL_EMOJIS.length] 
                };
            };

            const getMemberColor = (name) => {
                let hash = 0;
                for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
                return VIBRANT_COLORS[Math.abs(hash) % VIBRANT_COLORS.length];
            };

            const formatMoney = (v) => Number(v || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            const formatDate = (t) => t ? new Date(t).toLocaleString('th-TH', { day: 'numeric', month: 'short', year: '2-digit', hour: '2-digit', minute: '2-digit' }) : '';

            const evaluateMath = (str) => {
                try {
                    const sanitized = str.toString().replace(/[^-+*/().0-9]/g, '');
                    return sanitized ? (new Function(`return ${sanitized}`)() || 0) : 0;
                } catch (e) { return 0; }
            };

            // Actions
            const createGroup = async () => {
                if (!newGroupName.trim() || !user || user.isAnonymous) return;
                const myName = user.displayName?.split(' ')[0] || 'ฉัน';
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').add({
                        name: newGroupName.trim(),
                        ownerId: user.uid,
                        ownerName: myName,
                        members: [myName],
                        createdAt: Date.now()
                    });
                    setNewGroupName('');
                    setShowAddGroup(false);
                } catch (e) { alert("สร้างกลุ่มไม่สำเร็จ ลองตรวจสอบอินเทอร์เน็ตครับ"); }
            };

            const joinGroup = async () => {
                if (!joinId.trim() || !user || user.isAnonymous) return;
                try {
                    const myName = user.displayName?.split(' ')[0] || 'ฉัน';
                    const groupRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(joinId.trim());
                    const doc = await groupRef.get();
                    if (!doc.exists) return alert("ไม่พบกลุ่มนี้ครับ");

                    if (!(doc.data().members || []).includes(myName)) {
                        await groupRef.update({ members: firebase.firestore.FieldValue.arrayUnion(myName) });
                    }
                    setJoinId('');
                    setShowJoinGroup(false);
                    setActiveGroup({ id: doc.id, ...doc.data() });
                    setView('detail');
                } catch (e) { alert("เข้าร่วมไม่สำเร็จครับ"); }
            };

            const saveExpense = async () => {
                if (!user || user.isAnonymous || !activeGroup) return;
                const amount = evaluateMath(expAmount);
                if (!expDesc || amount <= 0 || !expPayer) return;

                const data = {
                    description: expDesc, amount, payer: expPayer, participants: expParticipants,
                    date: editingExpense ? editingExpense.date : Date.now()
                };

                const ref = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).collection('expenses');
                if (editingExpense) await ref.doc(editingExpense.id).update(data);
                else await ref.add(data);

                setShowExpenseModal(false);
                setEditingExpense(null);
            };

            const totalSpent = useMemo(() => expenses.reduce((s, e) => s + e.amount, 0), [expenses]);

            const individualShares = useMemo(() => {
                if (!activeGroup?.members) return [];
                const stats = {};
                activeGroup.members.forEach(m => stats[m] = { paid: 0, share: 0, balance: 0 });
                expenses.forEach(e => {
                    if (stats[e.payer]) stats[e.payer].paid += e.amount;
                    const parts = e.participants || [];
                    if (parts.length > 0) {
                        const share = e.amount / parts.length;
                        parts.forEach(p => { if (stats[p]) stats[p].share += share; });
                    }
                });
                return Object.keys(stats).map(name => {
                    const s = stats[name];
                    s.balance = s.paid - s.share;
                    return { name, ...s };
                }).sort((a, b) => b.balance - a.balance);
            }, [activeGroup, expenses]);

            const settlements = useMemo(() => {
                if (!activeGroup || activeGroup.members.length < 2) return [];
                const balances = {};
                activeGroup.members.forEach(m => balances[m] = 0);
                expenses.forEach(e => {
                    const share = e.amount / (e.participants || []).length;
                    balances[e.payer] += e.amount;
                    (e.participants || []).forEach(p => { if (balances.hasOwnProperty(p)) balances[p] -= share; });
                });
                const creditors = [], debtors = [];
                Object.keys(balances).forEach(n => {
                    if (balances[n] > 0.01) creditors.push({ name: n, amt: balances[n] });
                    else if (balances[n] < -0.01) debtors.push({ name: n, amt: Math.abs(balances[n]) });
                });
                const res = []; let i = 0, j = 0;
                while (i < debtors.length && j < creditors.length) {
                    const pay = Math.min(debtors[i].amt, creditors[j].amt);
                    res.push({ from: debtors[i].name, to: creditors[j].name, amount: pay });
                    debtors[i].amt -= pay; creditors[j].amt -= pay;
                    if (debtors[i].amt < 0.01) i++;
                    if (creditors[j].amt < 0.01) j++;
                }
                return res;
            }, [activeGroup, expenses]);

            const copyDashboardLink = () => {
                const url = `${window.location.origin}${window.location.pathname}?dashboard=${activeGroup.id}`;
                navigator.clipboard.writeText(url);
                alert("คัดลอกลิงก์ Dashboard แล้ว! ส่งให้ใครดูก็ได้ทันที 📊✨");
            };

            // Components
            const GroupIcon = ({ id, size = "md", className = "" }) => {
                const { color, emoji } = getGroupStyle(id);
                let s = size === "xl" ? "w-28 h-28 text-6xl rounded-[32px] border-4" : "w-14 h-14 text-2xl rounded-2xl border-2";
                return <div style={{ backgroundColor: color }} className={`${s} flex items-center justify-center border-white shadow-md shrink-0 ${className}`}>{emoji}</div>;
            };

            const Avatar = ({ name, size = "sm" }) => {
                let sz = size === "sm" ? "w-9 h-9 text-lg" : "w-12 h-12 text-2xl";
                return (
                    <div style={{ backgroundColor: getMemberColor(name) }} className={`${sz} shape-flower flex items-center justify-center font-black text-white drop-shadow-sm`}>
                        <span className="mt-1">{name ? name[0].toUpperCase() : ''}</span>
                    </div>
                );
            };

            if (loading) return <div className="h-screen flex items-center justify-center"><div className="loader"></div></div>;

            // บังคับ Login ถ้าไม่ใช่หน้า Dashboard และไม่มี User จริง
            if (!user || (user.isAnonymous && !dashIdFromUrl && view !== 'dashboard')) {
                return (
                    <div className="h-screen flex items-center justify-center p-6 animate-pop">
                        <div className="glass-card p-10 text-center max-w-sm w-full shadow-2xl">
                            <div className="w-24 h-24 bg-white/80 rounded-[28px] flex items-center justify-center mx-auto mb-6 shadow-md border-2 border-white text-5xl">🧸</div>
                            <h1 className="text-3xl font-bold mb-2 text-[#2B3A4A]">Expense Pro</h1>
                            <p className="text-sm text-slate-500 mb-8 font-medium">เข้าสู่ระบบเพื่อจดจำทริปของคุณถาวร ✨</p>
                            <button onClick={handleLogin} className="btn-primary w-full py-4 px-6 flex items-center justify-center gap-3 font-bold shadow-lg">
                                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-6 h-6 bg-white rounded-full p-1" />
                                ล็อกอินด้วย Google
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-20">
                    <header className="p-4 sticky top-0 z-50">
                        <div className="max-w-3xl mx-auto glass-card px-5 py-3 flex items-center justify-between shadow-lg">
                            <div className="flex items-center gap-3">
                                {view !== 'list' && (
                                    <button onClick={() => { setView('list'); window.history.replaceState({}, '', window.location.pathname); }} className="p-2 hover:bg-white/50 rounded-xl"><LucideIcon name="arrow-left" className="w-6 h-6" /></button>
                                )}
                                <h2 className="text-xl font-bold truncate max-w-[150px]">{view === 'list' ? 'ทริปของฉัน' : activeGroup?.name}</h2>
                            </div>
                            <div className="flex items-center gap-3">
                                <p className="text-xs font-bold text-[#2B3A4A] hidden sm:block">{user.displayName?.split(' ')[0]}</p>
                                <div className="relative group cursor-pointer" onClick={handleLogout}>
                                    <img src={user.photoURL || 'https://via.placeholder.com/150'} className="w-10 h-10 rounded-2xl border-2 border-white shadow-md object-cover" />
                                    <div className="absolute -top-1 -right-1 bg-red-400 w-3 h-3 rounded-full border-2 border-white group-hover:scale-125 transition-transform"></div>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-3xl mx-auto px-4 mt-6 animate-pop">
                        {view === 'list' && (
                            <div className="space-y-6">
                                <div className="flex gap-4">
                                    <button onClick={() => setShowAddGroup(true)} className="btn-primary flex-1 py-8 shadow-md flex flex-col items-center justify-center gap-2 font-bold">
                                        <LucideIcon name="plus-circle" className="w-7 h-7" /> สร้างทริปใหม่
                                    </button>
                                    <button onClick={() => setShowJoinGroup(true)} className="btn-secondary flex-1 py-8 shadow-md flex flex-col items-center justify-center gap-2 font-bold">
                                        <LucideIcon name="users" className="w-7 h-7" /> เข้าทริปเพื่อน
                                    </button>
                                </div>

                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    {groups.map(g => (
                                        <div key={g.id} onClick={() => { setActiveGroup(g); setView('detail'); }} className="glass-card p-5 cursor-pointer hover:shadow-xl transition-all bg-white/40 flex items-center gap-4">
                                            <GroupIcon id={g.id} />
                                            <div className="flex-1 min-w-0">
                                                <h3 className="font-bold text-lg truncate">{g.name}</h3>
                                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{(g.members || []).length} สมาชิก</p>
                                            </div>
                                            <LucideIcon name="chevron-right" className="text-slate-300 w-5 h-5" />
                                        </div>
                                    ))}
                                    {groups.length === 0 && <p className="col-span-full py-20 text-center opacity-40 font-bold">เริ่มสร้างทริปแรกของคุณเลย! 🏕️</p>}
                                </div>
                            </div>
                        )}

                        {view === 'detail' && activeGroup && (
                            <div className="space-y-6">
                                <div className="glass-card p-8 text-center relative overflow-hidden">
                                    <div className="absolute top-0 right-0 p-4">
                                        <button onClick={copyDashboardLink} className="p-2 bg-white/50 rounded-xl hover:bg-white transition-all"><LucideIcon name="share-2" className="w-5 h-5 text-slate-500" /></button>
                                    </div>
                                    <div className="text-6xl mb-4">{getGroupStyle(activeGroup.id).emoji}</div>
                                    <h1 className="text-4xl font-black mb-2">{activeGroup.name}</h1>
                                    <div className="bg-white/80 p-6 rounded-3xl border-2 border-white shadow-sm inline-block min-w-[200px] mt-4">
                                        <p className="text-[10px] font-bold text-slate-400 uppercase mb-1">ยอดรวมทั้งหมด</p>
                                        <p className="text-4xl font-black text-[#FF9EAE]">฿{formatMoney(totalSpent)}</p>
                                    </div>
                                </div>

                                {/* รายการบิล */}
                                <div className="space-y-4">
                                    <div className="flex justify-between items-center px-1">
                                        <h3 className="font-bold text-xl">🧾 บิลทั้งหมด</h3>
                                        <button onClick={() => { setEditingExpense(null); setExpDesc(''); setExpAmount(''); setExpPayer(activeGroup.members[0]); setExpParticipants(activeGroup.members); setShowExpenseModal(true); }} className="btn-primary px-5 py-2.5 text-sm font-bold shadow-md">เพิ่มบิล</button>
                                    </div>
                                    <div className="grid gap-3">
                                        {expenses.map(e => (
                                            <div key={e.id} className="glass-card p-4 flex justify-between items-center bg-white/70">
                                                <div className="flex items-center gap-3">
                                                    <Avatar name={e.payer} />
                                                    <div>
                                                        <h4 className="font-bold text-sm leading-tight">{e.description}</h4>
                                                        <p className="text-[10px] text-slate-400">หาร: {e.participants.join(', ')}</p>
                                                    </div>
                                                </div>
                                                <div className="text-right">
                                                    <p className="font-bold text-base text-[#2B3A4A]">฿{formatMoney(e.amount)}</p>
                                                    <button onClick={() => { setEditingExpense(e); setExpDesc(e.description); setExpAmount(e.amount.toString()); setExpPayer(e.payer); setExpParticipants(e.participants); setShowExpenseModal(true); }} className="text-[10px] text-blue-400 font-bold">แก้ไข</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* สรุปการเคลียร์เงิน */}
                                <div className="glass-card p-6 bg-white/50">
                                    <h3 className="font-bold text-lg mb-4 flex items-center gap-2"><span className="text-2xl">💸</span> ใครต้องโอนให้ใคร</h3>
                                    <div className="space-y-3">
                                        {settlements.map((s, idx) => (
                                            <div key={idx} className="flex items-center justify-between p-3 bg-white/90 rounded-2xl border border-white shadow-sm text-sm">
                                                <div className="flex items-center gap-2">
                                                    <Avatar name={s.from} size="sm" />
                                                    <span className="font-bold">{s.from}</span>
                                                    <LucideIcon name="arrow-right" className="w-3 h-3 text-slate-300" />
                                                    <Avatar name={s.to} size="sm" />
                                                    <span className="font-bold">{s.to}</span>
                                                </div>
                                                <p className="font-black text-[#89CFF0]">฿{formatMoney(s.amount)}</p>
                                            </div>
                                        ))}
                                        {settlements.length === 0 && <p className="text-center py-4 text-sm font-bold opacity-30">ไม่มีการโอนค้างชำระ ✨</p>}
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'dashboard' && activeGroup && (
                            <div className="space-y-6">
                                <div className="glass-card p-10 text-center bg-white/80">
                                    <div className="text-7xl mb-4">{getGroupStyle(activeGroup.id).emoji}</div>
                                    <h1 className="text-4xl font-black mb-6">{activeGroup.name}</h1>
                                    <p className="text-slate-400 font-bold uppercase tracking-widest text-sm mb-2">สรุปยอดรวม</p>
                                    <p className="text-6xl font-black text-[#FF9EAE]">฿{formatMoney(totalSpent)}</p>
                                </div>

                                <div className="glass-card p-6">
                                    <h3 className="font-bold text-xl mb-6 border-b pb-4">📊 สรุปแต่ละคน</h3>
                                    <div className="grid gap-4">
                                        {individualShares.map((item, idx) => (
                                            <div key={idx} className="flex items-center justify-between p-4 bg-white/80 rounded-2xl">
                                                <div className="flex items-center gap-3">
                                                    <Avatar name={item.name} size="md" />
                                                    <span className="font-bold">{item.name}</span>
                                                </div>
                                                <div className="text-right">
                                                    <p className={`font-bold ${item.balance >= 0 ? 'text-emerald-500' : 'text-red-400'}`}>
                                                        {item.balance >= 0 ? `ได้คืน ฿${formatMoney(item.balance)}` : `จ่ายเพิ่ม ฿${formatMoney(Math.abs(item.balance))}`}
                                                    </p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Modals */}
                    {showAddGroup && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900/20 backdrop-blur-sm animate-pop">
                            <div className="glass-card p-10 w-full max-w-sm text-center bg-white">
                                <h3 className="text-2xl font-bold mb-6">ทริปใหม่ไปไหนดี? ⛺</h3>
                                <input autoFocus value={newGroupName} onChange={e => setNewGroupName(e.target.value)} placeholder="ชื่อทริป..." className="w-full bg-slate-50 border-none rounded-2xl px-5 py-4 text-center font-bold text-lg mb-6 outline-none ring-pink-100 focus:ring-4" />
                                <div className="flex gap-2">
                                    <button onClick={() => setShowAddGroup(false)} className="flex-1 py-3 text-slate-400 font-bold">ปิด</button>
                                    <button onClick={createGroup} className="btn-primary flex-2 py-3 px-8 font-bold shadow-md">สร้าง</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showJoinGroup && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900/20 backdrop-blur-sm animate-pop">
                            <div className="glass-card p-10 w-full max-w-sm text-center bg-white">
                                <h3 className="text-2xl font-bold mb-6">เข้าทริปเพื่อน ✈️</h3>
                                <input autoFocus value={joinId} onChange={e => setJoinId(e.target.value)} placeholder="กรอกรหัสกลุ่ม..." className="w-full bg-slate-50 border-none rounded-2xl px-5 py-4 text-center font-mono text-sm mb-6 outline-none" />
                                <div className="flex gap-2">
                                    <button onClick={() => setShowJoinGroup(false)} className="flex-1 py-3 text-slate-400 font-bold">ปิด</button>
                                    <button onClick={joinGroup} className="btn-secondary flex-2 py-3 px-8 font-bold shadow-md">เข้ากลุ่ม</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showExpenseModal && (
                        <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center bg-slate-900/40 backdrop-blur-sm animate-pop">
                            <div className="bg-white w-full max-w-lg sm:rounded-[32px] rounded-t-[32px] p-8 max-h-[90vh] overflow-y-auto no-scrollbar border-t-8 border-[#FFB6C1]">
                                <h3 className="text-2xl font-bold mb-8">จดบิลใหม่ 🧾</h3>
                                <div className="space-y-6">
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 uppercase mb-2 block">จ่ายค่าอะไร?</label>
                                        <input value={expDesc} onChange={e => setExpDesc(e.target.value)} placeholder="เช่น ค่าข้าว" className="w-full bg-slate-50 rounded-2xl px-5 py-4 font-bold outline-none" />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 uppercase mb-2 block">จำนวนเงิน (฿)</label>
                                        <input value={expAmount} onChange={e => setExpAmount(e.target.value)} placeholder="0.00" className="w-full bg-slate-50 rounded-2xl px-5 py-4 font-bold text-2xl text-[#89CFF0] outline-none" />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 uppercase mb-2 block">ใครจ่าย?</label>
                                        <div className="flex flex-wrap gap-2">
                                            {activeGroup.members.map(m => (
                                                <button key={m} onClick={() => setExpPayer(m)} className={`px-4 py-2 rounded-xl text-sm font-bold border-2 transition-all ${expPayer === m ? 'border-[#FFB6C1] bg-[#FFF0F5]' : 'border-slate-100 bg-slate-50'}`}>{m}</button>
                                            ))}
                                        </div>
                                    </div>
                                    <button onClick={saveExpense} className="w-full btn-primary py-4 text-lg font-bold shadow-xl mt-4">บันทึกบิล ✨</button>
                                    <button onClick={() => setShowExpenseModal(false)} className="w-full text-slate-300 font-bold text-sm py-2">ยกเลิก</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOMClient.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
