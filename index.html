<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Pro - หารทริปกับเพื่อน</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✈️</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- External Libraries for Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Mitr:wght@400;500;600&family=Sarabun:wght@300;400;500;600&display=swap');

        :root {
            --font-display: 'Mitr', sans-serif;
            --font-body: 'Sarabun', sans-serif;
            --clr-ink: #2B3A4A;
            --radius-card: 28px;
        }

        body {
            font-family: var(--font-body);
            color: var(--clr-ink);
            margin: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            background: linear-gradient(135deg, #FFE4E1 0%, #FFF0F5 30%, #E6E6FA 60%, #E0F7FA 100%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        h1, h2, h3, h4 { font-family: var(--font-display); }

        .glass-card {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: var(--radius-card);
            box-shadow: 0 12px 40px -8px rgba(255, 182, 193, 0.25);
        }

        .btn-primary {
            background: linear-gradient(135deg, #FFB6C1, #FFC0CB);
            color: #2B3A4A;
            border-bottom: 5px solid #FF9EAE;
            border-radius: 24px;
            transition: all 0.1s;
        }
        .btn-primary:active { transform: translateY(3px); border-bottom-width: 2px; }

        .btn-secondary {
            background: linear-gradient(135deg, #B0E0E6, #ADD8E6);
            color: #2B3A4A;
            border-bottom: 5px solid #90C8D6;
            border-radius: 24px;
            transition: all 0.1s;
        }
        .btn-secondary:active { transform: translateY(3px); border-bottom-width: 2px; }

        .shape-flower {
            -webkit-mask-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M50 0 A 15 15 0 0 1 65 15 A 15 15 0 0 1 85 15 A 15 15 0 0 1 85 35 A 15 15 0 0 1 100 50 A 15 15 0 0 1 85 65 A 15 15 0 0 1 85 85 A 15 15 0 0 1 65 85 A 15 15 0 0 1 50 100 A 15 15 0 0 1 35 85 A 15 15 0 0 1 15 85 A 15 15 0 0 1 15 65 A 15 15 0 0 1 0 50 A 15 15 0 0 1 15 35 A 15 15 0 0 1 15 15 A 15 15 0 0 1 35 15 A 15 15 0 0 1 50 0 Z'/%3E%3C/svg%3E");
            -webkit-mask-size: 100% 100%;
            mask-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M50 0 A 15 15 0 0 1 65 15 A 15 15 0 0 1 85 15 A 15 15 0 0 1 85 35 A 15 15 0 0 1 100 50 A 15 15 0 0 1 85 65 A 15 15 0 0 1 85 85 A 15 15 0 0 1 65 85 A 15 15 0 0 1 50 100 A 15 15 0 0 1 35 85 A 15 15 0 0 1 15 85 A 15 15 0 0 1 15 65 A 15 15 0 0 1 0 50 A 15 15 0 0 1 15 35 A 15 15 0 0 1 15 15 A 15 15 0 0 1 35 15 A 15 15 0 0 1 50 0 Z'/%3E%3C/svg%3E");
            mask-size: 100% 100%;
        }

        .animate-pop { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }
        @keyframes popIn { from { opacity: 0; transform: scale(0.92) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .loader {
            width: 32px; height: 32px;
            border: 4px solid rgba(255, 255, 255, 0.5); border-top-color: #FFB6C1;
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ปรับ Layout การ Export ให้กว้าง 1200px และความสูงอิสระ (ไม่ล้น) */
        #export-area { 
            position: absolute; 
            left: -9999px; 
            top: 0; 
            width: 1200px;
            height: auto; 
            z-index: -9999;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const ReactDOMClient = window.ReactDOM;

        // Firebase Configuration
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : {
                apiKey: "AIzaSyCwnWHqG__ty3OvDok2o6orgreXOu5LSXk",
                authDomain: "expense-manager-14564.firebaseapp.com",
                projectId: "expense-manager-14564",
                storageBucket: "expense-manager-14564.firebasestorage.app",
                messagingSenderId: "259280883710",
                appId: "1:259280883710:web:67d7ce7b1f8e5e196a7aaf"
            };

        // สำคัญ: บังคับใช้ ID เดียวกันเสมอ เพื่อให้เปิดบน Github Pages แล้วข้อมูลไม่หาย!
        const appId = (typeof __app_id !== 'undefined' && __app_id) ? __app_id : 'default-trip-app';

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const handlePermissionError = (e, contextMessage) => {
            console.error(`${contextMessage} Error:`, e);
            if (e.message && (e.message.includes('permission') || e.message.includes('insufficient'))) {
                alert(`⚠️ ${contextMessage} (Permission Denied)\nกรุณาตรวจสอบกฎของ Firestore ใน Firebase Console\nหรือโปรดลองรีเฟรชหน้าจอใหม่อีกครั้งเพื่อเข้าสู่ระบบอัตโนมัติ`);
            } else {
                alert(`${contextMessage}: ${e.message}`);
            }
        };

        const LucideIcon = ({ name, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}" class="${className}"></i>`;
                    window.lucide.createIcons({ root: iconRef.current });
                }
            }, [name, className]);
            return <span ref={iconRef} style={{ display: 'contents' }} />;
        };

        function App() {
            const TRAVEL_EMOJIS = ['✈️', '🏝️', '🏕️', '🏔️', '🏰', '🗽', '🌸', '🌈', '🎨', '🎈', '🎠', '🏖️', '🗼', '⛩️', '🚤', '🍩', '📸', '🧸'];
            const PASTEL_COLORS = ['#FFD1DC', '#F8E2E9', '#FADADD', '#E6E6FA', '#E0F7FA', '#D0E8F2', '#B0E0E6', '#FFB6C1', '#FFDAC1', '#FFB7B2', '#FF9AA2', '#E2F0CB', '#B5EAD7', '#C7CEEA', '#F1CBFF', '#D4F0F0', '#FDFD96', '#FFDFD3', '#FEC8D8', '#D291BC'];
            const VIBRANT_COLORS = ['#FF595E', '#FFCA3A', '#8AC926', '#1982C4', '#6A4C93', '#F15BB5', '#00BBF9', '#00F5D4', '#F28F3B', '#C8E9A0', '#FF9AA2', '#B5EAD7', '#C7CEEA', '#E2F0CB', '#FFB7B2', '#E6A8D7', '#97C1A9', '#8FCACA', '#F6A6FF', '#B28DFF'];

            // ป้องกันหน้าจอกระพริบ (Flicker) ระหว่างโหลด Dashboard Link
            const urlParams = new URLSearchParams(window.location.search);
            const dashIdFromUrl = urlParams.get('dashboard');

            const [user, setUser] = useState(null);
            const [view, setView] = useState(dashIdFromUrl ? 'dashboard' : 'list'); 
            const [groups, setGroups] = useState([]);
            const [activeGroup, setActiveGroup] = useState(null);
            const [expenses, setExpenses] = useState([]);
            const [loading, setLoading] = useState(true);
            const [exporting, setExporting] = useState(false);

            const [showAddGroup, setShowAddGroup] = useState(false);
            const [showJoinGroup, setShowJoinGroup] = useState(false);
            const [showExpenseModal, setShowExpenseModal] = useState(false);
            const [showEditGroup, setShowEditGroup] = useState(false);
            
            const [editingExpense, setEditingExpense] = useState(null);
            const [newGroupName, setNewGroupName] = useState('');
            const [editGroupName, setEditGroupName] = useState('');
            const [joinId, setJoinId] = useState('');
            const [newMemberName, setNewMemberName] = useState('');
            const [expDesc, setExpDesc] = useState('');
            const [expAmount, setExpAmount] = useState('');
            const [expPayer, setExpPayer] = useState('');
            const [expParticipants, setExpParticipants] = useState([]);
            
            // State ใหม่สำหรับจับ Error หน้า Dashboard จะได้ไม่จอขาว
            const [dashError, setDashError] = useState('');

            // 1. Auth Init
            useEffect(() => {
                let isMounted = true;
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            try {
                                await auth.signInWithCustomToken(__initial_auth_token);
                            } catch (e) {
                                console.warn("Custom token mismatch, falling back to anonymous auth:", e);
                                await auth.signInAnonymously();
                            }
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (err) {
                        console.error("Auth Error:", err);
                    }
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    if (isMounted) {
                        setUser(u);
                        setLoading(false);
                    }
                });
                return () => { isMounted = false; unsubscribe(); };
            }, []);

            // 2. Load Dashboard (ถ้ามี Link) - ต้องรอให้ Auth เสร็จก่อน
            useEffect(() => {
                if (!user) return;
                const params = new URLSearchParams(window.location.search);
                const dashId = params.get('dashboard');
                
                let unsubscribe = () => {};
                if (dashId) {
                    const groupRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(dashId);
                    unsubscribe = groupRef.onSnapshot(doc => {
                        if (doc.exists) {
                            setActiveGroup({ id: doc.id, ...doc.data() });
                            setView('dashboard');
                            setDashError('');
                        } else {
                            setDashError("ลิงก์แดชบอร์ดไม่ถูกต้อง หรือกลุ่มนี้ถูกลบไปแล้วครับ");
                        }
                    }, (err) => {
                        console.error("Dashboard Fetch Error:", err);
                        if (err.message && err.message.includes('permission')) {
                            setDashError("เซิร์ฟเวอร์ปฏิเสธการเข้าถึงข้อมูล (Permission Denied) 🔒 โปรดล็อกอินเพื่อดูข้อมูล หรือตรวจสอบกฎ Firestore Rules");
                        } else {
                            setDashError("เกิดข้อผิดพลาดในการโหลดข้อมูลทริป ❌");
                        }
                    });
                }
                return () => unsubscribe();
            }, [user]);

            // 3. ระบบ Auto-Join เมื่อเข้าผ่านลิงก์ ?join=xxx - ต้องรอให้ Auth เสร็จก่อน
            useEffect(() => {
                const processInviteLink = async () => {
                    if (!user || user.isAnonymous) return;
                    
                    const params = new URLSearchParams(window.location.search);
                    const inviteId = params.get('join');
                    
                    if (inviteId) {
                        try {
                            const myName = user.displayName?.split(' ')[0] || 'ฉัน';
                            const groupRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(inviteId);
                            const doc = await groupRef.get();
                            
                            if (doc.exists) {
                                const data = doc.data();
                                if (!(data.members || []).includes(myName)) {
                                    await groupRef.update({ members: firebase.firestore.FieldValue.arrayUnion(myName) });
                                    alert(`เข้าร่วมกลุ่ม "${data.name}" ผ่านลิงก์เชิญสำเร็จ! 🎉`);
                                }
                                
                                const updatedGroup = { id: doc.id, ...data, members: [...new Set([...(data.members||[]), myName])] };
                                setActiveGroup(updatedGroup);
                                setView('detail');
                            } else {
                                alert("ลิงก์เชิญไม่ถูกต้อง หรือกลุ่มนี้ถูกลบไปแล้ว");
                            }
                        } catch (e) {
                            console.error("Auto-join error:", e);
                            handlePermissionError(e, "เข้าร่วมกลุ่มอัตโนมัติไม่สำเร็จ");
                        } finally {
                            window.history.replaceState({}, document.title, window.location.pathname);
                        }
                    }
                };
                processInviteLink();
            }, [user]);

            // 4. โหลดรายชื่อกลุ่ม (List) - ต้องรอให้ Auth เสร็จก่อน
            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                if (!user || user.isAnonymous || params.get('dashboard')) return;
                
                const myName = user.displayName?.split(' ')[0] || 'ฉัน';
                const groupsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups');
                
                const unsubscribe = groupsRef.onSnapshot((snap) => {
                    const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    const myGroups = data
                        .filter(g => g.ownerId === user.uid || (g.members && g.members.includes(myName)))
                        .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
                    
                    setGroups(myGroups);
                    
                    if (activeGroup && view === 'detail') {
                        const updated = myGroups.find(g => g.id === activeGroup.id);
                        if (updated) setActiveGroup(updated);
                    }
                }, (err) => {
                    console.error("Firestore Groups Error:", err);
                    // Only show alert if it's not a known missing permission error on first load
                    if (!err.message.includes('permission')) {
                         handlePermissionError(err, "ดึงรายชื่อกลุ่มไม่สำเร็จ");
                    }
                });
                
                return () => unsubscribe();
            }, [user, activeGroup?.id, view]);

            // 5. โหลดค่าใช้จ่าย (Expenses) - ต้องรอให้ Auth เสร็จก่อน
            useEffect(() => {
                if (!user || !activeGroup) return;
                const expRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).collection('expenses');
                
                const unsubscribe = expRef.onSnapshot((snap) => {
                    const list = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setExpenses(list.sort((a, b) => b.date - a.date));
                }, (err) => {
                    console.error("Firestore Expenses Error:", err);
                    if (!err.message.includes('permission')) {
                         handlePermissionError(err, "ดึงรายการค่าใช้จ่ายไม่สำเร็จ");
                    }
                });

                return () => unsubscribe();
            }, [user, activeGroup?.id]);

            const getGroupStyle = (id = "default") => {
                let hash = 0;
                for (let i = 0; i < id.length; i++) hash = id.charCodeAt(i) + ((hash << 5) - hash);
                return { 
                    color: PASTEL_COLORS[Math.abs(hash) % PASTEL_COLORS.length], 
                    emoji: TRAVEL_EMOJIS[Math.abs(hash) % TRAVEL_EMOJIS.length] 
                };
            };

            const getMemberColor = (name) => {
                let hash = 0;
                for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
                return VIBRANT_COLORS[Math.abs(hash) % VIBRANT_COLORS.length];
            };

            const formatMoney = (v) => Number(v || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            
            const formatDate = (timestamp) => {
                if (!timestamp) return '';
                return new Date(timestamp).toLocaleString('th-TH', {
                    day: 'numeric', month: 'short', year: '2-digit', hour: '2-digit', minute: '2-digit'
                });
            };

            const evaluateMath = (str) => {
                try {
                    const sanitized = str.toString().replace(/[^-+*/().0-9]/g, '');
                    if (!sanitized) return 0;
                    return new Function(`return ${sanitized}`)() || 0;
                } catch (e) { return 0; }
            };

            const shareLink = () => {
                if (!activeGroup) return;
                const baseUrl = window.location.href.split('?')[0];
                const url = `${baseUrl}?join=${activeGroup.id}`;
                
                const el = document.createElement('textarea');
                el.value = url;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);

                if (baseUrl.startsWith('blob:')) {
                    alert("⚠️ คุณกำลังใช้โหมด Preview\nต้องนำไฟล์ HTML นี้ไปฝากไว้บนเว็บจริง (เช่น Netlify หรือ Github Pages) ก่อน ลิงก์ถึงจะส่งให้เพื่อนใช้งานได้จริงครับ");
                } else {
                    alert("คัดลอกลิงก์เชิญเพื่อนแล้ว! ส่งให้เพื่อนกดเข้าร่วมทริปได้เลยทันที 🔗✨");
                }
            };

            const copyDashboardLink = () => {
                if (!activeGroup) return;
                const baseUrl = window.location.href.split('?')[0];
                const url = `${baseUrl}?dashboard=${activeGroup.id}`;
                
                const el = document.createElement('textarea');
                el.value = url;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);

                if (baseUrl.startsWith('blob:')) {
                    alert("⚠️ คุณกำลังใช้โหมด Preview\nลิงก์แชร์ Dashboard นี้จะยังเปิดไม่ได้จนกว่าคุณจะอัปโหลดเว็บนี้ขึ้นโฮสติ้งจริง (เช่น Github Pages) ครับ");
                } else {
                    alert("คัดลอกลิงก์ Dashboard แล้ว! ส่งให้ใครดูก็ได้โดยไม่ต้องล็อกอินครับ 📊✨");
                }
            };

            const handleLogin = async () => {
                try {
                    const provider = new firebase.auth.GoogleAuthProvider();
                    await auth.signInWithPopup(provider);
                } catch (e) {
                    console.error("Login Failed:", e);
                }
            };

            const createGroup = async () => {
                if (!newGroupName.trim() || !user || user.isAnonymous) return;
                const myName = user.displayName?.split(' ')[0] || 'ฉัน';
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').add({
                        name: newGroupName.trim(),
                        ownerId: user.uid,
                        ownerName: myName,
                        members: [myName],
                        createdAt: Date.now()
                    });
                    setNewGroupName('');
                    setShowAddGroup(false);
                } catch (e) { handlePermissionError(e, "สร้างกลุ่มไม่สำเร็จ"); }
            };

            const updateGroupName = async () => {
                if (!editGroupName.trim() || !activeGroup || !user || user.isAnonymous) return;
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).update({
                        name: editGroupName.trim()
                    });
                    setShowEditGroup(false);
                } catch (e) { handlePermissionError(e, "เปลี่ยนชื่อกลุ่มไม่สำเร็จ"); }
            };

            const joinGroup = async () => {
                if (!joinId.trim() || !user || user.isAnonymous) return;
                try {
                    const myName = user.displayName?.split(' ')[0] || 'ฉัน';
                    const groupRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(joinId.trim());
                    const doc = await groupRef.get();
                    if (!doc.exists) { alert("ไม่พบกลุ่มนี้ กรุณาตรวจสอบ ID อีกครั้ง"); return; }
                    
                    const data = doc.data();
                    if (!(data.members || []).includes(myName)) {
                        await groupRef.update({ members: firebase.firestore.FieldValue.arrayUnion(myName) });
                        alert(`เข้าร่วมกลุ่ม "${data.name}" สำเร็จ! 🎉`);
                    } else {
                        alert("คุณอยู่ในกลุ่มนี้อยู่แล้วครับ");
                    }
                    setJoinId('');
                    setShowJoinGroup(false);
                } catch (e) { handlePermissionError(e, "เข้าร่วมไม่สำเร็จ"); }
            };

            const deleteGroup = async (id, e) => {
                e.stopPropagation();
                if (!user || user.isAnonymous) return;
                if (confirm("ต้องการลบกลุ่มและข้อมูลทั้งหมดถาวรหรือไม่?")) {
                    try {
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(id).delete();
                    } catch (e) { handlePermissionError(e, "ลบกลุ่มไม่สำเร็จ"); }
                }
            };

            const addMember = async () => {
                if (!user || user.isAnonymous || !activeGroup) return;
                if (!newMemberName.trim() || activeGroup.members.includes(newMemberName.trim())) return;
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).update({
                        members: firebase.firestore.FieldValue.arrayUnion(newMemberName.trim())
                    });
                    setNewMemberName('');
                } catch (e) { handlePermissionError(e, "เพิ่มสมาชิกไม่สำเร็จ"); }
            };

                expenses.forEach(e => {
                    if (stats[e.payer]) stats[e.payer].paid += e.amount;
                    
                    const parts = e.participants || [];
                    if (parts.length > 0) {
                        const sharePerPerson = e.amount / parts.length;
                        parts.forEach(p => {
                            if (stats[p]) stats[p].share += sharePerPerson;
                        });
                    }
                });
                
                return Object.keys(stats).map(name => {
                    const s = stats[name];
                    s.balance = s.paid - s.share;
                    return { name, ...s };
                }).sort((a, b) => b.balance - a.balance);

                });

                Object.keys(balances).forEach(n => {

                    const pay = Math.min(debtors[i].amt, creditors[j].amt);

                                                <div className="flex flex-col">
                                                    <span className="text-[16px] text-slate-400 font-bold uppercase mb-[5px]">ออกไปแล้ว</span>
                                                    <span className="text-[32px] font-black text-[#89CFF0] leading-none">฿{formatMoney(item.paid)}</span>
                                                </div>
                                                <div className="flex flex-col text-right">
                                                    <span className="text-[16px] text-slate-400 font-bold uppercase mb-[5px]">ยอดรับผิดชอบ</span>
                                                    <span className="text-[32px] font-black text-[#FF9EAE] leading-none">฿{formatMoney(item.share)}</span>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Settlements */}
                            <div className="bg-white/60 backdrop-blur-lg rounded-[40px] p-[40px] border-[6px] border-white shadow-xl flex flex-col">
                                <h3 className="text-[36px] font-bold border-l-[10px] border-[#89CFF0] pl-[24px] mb-[30px] text-[#2B3A4A] leading-none">สรุปการเคลียร์เงิน (ใครโอนให้ใคร)</h3>
                                <div className="flex flex-col gap-[20px]">
                                    {settlements.map((s, idx) => (
                                        <div key={idx} className="flex items-center justify-between bg-white/90 p-[30px] rounded-[24px] border-4 border-white shadow-md">
                                            <div className="flex items-center gap-[24px] flex-1">
                                                <div className="flex items-center gap-[20px] w-[220px]">
                                                    <Avatar name={s.from} size="lg" />
                                                    <span className="font-bold text-[32px] text-[#2B3A4A] leading-none">{s.from}</span>
                                                </div>
                                                <div className="bg-[#E0F7FA] text-[#55ABC8] px-[24px] py-[12px] rounded-full text-[20px] font-bold shadow-inner flex items-center justify-center border-2 border-white">จ่ายให้ ➔</div>
                                                <div className="flex items-center gap-[20px] w-[220px] justify-end">
                                                    <span className="font-bold text-[32px] text-[#2B3A4A] leading-none">{s.to}</span>
                                                    <Avatar name={s.to} size="lg" />
                                                </div>
                                            </div>
                                            <div className="pl-[40px] border-l-4 border-slate-200 ml-[30px] text-right flex flex-col justify-center min-w-[200px]">
                                                <span className="text-[18px] text-slate-400 font-bold uppercase tracking-wider mb-[5px]">ยอดโอน</span>
                                                <span className="text-[44px] font-black text-[#89CFF0] leading-none">฿{formatMoney(s.amount)}</span>
                                            </div>
                                        </div>
                                    ))}
                                    {settlements.length === 0 && <div className="py-[60px] text-center opacity-40 font-bold text-[36px]">ไม่มีการโอนค้างชำระ ✨</div>}
                                </div>
                            </div>
                        </div>

                        {/* Footer */}
                        <div className="mt-[60px] text-center">
                            <p className="text-[24px] text-slate-400 font-black uppercase tracking-[16px]">Generated by Expense Pro 🧸</p>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOMClient.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
