<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Pro - หารค่าใช้จ่ายกับเพื่อน</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧸</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
    <script src="https://unpkg.com/lucide@latest" crossorigin></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        /* ── Typography ── */
        @import url('https://fonts.googleapis.com/css2?family=Mitr:wght@400;500;600&family=Sarabun:wght@300;400;500;600&display=swap');

        :root {
            --font-display: 'Mitr', sans-serif;
            --font-body: 'Sarabun', sans-serif;
            --clr-bg: #F8F7F5;
            --clr-surface: rgba(255,255,255,0.82);
            --clr-border: rgba(255,255,255,0.95);
            --clr-pink: #EEBBC3;
            --clr-pink-dark: #d8a5ae;
            --clr-blue: #B8C1EC;
            --clr-blue-dark: #9faad8;
            --clr-ink: #232946;
            --clr-muted: #8A919E;
            --radius-card: 20px;
            --radius-btn: 14px;
            --shadow-card: 0 4px 20px -4px rgba(184,193,236,0.25);
        }

        * { box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background-color: var(--clr-bg);
            margin: 0; padding: 0;
            color: var(--clr-ink);
            font-size: 15px;
            line-height: 1.6;
        }

        h1, h2, h3, h4, .display {
            font-family: var(--font-display);
            line-height: 1.3;
        }

        /* ── Pastel gradient (login bg) ── */
        .pastel-gradient {
            background: linear-gradient(135deg, #FFADAD 0%, #FFD6A5 25%, #CAFFBF 55%, #9BF6FF 80%, #A0C4FF 100%);
        }

        /* ── Glass card ── */
        .glass-card {
            background: var(--clr-surface);
            backdrop-filter: blur(12px);
            border: 1.5px solid var(--clr-border);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-card);
        }

        /* ── Buttons ── */
        .btn-primary {
            background: var(--clr-pink);
            color: var(--clr-ink);
            border-radius: var(--radius-btn);
            font-family: var(--font-display);
            font-weight: 500;
            border: none;
            border-bottom: 3px solid var(--clr-pink-dark);
            cursor: pointer;
            transition: box-shadow .15s, transform .1s;
        }
        .btn-primary:hover { box-shadow: 0 4px 16px rgba(238,187,195,.4); }
        .btn-primary:active { transform: scale(0.97); }

        .btn-secondary {
            background: var(--clr-blue);
            color: var(--clr-ink);
            border-radius: var(--radius-btn);
            font-family: var(--font-display);
            font-weight: 500;
            border: none;
            border-bottom: 3px solid var(--clr-blue-dark);
            cursor: pointer;
            transition: box-shadow .15s, transform .1s;
        }
        .btn-secondary:hover { box-shadow: 0 4px 16px rgba(184,193,236,.4); }
        .btn-secondary:active { transform: scale(0.97); }

        /* ── Animations ── */
        .animate-pop { animation: popIn .35s cubic-bezier(.26,.53,.74,1.48) both; }
        @keyframes popIn { from { opacity:0; transform:scale(.93); } to { opacity:1; transform:scale(1); } }

        /* ── Scroll ── */
        .no-scrollbar::-webkit-scrollbar { display:none; }

        /* ── Export area (hidden) ── */
        #export-area { position:absolute; left:-9999px; top:0; width:360px; z-index:-100; }

        /* ── Loader ── */
        .loader-spin {
            width: 22px; height: 22px;
            border: 3px solid #eee;
            border-top-color: var(--clr-blue);
            border-radius: 50%;
            animation: spin .8s linear infinite;
        }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* ── Input ── */
        .input-base {
            background: #FDFBF9;
            border: 1.5px solid #E8E5F0;
            border-radius: 12px;
            padding: 10px 14px;
            font-family: var(--font-body);
            font-size: 15px;
            outline: none;
            transition: border-color .15s, box-shadow .15s;
            color: var(--clr-ink);
            width: 100%;
        }
        .input-base:focus {
            border-color: var(--clr-blue);
            box-shadow: 0 0 0 3px rgba(184,193,236,.2);
        }
        .input-base::placeholder { color: #BEC1CE; }

        /* ── Member chip ── */
        .member-chip {
            display: inline-flex; align-items: center; gap: 6px;
            background: white; border: 1.5px solid white;
            border-radius: 9999px; padding: 4px 10px 4px 5px;
            font-size: 13px; font-weight: 600; box-shadow: 0 1px 4px rgba(0,0,0,.06);
        }

        /* ── Settlement card ── */
        .settlement-card {
            background: white;
            border: 1.5px solid #F0EEF8;
            border-radius: 16px;
            padding: 14px 18px;
            display: flex; align-items: center; justify-content: space-between;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const apiKey = "AIzaSyANUCE14o9FcJfE7CUS_B69mgyoT6Z6NSg";
        const firebaseConfig = {
            apiKey: "AIzaSyCwnWHqG__ty3OvDok2o6orgreXOu5LSXk",
            authDomain: "expense-manager-14564.firebaseapp.com",
            projectId: "expense-manager-14564",
            storageBucket: "expense-manager-14564.firebasestorage.app",
            messagingSenderId: "259280883710",
            appId: "1:259280883710:web:67d7ce7b1f8e5e196a7aaf",
            measurementId: "G-68BWRR5K8N"
        };
        const appId = "expense-manager-pro-v1";

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const memberColors = [
            '#FFADAD','#FFD6A5','#FDFFB6','#CAFFBF',
            '#9BF6FF','#A0C4FF','#BDB2FF','#FFC6FF',
            '#A4E4E0','#FFCCF9','#D4D9F5','#F2CC8F'
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('list');
            const [groups, setGroups] = useState([]);
            const [activeGroup, setActiveGroup] = useState(null);
            const [expenses, setExpenses] = useState([]);
            const [loading, setLoading] = useState(true);
            const [exporting, setExporting] = useState(false);
            const [appLogo, setAppLogo] = useState(null);

            const [showAddGroup, setShowAddGroup] = useState(false);
            const [showEditGroup, setShowEditGroup] = useState(false);
            const [showExpenseModal, setShowExpenseModal] = useState(false);
            const [editingExpense, setEditingExpense] = useState(null);

            const [newGroupName, setNewGroupName] = useState('');
            const [editGroupName, setEditGroupName] = useState('');
            const [newMemberName, setNewMemberName] = useState('');
            const [expDesc, setExpDesc] = useState('');
            const [expAmount, setExpAmount] = useState('');
            const [expPayer, setExpPayer] = useState('');
            const [expParticipants, setExpParticipants] = useState([]);
            const [isGenerating, setIsGenerating] = useState(false);
            const [isGeneratingGroupImage, setIsGeneratingGroupImage] = useState(false);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    if (!u) setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                const loadLogo = async () => {
                    if (!apiKey) return;
                    try {
                        const logo = await generateAIImage("A very cute 3D pastel pink bear holding a wallet and coins, smiling, clay style, soft lighting, white background");
                        setAppLogo(logo);
                    } catch (e) { console.error(e); }
                };
                loadLogo();
            }, []);

            useEffect(() => {
                if (!user) return;
                const groupsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups');
                return groupsRef.where("ownerId","==",user.uid).onSnapshot((snap) => {
                    const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setGroups(data);
                    if (activeGroup) {
                        const updated = data.find(g => g.id === activeGroup.id);
                        if (updated) setActiveGroup(updated);
                    }
                    setLoading(false);
                });
            }, [user, activeGroup?.id]);

            useEffect(() => {
                if (!user || !activeGroup) return;
                const expRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).collection('expenses');
                return expRef.orderBy("date","desc").onSnapshot((snap) => {
                    setExpenses(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
            }, [user, activeGroup?.id]);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

            const generateAIImage = async (promptText) => {
                const prompt = `A single, high-quality 3D pastel clay icon representing: ${promptText}. cute aesthetic, soft studio lighting, clean white background, high detail, professional art style, isometric view`;
                let delay = 1000;
                for (let i = 0; i < 5; i++) {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ instances: { prompt }, parameters: { sampleCount: 1 } })
                        });
                        if (!response.ok) { const t = await response.text(); throw new Error(`HTTP ${response.status}: ${t}`); }
                        const result = await response.json();
                        if (result.predictions?.[0]) return `data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`;
                        throw new Error("ไม่ได้รับข้อมูลรูปภาพ");
                    } catch (err) {
                        if (i === 4) throw err;
                        await new Promise(r => setTimeout(r, delay));
                        delay *= 2;
                    }
                }
            };

            const getMemberColor = (name) => {
                let hash = 0;
                for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
                return memberColors[Math.abs(hash) % memberColors.length];
            };

            const evaluateMath = (str) => {
                try {
                    const sanitized = str.toString().replace(/[^-+*/().0-9]/g,'');
                    if (!sanitized) return 0;
                    const res = new Function(`return ${sanitized}`)();
                    return isNaN(res) ? 0 : res;
                } catch (e) { return 0; }
            };

            const formatMoney = (val) => Number(val||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});

            const formatDate = (ts) => new Intl.DateTimeFormat('th-TH',{
                year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'
            }).format(new Date(ts));

            const handleLogin = async () => {
                const provider = new firebase.auth.GoogleAuthProvider();
                await auth.signInWithPopup(provider);
            };

            const handleLogout = () => {
                if(confirm("ต้องการออกจากระบบหรือไม่?")) auth.signOut();
            };

            const createGroup = async () => {
                if (!newGroupName.trim()) return;
                setIsGenerating(true);
                let aiImageUrl = null;
                try { if (apiKey) aiImageUrl = await generateAIImage(newGroupName.trim()); }
                catch (e) { console.error(e.message); }
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').add({
                        name: newGroupName.trim(),
                        ownerId: user.uid,
                        members: [user.displayName.split(' ')[0] || 'ฉัน'],
                        imageUrl: aiImageUrl,
                        createdAt: Date.now()
                    });
                    setNewGroupName('');
                    setShowAddGroup(false);
                } catch (err) {
                    alert("สร้างกลุ่มไม่สำเร็จ: " + err.message);
                } finally { setIsGenerating(false); }
            };

            const regenerateGroupImage = async () => {
                if (!activeGroup || !apiKey) { alert("กรุณาตรวจสอบ API Key"); return; }
                setIsGeneratingGroupImage(true);
                try {
                    const aiImageUrl = await generateAIImage(activeGroup.name);
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).update({ imageUrl: aiImageUrl });
                } catch (e) { alert("สร้างรูปภาพไม่สำเร็จ: " + e.message); }
                finally { setIsGeneratingGroupImage(false); }
            };

            const updateGroupName = async () => {
                if (!editGroupName.trim() || !activeGroup) return;
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).update({ name: editGroupName.trim() });
                setShowEditGroup(false);
            };

            const deleteGroup = async (id) => {
                if (!confirm("ลบกลุ่มนี้แล้วข้อมูลจะหายถาวร ยืนยันหรือไม่?")) return;
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(id).delete();
                if (activeGroup?.id === id) setView('list');
            };

            const addMember = async () => {
                if (!newMemberName.trim() || activeGroup.members.includes(newMemberName.trim())) return;
                const updatedMembers = [...activeGroup.members, newMemberName.trim()];
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).update({ members: updatedMembers });
                setNewMemberName('');
            };

            const removeMember = async (name) => {
                if (!confirm(`ลบ ${name} ออกจากกลุ่มหรือไม่?`)) return;
                const updatedMembers = activeGroup.members.filter(m => m !== name);
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).update({ members: updatedMembers });
            };

            const saveExpense = async () => {
                const amount = evaluateMath(expAmount);
                if (!expDesc || amount <= 0 || !expPayer || expParticipants.length === 0) return;
                const expData = {
                    description: expDesc, amount, payer: expPayer, participants: expParticipants,
                    date: editingExpense ? editingExpense.date : Date.now()
                };
                const ref = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).collection('expenses');
                if (editingExpense) await ref.doc(editingExpense.id).update(expData);
                else await ref.add(expData);
                setShowExpenseModal(false);
                setEditingExpense(null);
                setExpDesc(''); setExpAmount('');
            };

            const deleteExpense = async (id) => {
                if (!confirm("ลบรายการนี้หรือไม่?")) return;
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).collection('expenses').doc(id).delete();
            };

            const totalSpent = useMemo(() => expenses.reduce((s,e) => s + e.amount, 0), [expenses]);

            const settlements = useMemo(() => {
                if (!activeGroup || activeGroup.members.length < 2) return [];
                const balances = {};
                activeGroup.members.forEach(m => balances[m] = 0);
                expenses.forEach(e => {
                    const share = e.amount / e.participants.length;
                    balances[e.payer] += e.amount;
                    e.participants.forEach(p => { if (balances.hasOwnProperty(p)) balances[p] -= share; });
                });
                const creditors = [], debtors = [];
                Object.keys(balances).forEach(n => {
                    if (balances[n] > 0.01) creditors.push({name:n, amt:balances[n]});
                    else if (balances[n] < -0.01) debtors.push({name:n, amt:Math.abs(balances[n])});
                });
                const res = []; let i = 0, j = 0;
                while (i < debtors.length && j < creditors.length) {
                    const pay = Math.min(debtors[i].amt, creditors[j].amt);
                    res.push({ from: debtors[i].name, to: creditors[j].name, amount: pay });
                    debtors[i].amt -= pay; creditors[j].amt -= pay;
                    if (debtors[i].amt < 0.01) i++; if (creditors[j].amt < 0.01) j++;
                }
                return res;
            }, [activeGroup, expenses]);

            const exportImage = async () => {
                setExporting(true);
                const element = document.getElementById('export-area');
                element.style.position = "static"; element.style.left = "0";
                const canvas = await html2canvas(element, { scale:2, backgroundColor:'#F8F7F5' });
                element.style.position = "absolute"; element.style.left = "-9999px";
                const link = document.createElement('a');
                link.download = `สรุปบิล_${activeGroup.name}.png`;
                link.href = canvas.toDataURL(); link.click();
                setExporting(false);
            };

            const exportExcel = () => {
                const data = [
                    ["กลุ่ม:", activeGroup.name],["ยอดรวม:", totalSpent],[],
                    ["รายการ","จำนวนเงิน","ผู้จ่าย","ผู้ร่วมหาร"],
                    ...expenses.map(e => [e.description, e.amount, e.payer, e.participants.join(', ')]),
                    [],["ผู้โอน","ผู้รับโอน","ยอดโอน"]
                ];
                settlements.forEach(s => data.push([s.from, s.to, s.amount]));
                const ws = XLSX.utils.aoa_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "สรุปบิล");
                XLSX.writeFile(wb, `${activeGroup.name}_Expenses.xlsx`);
            };

            /* ── Avatar component ── */
            const Avatar = ({ name, size="md" }) => {
                const sizes = { sm:"w-7 h-7 text-[10px]", md:"w-9 h-9 text-sm", lg:"w-12 h-12 text-base" };
                return (
                    <div style={{ backgroundColor: getMemberColor(name) }}
                        className={`${sizes[size]} rounded-xl flex items-center justify-center font-semibold text-[#232946] border-2 border-white shadow-sm shrink-0`}>
                        {name[0].toUpperCase()}
                    </div>
                );
            };

            /* ── Loading spinner ── */
            if (loading && !user) return (
                <div className="h-screen flex items-center justify-center pastel-gradient">
                    <div className="loader-spin"></div>
                </div>
            );

            /* ── Login screen ── */
            if (!user) return (
                <div className="h-screen flex items-center justify-center p-6 pastel-gradient">
                    <div className="glass-card p-10 text-center max-w-xs w-full animate-pop relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-[#FFADAD] via-[#FDFFB6] to-[#9BF6FF]"></div>
                        <div className="w-28 h-28 bg-white rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-lg overflow-hidden border-2 border-[#F8F7F5]">
                            {appLogo
                                ? <img src={appLogo} className="w-full h-full object-cover animate-pop" alt="โลโก้" />
                                : <span className="text-4xl animate-pulse">🧸</span>}
                        </div>
                        <h1 className="text-2xl font-semibold mb-1 text-[#232946]">หารค่าใช้จ่ายกับเพื่อน</h1>
                        <p className="text-sm text-[#8A919E] mb-8">จัดการค่าใช้จ่ายกลุ่มอย่างง่ายดาย ✨</p>
                        <button onClick={handleLogin} className="btn-primary w-full py-3 px-5 flex items-center justify-center gap-2.5 text-sm font-medium shadow-md">
                            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-5 h-5 bg-white rounded-full p-0.5" />
                            เข้าสู่ระบบด้วย Google
                        </button>
                    </div>
                </div>
            );

            /* ── Main app ── */
            return (
                <div className="min-h-screen pb-10">
                    {/* Header */}
                    <header className="sticky top-0 z-40 px-4 pt-4 pb-3">
                        <div className="max-w-3xl mx-auto glass-card px-5 py-3 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                {view === 'detail' && (
                                    <button onClick={() => setView('list')} className="p-1.5 hover:bg-slate-100 rounded-lg transition-colors">
                                        <i data-lucide="chevron-left" className="w-5 h-5 text-[#232946]"></i>
                                    </button>
                                )}
                                <div>
                                    <h1 className="text-lg font-semibold text-[#232946] truncate max-w-[160px] sm:max-w-none leading-tight">
                                        {view === 'list' ? 'กลุ่มของฉัน' : activeGroup?.name}
                                    </h1>
                                    <div className="flex items-center gap-1.5">
                                        <div className="w-1.5 h-1.5 bg-green-400 rounded-full"></div>
                                        <span className="text-[10px] font-medium text-[#BEC1CE] uppercase tracking-wider">Cloud Sync</span>
                                    </div>
                                </div>
                                {view === 'detail' && (
                                    <button onClick={() => { setEditGroupName(activeGroup.name); setShowEditGroup(true); }}
                                        className="p-1 text-slate-300 hover:text-blue-400 transition-colors ml-1">
                                        <i data-lucide="edit-2" className="w-4 h-4"></i>
                                    </button>
                                )}
                            </div>
                            <div className="flex items-center gap-3">
                                <div className="text-right hidden sm:block">
                                    <p className="text-[10px] font-medium text-[#BEC1CE] uppercase tracking-wider">สวัสดี</p>
                                    <p className="text-sm font-semibold text-[#232946]">{user.displayName.split(' ')[0]}</p>
                                </div>
                                <div className="relative group">
                                    <div className="w-9 h-9 rounded-xl border-2 border-white shadow-sm overflow-hidden bg-white">
                                        <img src={user.photoURL} className="w-full h-full object-cover" />
                                    </div>
                                    <button onClick={handleLogout}
                                        className="absolute -top-1.5 -right-1.5 bg-red-400 text-white p-1.5 rounded-full border-2 border-white shadow-sm hover:bg-red-500 transition-colors">
                                        <i data-lucide="log-out" className="w-2.5 h-2.5"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-3xl mx-auto px-4 space-y-5 animate-pop">

                        {/* ══ LIST VIEW ══ */}
                        {view === 'list' ? (
                            <div className="space-y-4">
                                <div className="flex justify-between items-center px-1">
                                    <h2 className="text-base font-medium text-[#8A919E]">เลือกกลุ่มที่ต้องการ</h2>
                                    <button onClick={() => setShowAddGroup(true)}
                                        className="btn-secondary px-4 py-2 flex items-center gap-1.5 text-sm shadow-md">
                                        <i data-lucide="plus-circle" className="w-4 h-4"></i> สร้างกลุ่มใหม่
                                    </button>
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    {groups.map(g => (
                                        <div key={g.id}
                                            onClick={() => { setActiveGroup(g); setView('detail'); }}
                                            className="glass-card p-5 hover:shadow-lg hover:-translate-y-1 transition-all cursor-pointer relative group flex flex-col items-center text-center">
                                            <button onClick={(e) => { e.stopPropagation(); deleteGroup(g.id); }}
                                                className="absolute top-4 right-4 p-1.5 text-slate-200 hover:text-red-400 transition-colors opacity-0 group-hover:opacity-100">
                                                <i data-lucide="trash-2" className="w-4 h-4"></i>
                                            </button>
                                            <div className="w-24 h-24 bg-white rounded-2xl flex items-center justify-center mb-4 shadow-inner border-2 border-[#F8F7F5] overflow-hidden">
                                                {g.imageUrl
                                                    ? <img src={g.imageUrl} className="w-full h-full object-cover" alt={g.name} />
                                                    : <span className="text-4xl">📊</span>}
                                            </div>
                                            <h3 className="text-base font-semibold text-[#232946] mb-0.5">{g.name}</h3>
                                            <p className="text-[11px] text-[#BEC1CE] font-medium mb-3">{formatDate(g.createdAt)}</p>
                                            <div className="flex items-center gap-1.5">
                                                <div className="flex -space-x-2">
                                                    {g.members.slice(0,5).map((m,i) => (
                                                        <div key={i} style={{ backgroundColor: getMemberColor(m) }}
                                                            className="w-7 h-7 rounded-full border-2 border-white flex items-center justify-center text-[11px] font-bold shadow-sm">
                                                            {m[0].toUpperCase()}
                                                        </div>
                                                    ))}
                                                </div>
                                                <span className="text-xs font-medium text-[#8A919E] ml-1">{g.members.length} คน</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                        ) : (
                        /* ══ DETAIL VIEW ══ */
                            <div className="space-y-5">

                                {/* Stats + Members grid */}
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">

                                    {/* Stats hero card */}
                                    <div className="md:col-span-2 glass-card p-0 relative overflow-hidden min-h-[220px] flex flex-col justify-end"
                                        style={{
                                            backgroundImage: activeGroup.imageUrl ? `url(${activeGroup.imageUrl})` : 'none',
                                            backgroundSize:'cover', backgroundPosition:'center'
                                        }}>
                                        <div className="absolute inset-0 bg-white/60 backdrop-blur-[2px]"></div>
                                        <div className="relative z-10 p-6">
                                            <p className="text-xs font-medium text-[#8A919E] uppercase tracking-wider mb-0.5">ยอดรวมทั้งหมด</p>
                                            <h2 className="text-4xl font-semibold text-[#232946] leading-none mb-3">฿{formatMoney(totalSpent)}</h2>
                                            <div className="flex flex-wrap gap-2">
                                                {activeGroup.members.map(m => (
                                                    <span key={m} className="member-chip">
                                                        <span style={{backgroundColor:getMemberColor(m)}} className="w-4 h-4 rounded-md shrink-0 border border-white"></span>
                                                        {m}
                                                    </span>
                                                ))}
                                            </div>
                                        </div>
                                        <button onClick={regenerateGroupImage} disabled={isGeneratingGroupImage}
                                            className="absolute top-4 right-4 p-2.5 bg-white/80 hover:bg-white rounded-xl backdrop-blur-md border border-white/60 transition-all shadow-sm z-20"
                                            title="สร้างรูปภาพใหม่ด้วย AI">
                                            {isGeneratingGroupImage
                                                ? <div className="loader-spin"></div>
                                                : <i data-lucide="sparkles" className="w-4 h-4"></i>}
                                        </button>
                                    </div>

                                    {/* Members card */}
                                    <div className="glass-card p-5 flex flex-col">
                                        <h4 className="text-xs font-semibold text-[#8A919E] uppercase tracking-wider mb-4">
                                            สมาชิก ({activeGroup.members.length} คน)
                                        </h4>
                                        <div className="flex-1 overflow-y-auto no-scrollbar space-y-2 mb-4">
                                            {activeGroup.members.map(m => (
                                                <div key={m} className="flex items-center justify-between bg-white/70 px-3 py-2.5 rounded-xl border border-white group/m">
                                                    <div className="flex items-center gap-2.5">
                                                        <Avatar name={m} size="md" />
                                                        <span className="font-medium text-sm">{m}</span>
                                                    </div>
                                                    <button onClick={() => removeMember(m)}
                                                        className="text-red-300 hover:text-red-500 opacity-0 group-hover/m:opacity-100 transition-opacity p-1">
                                                        <i data-lucide="trash-2" className="w-3.5 h-3.5"></i>
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="border-t border-white/40 pt-4 space-y-2">
                                            <p className="text-[11px] font-semibold text-blue-400 uppercase tracking-wider">เพิ่มสมาชิก</p>
                                            <div className="flex gap-2">
                                                <input value={newMemberName} onChange={e => setNewMemberName(e.target.value)}
                                                    placeholder="ชื่อสมาชิก..."
                                                    className="input-base text-sm py-2"
                                                    onKeyDown={(e) => e.key === 'Enter' && addMember()} />
                                                <button onClick={addMember}
                                                    className="btn-primary px-3 py-2 shrink-0 shadow-sm">
                                                    <i data-lucide="user-plus" className="w-4 h-4"></i>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Settlement section */}
                                <div className="glass-card p-5">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="text-base font-semibold text-[#232946] flex items-center gap-2">
                                            <i data-lucide="arrow-right-left" className="w-4 h-4 text-[#FFD6A5]"></i>
                                            การชำระเงินระหว่างสมาชิก
                                        </h3>
                                        <div className="flex gap-2">
                                            <button onClick={exportImage} title="บันทึกเป็นรูปภาพ"
                                                className="p-2 bg-white hover:bg-slate-50 rounded-lg shadow-sm transition-all text-[#8A919E]">
                                                <i data-lucide="image" className="w-4 h-4"></i>
                                            </button>
                                            <button onClick={exportExcel} title="ดาวน์โหลด Excel"
                                                className="p-2 bg-white hover:bg-slate-50 rounded-lg shadow-sm transition-all text-[#8A919E]">
                                                <i data-lucide="file-spreadsheet" className="w-4 h-4"></i>
                                            </button>
                                        </div>
                                    </div>
                                    <div className="space-y-2.5">
                                        {settlements.map((s,i) => (
                                            <div key={i} className="settlement-card animate-pop">
                                                <div className="flex items-center gap-4 flex-1">
                                                    <div className="flex items-center gap-2">
                                                        <Avatar name={s.from} size="md" />
                                                        <span className="font-medium text-sm">{s.from}</span>
                                                    </div>
                                                    <div className="flex flex-col items-center flex-1">
                                                        <i data-lucide="arrow-right" className="w-4 h-4 text-[#EEBBC3]"></i>
                                                        <span className="text-[10px] font-semibold text-[#BEC1CE] uppercase tracking-wide">โอนให้</span>
                                                    </div>
                                                    <div className="flex items-center gap-2">
                                                        <Avatar name={s.to} size="md" />
                                                        <span className="font-medium text-sm">{s.to}</span>
                                                    </div>
                                                </div>
                                                <div className="pl-6 border-l border-slate-100 ml-4 text-right">
                                                    <span className="text-lg font-semibold text-[#A0C4FF]">฿{formatMoney(s.amount)}</span>
                                                </div>
                                            </div>
                                        ))}
                                        {settlements.length === 0 && (
                                            <div className="text-center py-6">
                                                <span className="text-3xl block mb-2">✨</span>
                                                <p className="text-sm font-medium text-[#8A919E]">ชำระเงินครบถ้วนทุกคนแล้ว</p>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* Expense list */}
                                <div className="space-y-4">
                                    <div className="flex flex-col sm:flex-row justify-between items-center gap-3 px-1">
                                        <h3 className="text-base font-semibold text-[#232946]">รายการค่าใช้จ่าย</h3>
                                        <button
                                            onClick={() => { setEditingExpense(null); setExpDesc(''); setExpAmount(''); setExpPayer(activeGroup.members[0]); setExpParticipants(activeGroup.members); setShowExpenseModal(true); }}
                                            className="btn-primary w-full sm:w-auto px-5 py-2.5 flex items-center justify-center gap-2 text-sm shadow-md">
                                            <i data-lucide="plus-circle" className="w-4 h-4"></i> เพิ่มรายการ
                                        </button>
                                    </div>
                                    <div className="grid gap-3">
                                        {expenses.map(e => (
                                            <div key={e.id} className="glass-card px-5 py-4 flex items-center justify-between group hover:border-[#B8C1EC] transition-all animate-pop">
                                                <div className="flex items-center gap-3">
                                                    <div className="relative">
                                                        <Avatar name={e.payer} size="md" />
                                                        <div className="absolute -bottom-0.5 -right-0.5 bg-white px-1 py-0.5 rounded-lg border border-slate-100 text-[10px] shadow-sm">💰</div>
                                                    </div>
                                                    <div>
                                                        <h4 className="font-semibold text-sm text-[#232946]">{e.description}</h4>
                                                        <p className="text-xs text-[#8A919E]">
                                                            <span className="text-[#B8C1EC] font-semibold">{e.payer}</span>
                                                            {' '}ชำระแทน • หาร {e.participants.length} คน
                                                        </p>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-3">
                                                    <p className="text-lg font-semibold text-[#232946]">฿{formatMoney(e.amount)}</p>
                                                    <div className="flex flex-col gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                                        <button onClick={() => { setEditingExpense(e); setExpDesc(e.description); setExpAmount(e.amount.toString()); setExpPayer(e.payer); setExpParticipants(e.participants); setShowExpenseModal(true); }}
                                                            className="p-1.5 bg-white rounded-lg shadow-sm text-blue-400 hover:text-blue-600 transition-colors">
                                                            <i data-lucide="edit-3" className="w-3.5 h-3.5"></i>
                                                        </button>
                                                        <button onClick={() => deleteExpense(e.id)}
                                                            className="p-1.5 bg-white rounded-lg shadow-sm text-red-300 hover:text-red-500 transition-colors">
                                                            <i data-lucide="trash-2" className="w-3.5 h-3.5"></i>
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* ══ MODALS ══ */}

                    {/* Add group */}
                    {showAddGroup && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-[#232946]/30 backdrop-blur-md animate-pop">
                            <div className="bg-white w-full max-w-xs rounded-3xl p-8 shadow-2xl border-2 border-[#EEBBC3] text-center">
                                {isGenerating ? (
                                    <div className="flex flex-col items-center py-6">
                                        <div className="loader-spin mb-4"></div>
                                        <h3 className="text-base font-semibold text-[#232946]">กำลังสร้างรูปภาพด้วย AI...</h3>
                                        <p className="text-xs text-[#8A919E] mt-1">ระบบกำลังวาดภาพประกอบกลุ่มของคุณ</p>
                                    </div>
                                ) : (
                                    <>
                                        <span className="text-4xl block mb-4">🎈</span>
                                        <h3 className="text-lg font-semibold mb-1 text-[#232946]">สร้างกลุ่มใหม่</h3>
                                        <p className="text-xs text-[#8A919E] mb-5">ตั้งชื่อกลุ่มของคุณ</p>
                                        <input autoFocus value={newGroupName} onChange={e => setNewGroupName(e.target.value)}
                                            placeholder="เช่น ทริปเที่ยวญี่ปุ่น..."
                                            className="input-base text-center text-sm mb-5"
                                            onKeyDown={(e) => e.key === 'Enter' && createGroup()} />
                                        <div className="space-y-2.5">
                                            <button onClick={createGroup} className="btn-primary w-full py-2.5 text-sm shadow-md">สร้างกลุ่ม</button>
                                            <button onClick={() => setShowAddGroup(false)} className="w-full py-2 text-xs text-[#BEC1CE] hover:text-[#8A919E] transition-colors font-medium">ยกเลิก</button>
                                        </div>
                                    </>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Edit group name */}
                    {showEditGroup && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-[#232946]/30 backdrop-blur-md animate-pop">
                            <div className="bg-white w-full max-w-xs rounded-3xl p-8 shadow-2xl border-2 border-[#B8C1EC] text-center">
                                <h3 className="text-lg font-semibold mb-5 text-[#232946]">เปลี่ยนชื่อกลุ่ม</h3>
                                <input autoFocus value={editGroupName} onChange={e => setEditGroupName(e.target.value)}
                                    className="input-base text-center text-sm mb-5"
                                    onKeyDown={(e) => e.key === 'Enter' && updateGroupName()} />
                                <div className="flex gap-2.5">
                                    <button onClick={() => setShowEditGroup(false)} className="flex-1 py-2.5 text-xs text-[#BEC1CE] font-medium hover:text-[#8A919E] transition-colors">ยกเลิก</button>
                                    <button onClick={updateGroupName} className="btn-secondary flex-1 py-2.5 text-sm shadow-md">บันทึก</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Add/edit expense */}
                    {showExpenseModal && (
                        <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-0 sm:p-6 bg-[#232946]/30 backdrop-blur-md animate-pop">
                            <div className="bg-white w-full max-w-md rounded-t-3xl sm:rounded-3xl p-6 shadow-2xl max-h-[92vh] overflow-y-auto no-scrollbar border-t-4 border-[#B8C1EC]">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-base font-semibold text-[#232946]">
                                        {editingExpense ? 'แก้ไขรายการ' : 'เพิ่มรายการค่าใช้จ่าย'}
                                    </h3>
                                    <button onClick={() => setShowExpenseModal(false)} className="p-2 hover:bg-slate-100 rounded-lg transition-colors">
                                        <i data-lucide="x" className="w-4 h-4"></i>
                                    </button>
                                </div>

                                <div className="space-y-5">
                                    {/* Description */}
                                    <div>
                                        <label className="text-[11px] font-semibold text-[#8A919E] uppercase tracking-wider block mb-1.5">รายละเอียด</label>
                                        <input value={expDesc} onChange={e => setExpDesc(e.target.value)}
                                            placeholder="เช่น ค่าที่พัก, ค่าอาหาร"
                                            className="input-base text-sm" />
                                    </div>

                                    {/* Amount */}
                                    <div>
                                        <label className="text-[11px] font-semibold text-[#8A919E] uppercase tracking-wider block mb-1.5">จำนวนเงิน (คำนวณสูตรได้)</label>
                                        <div className="relative">
                                            <input value={expAmount} onChange={e => setExpAmount(e.target.value)}
                                                placeholder="0"
                                                className="input-base text-2xl font-semibold text-[#A0C4FF] pr-28 py-3" />
                                            <span className="absolute right-3 top-1/2 -translate-y-1/2 text-[11px] font-semibold text-[#BEC1CE] bg-[#F8F7F5] px-2.5 py-1.5 rounded-lg border border-slate-100">
                                                = ฿{formatMoney(evaluateMath(expAmount))}
                                            </span>
                                        </div>
                                    </div>

                                    {/* Payer */}
                                    <div>
                                        <label className="text-[11px] font-semibold text-[#8A919E] uppercase tracking-wider block mb-2">ผู้ชำระเงิน</label>
                                        <div className="flex overflow-x-auto gap-3 pb-1 no-scrollbar">
                                            {activeGroup.members.map(m => (
                                                <button key={m} onClick={() => setExpPayer(m)}
                                                    className={`shrink-0 flex flex-col items-center gap-1.5 p-3 rounded-2xl border-2 transition-all ${expPayer === m ? 'bg-white border-[#B8C1EC] shadow-md scale-[1.05]' : 'border-transparent opacity-50'}`}>
                                                    <Avatar name={m} size="md" />
                                                    <span className="text-xs font-semibold">{m}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Participants */}
                                    <div>
                                        <div className="flex justify-between items-center mb-2">
                                            <label className="text-[11px] font-semibold text-[#8A919E] uppercase tracking-wider">
                                                ผู้ร่วมหาร ({expParticipants.length} คน)
                                            </label>
                                            <button onClick={() => setExpParticipants(activeGroup.members)}
                                                className="text-[11px] font-semibold text-blue-400 border border-blue-100 px-3 py-1 rounded-full hover:bg-blue-50 transition-colors">
                                                เลือกทั้งหมด
                                            </button>
                                        </div>
                                        <div className="grid grid-cols-2 gap-2">
                                            {activeGroup.members.map(m => (
                                                <button key={m}
                                                    onClick={() => expParticipants.includes(m)
                                                        ? setExpParticipants(expParticipants.filter(p => p !== m))
                                                        : setExpParticipants([...expParticipants, m])}
                                                    className={`flex items-center gap-2.5 px-3 py-3 rounded-xl font-medium border-2 transition-all text-sm ${expParticipants.includes(m) ? 'bg-[#EEBBC3] border-[#EEBBC3] text-[#232946] shadow-sm' : 'bg-[#F8F7F5] border-slate-100 text-[#8A919E] opacity-70'}`}>
                                                    <div style={{backgroundColor: expParticipants.includes(m) ? 'white' : getMemberColor(m)}}
                                                        className="w-6 h-6 rounded-lg shrink-0 border border-white flex items-center justify-center text-[11px] font-bold">
                                                        {m[0].toUpperCase()}
                                                    </div>
                                                    <span className="truncate">{m}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <button onClick={saveExpense}
                                        className="w-full bg-[#232946] text-white py-3.5 rounded-2xl font-semibold text-sm shadow-xl active:scale-95 transition-all border-b-4 border-black mt-2">
                                        บันทึกรายการ
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Export area */}
                    <div id="export-area" className="p-6 bg-[#F8F7F5]">
                        <div className="glass-card p-6 border-2 border-white shadow-xl text-center">
                            <span className="text-3xl block mb-1.5">🎀</span>
                            <h1 className="text-xl font-semibold mb-0.5 text-[#232946]">{activeGroup?.name}</h1>
                            <p className="text-[#A0C4FF] font-semibold text-xs mb-6 uppercase tracking-widest">สรุปค่าใช้จ่ายกลุ่ม</p>
                            <div className="text-left space-y-4">
                                <div className="bg-[#B8C1EC]/10 p-4 rounded-2xl border-2 border-white shadow-inner text-center">
                                    <h3 className="font-semibold text-sm text-[#232946] mb-0.5">ยอดรวม</h3>
                                    <p className="text-3xl font-bold text-[#232946]">฿{formatMoney(totalSpent)}</p>
                                </div>
                                <div className="space-y-2">
                                    <h3 className="font-semibold text-sm border-l-4 border-[#EEBBC3] pl-3 text-[#232946]">การชำระเงินระหว่างสมาชิก</h3>
                                    {settlements.map((s,i) => (
                                        <div key={i} className="flex justify-between bg-white/70 p-3 rounded-xl border-2 border-white shadow-sm">
                                            <span className="font-medium text-sm text-[#232946]">{s.from} ➜ {s.to}</span>
                                            <span className="font-bold text-sm text-[#A0C4FF]">฿{formatMoney(s.amount)}</span>
                                        </div>
                                    ))}
                                </div>
                                <p className="text-[10px] text-center text-[#BEC1CE] mt-6 font-medium tracking-widest uppercase">สรุปโดย Expense Pro ✨</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
