    <script>
        // Generate PNG icon via canvas for iOS PWA home screen
        (function() {
            function makeIcon(size, radius) {
                var c = document.createElement('canvas');
                c.width = c.height = size;
                var ctx = c.getContext('2d');
                // Rounded rect background
                ctx.beginPath();
                ctx.moveTo(radius, 0);
                ctx.lineTo(size - radius, 0);
                ctx.quadraticCurveTo(size, 0, size, radius);
                ctx.lineTo(size, size - radius);
                ctx.quadraticCurveTo(size, size, size - radius, size);
                ctx.lineTo(radius, size);
                ctx.quadraticCurveTo(0, size, 0, size - radius);
                ctx.lineTo(0, radius);
                ctx.quadraticCurveTo(0, 0, radius, 0);
                ctx.closePath();
                ctx.fillStyle = '#FFB6C1';
                ctx.fill();
                // Emoji
                ctx.font = Math.round(size * 0.6) + 'px serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('🧸', size / 2, size / 2 + size * 0.04);
                return c.toDataURL('image/png');
            }
            document.getElementById('apple-touch-icon-link').href = makeIcon(180, 40);
            document.getElementById('favicon-link').href = makeIcon(64, 14);
        })();
    </script>

    <script type="text/babel" data-presets="react,env">
        const { useState, useEffect, useMemo, useRef, useCallback } = React;
        const ReactDOMClient = window.ReactDOM;

        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : {
                apiKey: "AIzaSyCwnWHqG__ty3OvDok2o6orgreXOu5LSXk",
                authDomain: "expense-manager-14564.firebaseapp.com",
                projectId: "expense-manager-14564",
                storageBucket: "expense-manager-14564.firebasestorage.app",
                messagingSenderId: "259280883710",
                appId: "1:259280883710:web:67d7ce7b1f8e5e196a7aaf"
            };

        const appId = (typeof __app_id !== 'undefined' && __app_id) ? __app_id : 'default-trip-app';

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ─── Persistent Login via localStorage ─────────────────────────────────────
        const REMEMBER_KEY = 'expense_pro_remember_login';
        const LOCAL_MODE_KEY = 'ep_local_mode';
        const LOCAL_DB_KEY = 'ep_local_db';
        const LOCAL_USER_KEY = 'ep_local_user';

        // ─── LocalDB: localStorage-backed data engine ──────────────────────────────
        // Stores: { groups: {[id]: groupDoc}, expenses: {[groupId]: {[expId]: expDoc}} }
        const LocalDB = {
            _read() {
                try { return JSON.parse(localStorage.getItem(LOCAL_DB_KEY) || '{"groups":{},"expenses":{}}'); }
                catch { return { groups: {}, expenses: {} }; }
            },
            _write(data) { localStorage.setItem(LOCAL_DB_KEY, JSON.stringify(data)); },
            _listeners: {},  // key → [callback]
            _notify(key) {
                (this._listeners[key] || []).forEach(cb => cb());
            },
            _genId() { return Math.random().toString(36).slice(2) + Date.now().toString(36); },

            // Groups CRUD
            getGroups() { return Object.values(this._read().groups); },
            getGroup(id) { return this._read().groups[id] || null; },
            saveGroup(id, data) {
                const db = this._read();
                db.groups[id] = { ...db.groups[id], ...data, id };
                this._write(db);
                this._notify('groups');
                this._notify(`group:${id}`);
            },
            deleteGroup(id) {
                const db = this._read();
                delete db.groups[id];
                delete db.expenses[id];
                this._write(db);
                this._notify('groups');
            },
            addGroup(data) {
                const id = this._genId();
                this.saveGroup(id, data);
                return id;
            },

            // Expenses CRUD
            getExpenses(groupId) { return Object.values(this._read().expenses[groupId] || {}); },
            saveExpense(groupId, expId, data) {
                const db = this._read();
                if (!db.expenses[groupId]) db.expenses[groupId] = {};
                db.expenses[groupId][expId] = { ...db.expenses[groupId][expId], ...data, id: expId };
                this._write(db);
                this._notify(`expenses:${groupId}`);
            },
            addExpense(groupId, data) {
                const id = this._genId();
                this.saveExpense(groupId, id, data);
                return id;
            },
            deleteExpense(groupId, expId) {
                const db = this._read();
                if (db.expenses[groupId]) delete db.expenses[groupId][expId];
                this._write(db);

            const ref = useRef(null);
            useEffect(() => {
                if (!ref.current) return;
                // Lucide UMD exposes either window.lucide or window.lucide.icons
                const lucide = window.lucide;
                if (!lucide) return;
                // Convert kebab-case to PascalCase for component lookup
                const pascalName = name.replace(/(^|-)([a-z])/g, (_, __, c) => c.toUpperCase());
                const IconComp = lucide[pascalName] || lucide.icons?.[pascalName];
                if (!IconComp) {
                    // fallback: use createIcons
                    ref.current.innerHTML = `<i data-lucide="${name}" class="${className}"></i>`;
                    try { lucide.createIcons({ nodes: [ref.current.querySelector('i')] }); } catch(e) {}
                    return;
                }
                // IconComp is [tag, attrs, children] tuple from lucide
                const [tag, attrs, kids] = IconComp;
                const svgNS = 'http://www.w3.org/2000/svg';
                const svg = document.createElementNS(svgNS, 'svg');
                const mergedAttrs = { ...attrs, class: className };
                Object.entries(mergedAttrs).forEach(([k, v]) => svg.setAttribute(k, v));
                (kids||[]).forEach(([childTag, childAttrs]) => {
                    const el = document.createElementNS(svgNS, childTag);
                    Object.entries(childAttrs||{}).forEach(([k,v]) => el.setAttribute(k, v));
                    svg.appendChild(el);
                });
                ref.current.innerHTML = '';
                ref.current.appendChild(svg);
            }, [name, className]);

        function useCountUp(target, duration = 800) {
            const [display, setDisplay] = useState(target);
            const prev = useRef(target);
            useEffect(() => {
                const start = prev.current;
                const diff = target - start;
                if (diff === 0) return;
                const steps = Math.max(20, Math.round(duration / 16));
                let step = 0;
                const timer = setInterval(() => {
                    step++;
                    const progress = step / steps;
                    const ease = 1 - Math.pow(1 - progress, 3); // easeOutCubic
                    setDisplay(start + diff * ease);
                    if (step >= steps) { setDisplay(target); prev.current = target; clearInterval(timer); }
                }, 16);
                return () => clearInterval(timer);
            }, [target]);
            return display;
        }

                    setJoinId(''); setShowJoinGroup(false);
                    if ((data.members||[]).includes(myName)) { setActiveGroup({ id: doc.id, ...data }); setView('detail'); }
                    else { setClaimGroupData({ ref, groupDoc: { id: doc.id, ...data } }); setClaimSelectedMember(null); setClaimNewName(myName); setShowClaimMember(true); }
                } catch (e) { handlePermissionError(e, "เข้าร่วมไม่สำเร็จ"); }
            };

            // ยืนยันการเข้ากลุ่ม: เลือกเป็นสมาชิกคนเดิม หรือเพิ่มชื่อใหม่
            const confirmClaim = async () => {
                if (!claimGroupData || !user) return;
                const { ref, groupDoc } = claimGroupData;
                const myDisplayName = user.displayName?.split(' ')[0] || 'ฉัน';

                try {
                    if (claimSelectedMember && claimSelectedMember !== '__new__') {
                        // เลือกเป็นสมาชิกที่มีอยู่ — ไม่ต้องเปลี่ยนชื่อ แค่เพิ่ม Google name ถ้ายังไม่อยู่
                        // (สมาชิกชื่อนั้นมีอยู่แล้ว ไม่ต้อง update members)
                        // เพิ่ม memberClaims map: googleUid → memberName เพื่อ track
                        await ref.update({
                            [`memberClaims.${user.uid}`]: claimSelectedMember
                        });
                        const updatedMembers = groupDoc.members || [];
                        setActiveGroup({ ...groupDoc, members: updatedMembers });
                    } else {
                        // สร้างชื่อใหม่
                        const nameToAdd = (claimNewName || '').trim() || myDisplayName;
                        if (!(groupDoc.members||[]).includes(nameToAdd)) {
                            await ref.update({
                                members: firebase.firestore.FieldValue.arrayUnion(nameToAdd),
                                [`memberClaims.${user.uid}`]: nameToAdd
                            });
                        } else {
                            await ref.update({ [`memberClaims.${user.uid}`]: nameToAdd });
                        }
                        setActiveGroup({ ...groupDoc, members: [...(groupDoc.members||[]), nameToAdd] });
                    }

                    setShowClaimMember(false);
                    setClaimGroupData(null);
                    setView('detail');
                    showToast(`เข้าร่วม "${claimGroupData.groupDoc?.name}" แล้ว 🎉`, 'success');
                } catch (e) { handlePermissionError(e, "ยืนยันการเข้าร่วมไม่สำเร็จ"); }
            };

            const deleteGroup = async (id, e) => {
                e.stopPropagation();
                if (!user) return;
                const group = groups.find(g => g.id === id);
                if (group && group.ownerId !== user.uid) { showToast("เฉพาะผู้สร้างเท่านั้นที่ลบได้ 🔒", "warning"); return; }
                if (confirm("ต้องการลบกลุ่มและข้อมูลทั้งหมดถาวรหรือไม่?")) {
                    try {
                        if (isLocalMode) { LocalDB.deleteGroup(id); if (activeGroup?.id === id) { setActiveGroup(null); setView('list'); } }
                        else { await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(id).delete(); }
                    } catch (e) { handlePermissionError(e, "ลบกลุ่มไม่สำเร็จ"); }
                }
            };

            const leaveGroup = async (id, e) => {
                e.stopPropagation();
                if (!user) return;
                const group = groups.find(g => g.id === id);
                if (!group) return;
                if (!confirm(`ออกจากกลุ่ม "${group.name}" ใช่หรือไม่?`)) return;
                try {
                    if (isLocalMode) {
                        // Local mode: ลบออกจาก members
                        const myName = user.displayName?.split(' ')[0] || 'ฉัน';
                        const newMembers = (group.members||[]).filter(m => m !== myName);
                        LocalDB.saveGroup(id, { ...group, members: newMembers });
                        if (activeGroup?.id === id) { setActiveGroup(null); setView('list'); }
                    } else {
                        const myName = user.displayName?.split(' ')[0] || 'ฉัน';
                        const claimedName = group.memberClaims?.[user.uid];
                        const ref = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(id);
                        const updates = { [`memberClaims.${user.uid}`]: firebase.firestore.FieldValue.delete() };
                        if (claimedName) updates.members = firebase.firestore.FieldValue.arrayRemove(claimedName);
                        else if ((group.members||[]).includes(myName)) updates.members = firebase.firestore.FieldValue.arrayRemove(myName);
                        await ref.update(updates);
                    }
                    showToast('ออกจากกลุ่มแล้ว 👋', 'info');
                } catch (e) { handlePermissionError(e, "ออกจากกลุ่มไม่สำเร็จ"); }
            };

            const addMember = async () => {
                if (!user || !activeGroup || !newMemberName.trim() || (activeGroup.members||[]).includes(newMemberName.trim())) return;
                try {
                    const newMembers = [...(activeGroup.members||[]), newMemberName.trim()];
                    if (isLocalMode) { LocalDB.saveGroup(activeGroup.id, { members: newMembers }); setActiveGroup(g => ({...g, members: newMembers})); }
                    else { await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).update({ members: firebase.firestore.FieldValue.arrayUnion(newMemberName.trim()) }); }
                    setNewMemberName('');
                } catch (e) { handlePermissionError(e, "เพิ่มสมาชิกไม่สำเร็จ"); }
            };

            const removeMember = async (name) => {
                if (!user || !activeGroup) return;
                if (confirm(`ลบ ${name} ออกจากกลุ่ม?`)) {
                    try {
                        const newMembers = (activeGroup.members||[]).filter(m => m !== name);
                        if (isLocalMode) { LocalDB.saveGroup(activeGroup.id, { members: newMembers }); setActiveGroup(g => ({...g, members: newMembers})); }
                        else { await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).update({ members: firebase.firestore.FieldValue.arrayRemove(name) }); }
                    } catch (e) { handlePermissionError(e, "ลบสมาชิกไม่สำเร็จ"); }
                }
            };

            // Edit member: rename + custom icon
            const openMemberEditor = (name) => {
                const custom = getMemberData(activeGroup, name);
                setEditingMemberData({ oldName: name });
                setMemberNewName(name);
                setMemberNewEmoji(custom.emoji || '');
                setMemberNewColor(custom.color || VIBRANT_COLORS[Math.abs(hashStr(name)) % VIBRANT_COLORS.length]);
                setMemberNewShape(custom.shape || DEFAULT_AVATAR_SHAPE);
                setShowMemberEditor(true);
            };

            const saveMemberEdit = async () => {
                if (!activeGroup || !user || !editingMemberData) return;
                const { oldName } = editingMemberData;
                const newName = memberNewName.trim();
                if (!newName) return;
                try {
                    const newMembers = (activeGroup.members||[]).map(m => m === oldName ? newName : m);
                    const memberIcons = { ...(activeGroup.memberIcons||{}) };
                    if (oldName !== newName && memberIcons[oldName]) { memberIcons[newName] = memberIcons[oldName]; delete memberIcons[oldName]; }
                    memberIcons[newName] = { emoji: memberNewEmoji || null, color: memberNewColor, shape: memberNewShape };

                    if (isLocalMode) {
                        // Rename in expenses too
                        LocalDB.getExpenses(activeGroup.id).forEach(exp => {
                            let changed = false; const upd = { ...exp };
                            if (exp.payer === oldName) { upd.payer = newName; changed = true; }
                            if ((exp.participants||[]).includes(oldName)) { upd.participants = exp.participants.map(p => p === oldName ? newName : p); changed = true; }
                            if (changed) LocalDB.saveExpense(activeGroup.id, exp.id, upd);
                        });
                        LocalDB.saveGroup(activeGroup.id, { members: newMembers, memberIcons });
                        setActiveGroup(g => ({ ...g, members: newMembers, memberIcons }));
                    } else {
                        const groupRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id);
                        const expRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).collection('expenses');
                        await groupRef.update({ members: newMembers, memberIcons });
                        if (oldName !== newName) {
                            const snap = await expRef.get();
                            const batch = db.batch();
                            snap.docs.forEach(doc => {
                                const d = doc.data(); let changed = false; const update = {};
                                if (d.payer === oldName) { update.payer = newName; changed = true; }
                                if ((d.participants||[]).includes(oldName)) { update.participants = d.participants.map(p => p === oldName ? newName : p); changed = true; }
                                if (changed) batch.update(doc.ref, update);
                            });
                            await batch.commit();
                        }
                    }
                    setShowMemberEditor(false); setEditingMemberData(null);
                    showToast('บันทึกข้อมูลสมาชิกแล้ว ✨', 'success');
                } catch (e) { handlePermissionError(e, "แก้ไขสมาชิกไม่สำเร็จ"); }
            };

            const saveExpense = async () => {
                if (!user || !activeGroup) return;
                const amount = evaluateMath(expAmount);
                if (!expDesc || amount <= 0 || !expPayer) return;
                const data = { description: expDesc, amount, payer: expPayer, participants: expParticipants, date: editingExpense ? editingExpense.date : Date.now() };
                try {
                    if (isLocalMode) {
                        if (editingExpense) LocalDB.saveExpense(activeGroup.id, editingExpense.id, data);
                        else LocalDB.addExpense(activeGroup.id, data);
                    } else {
                        const ref = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).collection('expenses');
                        if (editingExpense) await ref.doc(editingExpense.id).update(data);
                        else await ref.add(data);
                    }
                    showToast(editingExpense ? 'แก้ไขบิลแล้ว ✏️' : 'เพิ่มบิลแล้ว 🧾', 'success');
                    setShowExpenseModal(false); setEditingExpense(null);
                } catch (e) { handlePermissionError(e, "บันทึกบิลไม่สำเร็จ"); }
            };

            const deleteExpense = async (id) => {
                if (!user || !activeGroup) return;
                if (confirm("ลบรายการนี้ใช่หรือไม่?")) {
                    try {
                        if (isLocalMode) { LocalDB.deleteExpense(activeGroup.id, id); }
                        else { await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('groups').doc(activeGroup.id).collection('expenses').doc(id).delete(); }
                        showToast('ลบบิลแล้ว 🗑️', 'info');
                    } catch (e) { handlePermissionError(e, "ลบบิลไม่สำเร็จ"); }
                }
            };

            const shareLink = () => {
                if (!activeGroup) return;
                if (isLocalMode) { upgradeToCloud(); return; }
                const base = window.location.href.split('?')[0];
                const url = `${base}?join=${activeGroup.id}`;
                navigator.clipboard?.writeText(url) || fallbackCopy(url);
                if (base.startsWith("blob:")) { showToast("⚠️ Preview mode — upload to hosting first", "warning", 4000); return; }
                else showToast("คัดลอกลิงก์เชิญแล้ว! 🔗", "success");
            };

            const copyDashboardLink = () => {
                if (!activeGroup) return;
                const base = window.location.href.split('?')[0];
                const url = `${base}?dashboard=${activeGroup.id}`;
                navigator.clipboard?.writeText(url) || fallbackCopy(url);
                if (base.startsWith("blob:")) { showToast("⚠️ Preview mode", "warning"); return; }
                else showToast("คัดลอกลิงก์ Dashboard แล้ว! 📊", "success");
            };

            const fallbackCopy = (text) => {
                const el = document.createElement('textarea');
                el.value = text; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
            };

            const exportImage = async () => {
                setExporting(true);
                const el = document.getElementById('export-area');
                el.style.cssText = "position:fixed;left:0;top:0;z-index:-9999;";
                try {
                    const canvas = await html2canvas(el, { scale:2, backgroundColor:'#FFE4E1', useCORS:true, width:1200, height:el.scrollHeight, windowWidth:1200 });
                    const link = document.createElement('a');
                    link.download = `สรุปยอด_${activeGroup.name}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                } catch (e) { console.error(e); }
                el.style.cssText = "position:absolute;left:-9999px;top:0;width:1200px;height:auto;z-index:-9999;";
                setExporting(false);
            };

            const exportExcel = () => {
                const data = [
                    ["กลุ่ม:", activeGroup.name], ["ยอดรวม:", totalSpent], [],
                    ["รายละเอียด","จำนวนเงิน","ผู้จ่าย","ผู้ร่วมหาร"],
                    ...expenses.map(e => [e.description, e.amount, e.payer, (e.participants||[]).join(', ')]),
                    [],["จาก","ถึง","จำนวนที่ต้องโอน"],
                    ...settlements.map(s => [s.from, s.to, s.amount]),
                    [],["ชื่อสมาชิก","ออกไปแล้ว","ยอดรับผิดชอบ","สรุป"],
                    ...individualShares.map(i => [i.name, i.paid, i.share, i.balance > 0 ? `ได้คืน ${i.balance.toFixed(2)}` : i.balance < 0 ? `จ่ายเพิ่ม ${Math.abs(i.balance).toFixed(2)}` : "พอดี"])
                ];
                const ws = XLSX.utils.aoa_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "สรุปบิลทริป");
                XLSX.writeFile(wb, `Expenses_${activeGroup.name}.xlsx`);
            };

            // ── Computed ───────────────────────────────────────────────────────────
            const totalSpent = useMemo(() => expenses.reduce((s, e) => s + e.amount, 0), [expenses]);

            const individualShares = useMemo(() => {
                if (!activeGroup?.members) return [];
                const stats = {};
                activeGroup.members.forEach(m => stats[m] = { paid:0, share:0, balance:0 });
                expenses.forEach(e => {
                    if (stats[e.payer]) stats[e.payer].paid += e.amount;
                    const parts = e.participants || [];
                    if (parts.length > 0) {
                        const share = e.amount / parts.length;
                        parts.forEach(p => { if (stats[p]) stats[p].share += share; });
                    }
                });
                return Object.keys(stats).map(name => ({ name, ...stats[name], balance: stats[name].paid - stats[name].share }))
                    .sort((a,b) => b.balance - a.balance);
            }, [activeGroup, expenses]);

            const settlements = useMemo(() => {
                if (!activeGroup || activeGroup.members?.length < 2) return [];
                const bal = {};
                activeGroup.members.forEach(m => bal[m] = 0);
                expenses.forEach(e => {
                    const share = e.amount / (e.participants||[]).length;
                    bal[e.payer] += e.amount;
                    (e.participants||[]).forEach(p => { if (bal.hasOwnProperty(p)) bal[p] -= share; });
                });
                const creds = [], debts = [];
                Object.keys(bal).forEach(n => {
                    if (bal[n] > 0.01) creds.push({name:n, amt:bal[n]});
                    else if (bal[n] < -0.01) debts.push({name:n, amt:Math.abs(bal[n])});
                });
                const res = []; let i=0, j=0;
                while (i < debts.length && j < creds.length) {
                    const pay = Math.min(debts[i].amt, creds[j].amt);
                    res.push({from:debts[i].name, to:creds[j].name, amount:pay});
                    debts[i].amt -= pay; creds[j].amt -= pay;
                    if (debts[i].amt < 0.01) i++;
                    if (creds[j].amt < 0.01) j++;
                }
                return res;
            }, [activeGroup, expenses]);

            // ── Sub-components ─────────────────────────────────────────────────────
            const countUpTotal = useCountUp(totalSpent);

            // Dark mode toggle button (reused in header)
            const DarkToggle = () => (
                <button onClick={() => setDarkMode(d => !d)}
                    className="p-2 rounded-xl hover:bg-white/30 transition-all text-slate-400"
                    title={darkMode ? 'Light mode' : 'Dark mode'}>
                    <span className="text-base leading-none">{darkMode ? '☀️' : '🌙'}</span>
                </button>
            );
            const GroupIcon = ({ group, size = "md" }) => {
                const style = getGroupStyle(group);
                let cls = "";
                if (size === "xl") cls = "w-20 h-20 text-[42px] rounded-[24px] border-[5px]";
                else if (size === "lg") cls = "w-16 h-16 text-[32px] rounded-[20px] border-4";
                else if (size === "sm") cls = "w-10 h-10 text-[20px] rounded-[14px] border-2";
                else cls = "w-12 h-12 text-[24px] rounded-[18px] border-4";
                return (
                    <div style={{ backgroundColor: style.color }} className={`${cls} flex items-center justify-center border-white shadow-md shrink-0`}>
                        {style.emoji}
                    </div>
                );
            };

            const Avatar = ({ name, group, size = "sm" }) => {
                const data = group ? getMemberData(group, name) : { color: VIBRANT_COLORS[Math.abs(hashStr(name||'')) % VIBRANT_COLORS.length], emoji: null, shape: DEFAULT_AVATAR_SHAPE };
                const shapeObj = AVATAR_SHAPES.find(s => s.id === (data.shape || DEFAULT_AVATAR_SHAPE)) || AVATAR_SHAPES[0];
                let szClass = "", fontClass = "";
                if (size === "xs") { szClass = "w-7 h-7"; fontClass = "text-[14px]"; }
                else if (size === "sm") { szClass = "w-8 h-8"; fontClass = "text-[16px]"; }
                else if (size === "md") { szClass = "w-10 h-10"; fontClass = "text-[20px]"; }
                else { szClass = "w-14 h-14"; fontClass = "text-[28px]"; }
                return (
                    <div className="shrink-0 filter drop-shadow-sm">
                        <div style={{ backgroundColor: data.color }} className={`${szClass} ${shapeObj.cls} flex items-center justify-center ${data.emoji ? '' : 'font-black text-white'}`}>
                            <span className={`${fontClass} leading-none mt-0.5 drop-shadow-sm`}>
                                {data.emoji || (name ? name[0].toUpperCase() : '')}
                            </span>
                        </div>
                    </div>
                );
            };

            const SkeletonCard = () => (
                <div className="glass-card p-4 bg-white/40">
                    <div className="flex items-center gap-3 mb-3">
                        <div className="skeleton w-16 h-16 rounded-[20px]"></div>
                        <div className="flex-1 space-y-2">
                            <div className="skeleton h-4 w-3/4 rounded-xl"></div>
                            <div className="skeleton h-3 w-1/2 rounded-xl"></div>
                        </div>
                    </div>
                    <div className="flex gap-1">
                        {[1,2,3].map(i => <div key={i} className="skeleton w-7 h-7 rounded-full"></div>)}
                    </div>
                </div>
            );

            // ── Loading Screen ─────────────────────────────────────────────────────
            if (loading) return (
                <div className="min-h-screen pb-16">
                    <div className="p-3"><div className="max-w-2xl mx-auto glass-card px-4 py-2.5 flex items-center justify-between shadow-md"><div className="skeleton h-6 w-32 rounded-xl"></div><div className="skeleton h-9 w-9 rounded-[16px]"></div></div></div>
                    <div className="max-w-2xl mx-auto px-3 mt-4 space-y-4">
                        <div className="skeleton h-24 w-full rounded-[20px]"></div>
                        {[1,2,3].map(i=><SkeletonCard key={i}/>)}
                    </div>
                </div>
            );

            // ── Mode Select / Login Screen ─────────────────────────────────────────
            if (!user || (user.isAnonymous && !dashIdFromUrl && view !== 'dashboard')) {
                // ถ้ายังไม่ได้เลือก mode → แสดงหน้าเลือก
                if (showModeSelect || (!isLocalMode && (!user || user.isAnonymous))) {
                    return (
                        <div className="h-screen flex items-center justify-center p-4 animate-pop">
                            <div className="glass-card p-8 text-center max-w-xs w-full shadow-2xl">
                                <div className="w-20 h-20 bg-gradient-to-br from-[#FFB6C1] to-[#FFC0CB] rounded-[24px] flex items-center justify-center mx-auto mb-5 shadow-lg text-5xl border-4 border-white">🧸</div>
                                <h1 className="text-2xl font-bold mb-1 text-[#2B3A4A]">Expense Pro</h1>
                                <p className="text-xs text-slate-500 mb-6 leading-relaxed font-medium">แอปจัดการบิลกลุ่มและทริปเพื่อน<br/>เลือกวิธีการใช้งาน ✨</p>

                                {/* LOCAL MODE */}
                                <div className="mb-3">
                                    {localNameInput !== null && (
                                        <div className="mb-3 text-left">
                                            <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1.5">ชื่อของคุณ</p>
                                            <input
                                                value={localNameInput}
                                                onChange={e => setLocalNameInput(e.target.value)}
                                                onKeyDown={e => {
                                                    if (e.key === 'Enter' && localNameInput.trim()) {
                                                        const u = LocalDB.setLocalUser(localNameInput.trim());
                                                        localStorage.setItem(LOCAL_MODE_KEY, '1');
                                                        setIsLocalMode(true); setUser(u); setShowModeSelect(false);
                                                        showToast(`ยินดีต้อนรับ ${localNameInput.trim()} 👋`, 'success');
                                                    }
                                                }}
                                                placeholder="เช่น มิว, ต้น, แบม..."
                                                className="w-full bg-white/70 rounded-xl px-3 py-2.5 text-sm font-medium outline-none border border-slate-100 focus:ring-2 ring-[#FFD1DC] mb-2"
                                                autoFocus
                                            />
                                        </div>
                                    )}
                                    <button
                                        onClick={() => {
                                            if (!localNameInput.trim()) { setLocalNameInput(''); return; }
                                            const u = LocalDB.setLocalUser(localNameInput.trim());
                                            localStorage.setItem(LOCAL_MODE_KEY, '1');
                                            setIsLocalMode(true); setUser(u); setShowModeSelect(false);
                                            showToast(`ยินดีต้อนรับ ${localNameInput.trim()} 👋`, 'success');
                                        }}
                                        className="btn-secondary w-full py-3 px-5 flex items-center justify-center gap-2 font-bold shadow-md text-sm">
                                        <span className="text-lg">📱</span> ใช้แบบ Local (ไม่ต้อง Login)
                                    </button>
                                    <p className="text-[10px] text-slate-400 mt-1.5 text-left leading-relaxed">เก็บข้อมูลในเครื่องนี้เท่านั้น ไม่ sync ข้ามอุปกรณ์</p>
                                </div>

                                <div className="flex items-center gap-2 my-3">
                                    <div className="flex-1 h-px bg-slate-200"></div>
                                    <span className="text-[10px] text-slate-400 font-bold">หรือ</span>
                                    <div className="flex-1 h-px bg-slate-200"></div>
                                </div>

                                <button onClick={handleLogin} className="btn-primary w-full py-3 px-5 flex items-center justify-center gap-2 font-bold shadow-lg text-sm">
                                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-5 h-5 bg-white rounded-full p-0.5" />
                                    Login ด้วย Google (Cloud Sync)
                                </button>
                                <p className="text-[10px] text-slate-400 mt-1.5 text-left leading-relaxed">Sync ข้ามอุปกรณ์ และ share กับเพื่อนได้</p>
                            </div>
                        </div>
                    );
                }
            }

            // ── Main Render ────────────────────────────────────────────────────────
            return (
                <div className="min-h-screen pb-16">
                    {/* Header */}
                    <header className="p-3 sticky top-0 z-50">

                                    <div>
                                        <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-2">จ่ายค่าอะไร?</label>
                                        <input value={expDesc} onChange={e => setExpDesc(e.target.value)} placeholder="เช่น ค่าข้าวเที่ยง, ค่าตั๋ว" className="w-full bg-slate-50 rounded-xl px-4 py-3 font-bold text-sm outline-none border-2 border-slate-200 focus:border-[#FFB6C1] focus:bg-white transition-all" />
                                    </div>
                                    {/* Amount */}
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-2">จำนวนเงิน (฿)</label>
                                        <div className="bg-slate-50 rounded-2xl p-4 border-2 border-slate-200 focus-within:border-[#89CFF0] focus-within:bg-white transition-all">
                                            <input value={expAmount} onChange={e => setExpAmount(e.target.value)} placeholder="ตัวเลข หรือสูตร (100+50*2)" className="w-full bg-transparent text-base font-bold outline-none mb-3 text-slate-600" />
                                            <div className="flex justify-between items-end border-t-2 border-dashed border-slate-200 pt-3">
                                                <span className="text-[10px] font-bold text-slate-400 uppercase">ยอดสุทธิ</span>
                                                <span className="text-[36px] leading-none font-black text-[#89CFF0]">฿{formatMoney(evaluateMath(expAmount))}</span>
                                            </div>
                                        </div>
                                    </div>
                                    {/* Payer */}
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-2">ใครจ่าย?</label>
                                        <div className="flex flex-wrap gap-2">
                                            {(activeGroup.members||[]).map(m => (
                                                <button key={m} onClick={() => setExpPayer(m)} className={`flex items-center gap-1.5 px-2.5 py-1.5 rounded-xl border-2 transition-all text-xs font-bold ${expPayer===m ? 'border-[#FFB6C1] bg-[#FFF0F5] shadow-md' : 'border-slate-200 bg-slate-50 opacity-70'}`}>
                                                    <Avatar name={m} group={activeGroup} size="xs" />
                                                    {m}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    {/* Participants */}
                                    <div className="bg-slate-50 p-4 rounded-2xl border-2 border-slate-100">
                                        <div className="flex justify-between items-center mb-3">
                                            <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">หารกับใคร? ({(expParticipants||[]).length} คน)</label>
                                            <button onClick={() => setExpParticipants(activeGroup.members)} className="text-[11px] font-bold text-white bg-[#89CFF0] px-3 py-1 rounded-full">ทุกคน</button>
                                        </div>
                                        <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
                                            {(activeGroup.members||[]).map(m => {
                                                const sel = expParticipants.includes(m);
                                                return (
                                                    <button key={m} onClick={() => sel ? setExpParticipants(expParticipants.filter(p=>p!==m)) : setExpParticipants([...expParticipants, m])}
                                                        className={`flex items-center gap-2 p-2.5 rounded-xl border-2 transition-all font-bold text-xs ${sel ? 'border-[#FFB6C1] bg-[#FFF0F5] shadow-md' : 'border-slate-200 bg-white text-slate-400'}`}>
                                                        <div className={`w-5 h-5 rounded-lg border-2 ${sel ? 'bg-[#FF9EAE] border-[#FF9EAE]' : 'border-slate-300 bg-slate-100'} flex items-center justify-center shrink-0`}>
                                                            {sel && <LucideIcon name="check" className="w-3 h-3 text-white" />}
                                                        </div>
                                                        <Avatar name={m} group={activeGroup} size="xs" />
                                                        <span className="truncate">{m}</span>
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>
                                    <button onClick={saveExpense} className="w-full btn-primary py-4 text-base font-bold shadow-xl">บันทึกบิลเลย ✨</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Export Area */}
                    <div id="export-area" style={{background:'linear-gradient(135deg, #FFE4E1 0%, #FFF0F5 30%, #E6E6FA 60%, #E0F7FA 100%)', padding:'60px', fontFamily:'Sarabun, sans-serif'}}>
                        {/* helper: compute inline borderRadius for export avatars (html2canvas can't do clip-path) */}
                        {(() => {
                            const exportAvatarRadius = (shape) => {
                                if (shape === 'circle') return '50%';
                                if (shape === 'squircle') return '22%';
                                if (shape === 'rounded') return '30%';
                                if (shape === 'hexagon' || shape === 'diamond' || shape === 'star') return '30%'; // fallback rounded
                                if (shape === 'flower') return '40%';
                                return '30%';
                            };
                            const ExportAvatar = ({name}) => {
                                const d = getMemberData(activeGroup, name);
                                return (
                                    <div style={{backgroundColor:d.color, width:'48px', height:'48px', borderRadius: exportAvatarRadius(d.shape), display:'flex', alignItems:'center', justifyContent:'center', fontWeight:'900', color:'white', fontSize: d.emoji ? '24px' : '22px', flexShrink:0}}>
                                        {d.emoji || (name ? name[0].toUpperCase() : '')}
                                    </div>
                                );
                            };
                            const ExportAvatarSm = ({name}) => {
                                const d = getMemberData(activeGroup, name);
                                return (
                                    <div style={{backgroundColor:d.color, width:'40px', height:'40px', borderRadius: exportAvatarRadius(d.shape), display:'flex', alignItems:'center', justifyContent:'center', fontWeight:'900', color:'white', fontSize: d.emoji ? '20px' : '18px', flexShrink:0}}>
                                        {d.emoji || (name ? name[0].toUpperCase() : '')}
                                    </div>
                                );
                            };
                            return (
                        <div style={{display:'flex', flexDirection:'column', gap:'40px', maxWidth:'1080px', margin:'0 auto'}}>
                            <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', background:'rgba(255,255,255,0.7)', padding:'40px', borderRadius:'40px', border:'4px solid white', boxShadow:'0 12px 40px rgba(255,182,193,0.3)'}}>
                                <div style={{display:'flex', alignItems:'center', gap:'30px'}}>
                                    <div style={{backgroundColor: activeGroup ? getGroupStyle(activeGroup).color : '#FFD1DC', width:'120px', height:'120px', borderRadius:'30px', border:'5px solid white', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'60px', boxShadow:'0 6px 20px rgba(0,0,0,0.1)'}}>
                                        {activeGroup ? getGroupStyle(activeGroup).emoji : '✈️'}
                                    </div>
                                    <div>
                                        <h2 style={{fontSize:'52px', fontWeight:'900', color:'#2B3A4A', margin:0, fontFamily:'Mitr, sans-serif'}}>{activeGroup?.name}</h2>
                                        <p style={{fontSize:'18px', color:'#64748b', fontWeight:'bold', textTransform:'uppercase', letterSpacing:'6px', margin:'8px 0 0 0'}}>สรุปรายการใช้จ่ายทริป</p>
                                    </div>
                                </div>
                                <div style={{background:'rgba(255,255,255,0.9)', padding:'24px 32px', borderRadius:'24px', border:'4px solid white', textAlign:'right'}}>
                                    <p style={{fontSize:'14px', color:'#94a3b8', fontWeight:'bold', textTransform:'uppercase', letterSpacing:'3px', margin:'0 0 6px 0'}}>ยอดรวมทั้งหมด</p>
                                    <p style={{fontSize:'56px', fontWeight:'900', color:'#FF9EAE', margin:0, fontFamily:'Mitr, sans-serif'}}>฿{formatMoney(totalSpent)}</p>
                                </div>
                            </div>
                            <div style={{background:'rgba(176,224,230,0.2)', border:'4px solid rgba(173,216,230,0.4)', borderRadius:'32px', padding:'32px'}}>
                                <h3 style={{fontSize:'28px', fontWeight:'bold', borderLeft:'8px solid #89CFF0', paddingLeft:'16px', margin:'0 0 24px 0', fontFamily:'Mitr, sans-serif'}}>สรุปค่าใช้จ่ายแต่ละคน</h3>
                                <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'16px'}}>
                                    {individualShares.map((item, idx) => (
                                        <div key={idx} style={{background:'rgba(255,255,255,0.9)', padding:'24px', borderRadius:'20px', border:'3px solid white'}}>
                                            <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', borderBottom:'2px solid #f1f5f9', paddingBottom:'16px', marginBottom:'16px'}}>
                                                <div style={{display:'flex', alignItems:'center', gap:'12px'}}>
                                                    <ExportAvatar name={item.name} />
                                                    <span style={{fontWeight:'bold', fontSize:'22px', color:'#2B3A4A'}}>{item.name}</span>
                                                </div>
                                                <span style={{color: item.balance > 0.01 ? '#059669' : item.balance < -0.01 ? '#ef4444' : '#94a3b8', fontWeight:'bold', background: item.balance > 0.01 ? '#ecfdf5' : item.balance < -0.01 ? '#fef2f2' : '#f8fafc', padding:'6px 14px', borderRadius:'12px', fontSize:'14px'}}>
                                                    {item.balance > 0.01 ? `ได้คืน ฿${formatMoney(item.balance)}` : item.balance < -0.01 ? `จ่ายเพิ่ม ฿${formatMoney(Math.abs(item.balance))}` : 'พอดีแล้ว'}
                                                </span>
                                            </div>
                                            <div style={{display:'flex', justifyContent:'space-between'}}>
                                                <div><p style={{fontSize:'11px', color:'#94a3b8', margin:'0 0 4px'}}>ออกไปแล้ว</p><p style={{fontSize:'24px', fontWeight:'900', color:'#89CFF0', margin:0}}>฿{formatMoney(item.paid)}</p></div>
                                                <div style={{textAlign:'right'}}><p style={{fontSize:'11px', color:'#94a3b8', margin:'0 0 4px'}}>รับผิดชอบ</p><p style={{fontSize:'24px', fontWeight:'900', color:'#FF9EAE', margin:0}}>฿{formatMoney(item.share)}</p></div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div style={{background:'rgba(181,234,215,0.2)', border:'4px solid rgba(181,234,215,0.4)', borderRadius:'32px', padding:'32px'}}>
                                <h3 style={{fontSize:'28px', fontWeight:'bold', borderLeft:'8px solid #B5EAD7', paddingLeft:'16px', margin:'0 0 24px 0', fontFamily:'Mitr, sans-serif'}}>สรุปการเคลียร์เงิน</h3>
                                {settlements.map((s, idx) => (
                                    <div key={idx} style={{display:'flex', alignItems:'center', justifyContent:'space-between', background:'rgba(255,255,255,0.9)', padding:'20px 24px', borderRadius:'20px', marginBottom:'12px', border:'3px solid white'}}>
                                        <div style={{display:'flex', alignItems:'center', gap:'16px', flex:1}}>
                                            <ExportAvatarSm name={s.from} />
                                            <span style={{fontWeight:'bold', fontSize:'20px'}}>{s.from}</span>
                                            <div style={{background:'#E0F7FA', color:'#55ABC8', padding:'4px 16px', borderRadius:'999px', fontSize:'14px', fontWeight:'bold'}}>จ่ายให้ ➔</div>
                                            <ExportAvatarSm name={s.to} />
                                            <span style={{fontWeight:'bold', fontSize:'20px'}}>{s.to}</span>
                                        </div>
                                        <div style={{paddingLeft:'24px', borderLeft:'3px solid #f1f5f9', textAlign:'right'}}>
                                            <p style={{fontSize:'11px', color:'#94a3b8', margin:'0 0 2px', fontWeight:'bold', textTransform:'uppercase'}}>ต้องโอน</p>
                                            <p style={{fontSize:'32px', fontWeight:'900', color:'#89CFF0', margin:0}}>฿{formatMoney(s.amount)}</p>
                                        </div>
                                    </div>
                                ))}
                                {settlements.length === 0 && <div style={{textAlign:'center', opacity:0.4, fontSize:'24px', fontWeight:'bold', padding:'40px'}}>ไม่มีการโอนค้างชำระ ✨</div>}
                            </div>
                            <div style={{textAlign:'center', marginTop:'20px', opacity:0.5}}>
                                <p style={{fontWeight:'bold', textTransform:'uppercase', letterSpacing:'10px', fontSize:'13px', fontFamily:'Mitr, sans-serif'}}>Generated by Expense Pro 🧸</p>
                            </div>
                        </div>
                            );
                        })()}
                    </div>
                </div>
            );
        }

        const root = ReactDOMClient.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
