<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Manager - Cloud</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM (CDN) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel สำหรับรัน JSX บน Browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Kanit:wght@300;400;600&display=swap');
        body { font-family: 'Kanit', 'Inter', sans-serif; background-color: #F2F2F7; }
        .glass { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.4); }
        .dark-glass { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- CONFIGURATION ---
        // 1. ใส่ Config จาก Firebase Console ของคุณที่นี่
        const firebaseConfig = {
          apiKey: "AIzaSyCwnWHqG__ty3OvDok2o6orgreXOu5LSXk",
          authDomain: "expense-manager-14564.firebaseapp.com",
          projectId: "expense-manager-14564",
          storageBucket: "expense-manager-14564.firebasestorage.app",
          messagingSenderId: "259280883710",
          appId: "1:259280883710:web:67d7ce7b1f8e5e196a7aaf",
          measurementId: "G-68BWRR5K8N"
        };
        // 2. ใส่ URL จาก Google Apps Script ที่ Deploy แล้วที่นี่
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyddJ94rtznUODx16_OZsRtcBKYyayyjaCmNjpEWRs_qhsIQXtAcL6OTf8ykXZer1n6qA/exec"; 

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('list');
            const [groups, setGroups] = useState([]);
            const [activeGroup, setActiveGroup] = useState(null);
            const [loading, setLoading] = useState(true);
            const [showAddGroupModal, setShowAddGroupModal] = useState(false);
            const [newGroupName, setNewGroupName] = useState('');

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    if (u) fetchGroups(u.uid);
                    else setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            const fetchGroups = async (userId) => {
                setLoading(true);
                try {
                    const response = await fetch(`${GAS_WEB_APP_URL}?action=getGroups&userId=${userId}`);
                    const data = await response.json();
                    setGroups(Array.isArray(data) ? data : []);
                } catch (err) {
                    console.error("Fetch failed", err);
                } finally {
                    setLoading(false);
                }
            };

            const handleGoogleLogin = async () => {
                const provider = new firebase.auth.GoogleAuthProvider();
                try { await auth.signInWithPopup(provider); } catch (err) { console.error(err); }
            };

            const handleLogout = () => auth.signOut();

            const createGroup = async () => {
                if (!newGroupName.trim() || !user) return;
                setLoading(true);
                try {
                    await fetch(GAS_WEB_APP_URL, {
                        method: 'POST',
                        body: JSON.stringify({
                            action: 'createGroup',
                            userId: user.uid,
                            name: newGroupName.trim()
                        })
                    });
                    await fetchGroups(user.uid);
                    setShowAddGroupModal(false);
                    setNewGroupName('');
                } catch (err) {
                    console.error("Create failed", err);
                } finally {
                    setLoading(false);
                }
            };

            if (loading && !user) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="w-12 h-12 border-4 border-blue-500/20 border-t-blue-600 rounded-full animate-spin"></div>
                    </div>
                );
            }

            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
                        <div className="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-blue-400/20 blur-[120px] rounded-full"></div>
                        <div className="max-w-md w-full relative z-10">
                            <div className="glass rounded-[3rem] p-10 shadow-2xl text-center">
                                <div className="w-20 h-20 bg-gradient-to-tr from-blue-600 to-indigo-400 rounded-2xl flex items-center justify-center mx-auto mb-8 shadow-xl">
                                    <i data-lucide="calculator" className="text-white w-10 h-10"></i>
                                </div>
                                <h1 className="text-3xl font-black text-slate-900 mb-2">Expense Manager</h1>
                                <p className="text-slate-500 mb-10 font-medium">จัดการค่าใช้จ่ายกลุ่มเพื่อนบนระบบคลาวด์</p>
                                <button 
                                    onClick={handleGoogleLogin}
                                    className="w-full flex items-center justify-center gap-4 bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-black transition-all shadow-xl active:scale-95"
                                >
                                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-5 h-5 bg-white rounded-full p-1" alt="google" />
                                    เข้าสู่ระบบด้วย Google
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen text-slate-900 pb-24">
                    <header className="sticky top-0 z-50 px-4 pt-6">
                        <div className="max-w-4xl mx-auto">
                            <div className="glass rounded-3xl px-6 py-4 flex items-center justify-between shadow-sm">
                                <h1 className="text-lg font-black">{view === 'list' ? 'Dashboard' : activeGroup?.name}</h1>
                                <button onClick={handleLogout} className="w-10 h-10 rounded-xl overflow-hidden border-2 border-white shadow-md">
                                    <img src={user.photoURL} alt="profile" />
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto p-4 space-y-6 mt-4">
                        {view === 'list' ? (
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                {groups.map(group => (
                                    <div 
                                        key={group.id} 
                                        onClick={() => { setActiveGroup(group); setView('detail'); }}
                                        className="bg-white/50 border border-white p-8 rounded-[2.5rem] shadow-sm hover:shadow-md transition-all cursor-pointer"
                                    >
                                        <div className="w-14 h-14 bg-white rounded-2xl flex items-center justify-center text-3xl mb-4 shadow-inner">
                                            {group.icon || '📊'}
                                        </div>
                                        <h3 className="text-xl font-black text-slate-900">{group.name}</h3>
                                        <p className="text-xs font-bold text-slate-400 mt-1 uppercase tracking-wider">Active Group</p>
                                    </div>
                                ))}
                                <div 
                                    onClick={() => setShowAddGroupModal(true)}
                                    className="border-2 border-dashed border-slate-300 rounded-[2.5rem] p-8 flex flex-col items-center justify-center text-slate-400 hover:text-blue-500 hover:border-blue-500 hover:bg-blue-50 transition-all cursor-pointer"
                                >
                                    <i data-lucide="plus" className="w-8 h-8 mb-2"></i>
                                    <span className="font-bold">เพิ่มกลุ่มใหม่</span>
                                </div>
                            </div>
                        ) : (
                            <div className="text-center py-20">
                                <i data-lucide="pie-chart" className="w-16 h-16 text-blue-500 mx-auto mb-4"></i>
                                <h2 className="text-2xl font-black">{activeGroup?.name}</h2>
                                <p className="text-slate-500 mt-2">กำลังดึงข้อมูลจาก Google Sheets...</p>
                                <button onClick={() => setView('list')} className="mt-8 text-blue-600 font-bold">← กลับหน้าหลัก</button>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm z-50">
                        <div className="dark-glass rounded-[2rem] px-8 py-4 flex items-center justify-between shadow-2xl">
                            <i data-lucide="calculator" className="w-6 h-6 text-white cursor-pointer" onClick={() => setView('list')}></i>
                            <div 
                                onClick={() => setShowAddGroupModal(true)}
                                className="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center shadow-lg -mt-12 border-4 border-[#F2F2F7] cursor-pointer"
                            >
                                <i data-lucide="plus" className="w-6 h-6 text-white"></i>
                            </div>
                            <i data-lucide="settings" className="w-6 h-6 text-slate-500"></i>
                        </div>
                    </nav>

                    {showAddGroupModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/40 backdrop-blur-md">
                            <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-10 shadow-2xl border border-white">
                                <h3 className="text-2xl font-black mb-6 text-center">ชื่อกลุ่มใหม่</h3>
                                <input 
                                    value={newGroupName}
                                    onChange={(e) => setNewGroupName(e.target.value)}
                                    placeholder="ทริปเที่ยว, ค่าบ้าน..."
                                    className="w-full bg-slate-100 px-6 py-4 rounded-2xl outline-none focus:ring-2 ring-blue-500/30 font-bold mb-6 text-lg"
                                />
                                <button 
                                    onClick={createGroup}
                                    className="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-xl active:scale-95"
                                >
                                    ยืนยันสร้างกลุ่ม
                                </button>
                                <button onClick={() => setShowAddGroupModal(false)} className="w-full mt-4 text-slate-400 font-bold">ยกเลิก</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Initialize Lucide Icons after render
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
